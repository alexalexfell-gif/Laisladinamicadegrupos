<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Isla - Alejandro Scuro Rossi</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --light: #ecf0f1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; }
        .scoreboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .score-card { background: var(--primary); color: white; padding: 12px; border-radius: 10px; text-align: center; font-size: 0.9em; border-bottom: 4px solid var(--accent); }
        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eef2f3; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        button { background: var(--success); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #2ecc71; transform: translateY(-1px); }
        .instruction { background: #fff3cd; color: #856404; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ffeeba; font-size: 0.95em; text-align: center; }
        .role-tag { font-size: 0.75em; font-weight: bold; color: var(--accent); display: block; margin-top: 8px; text-transform: uppercase; }
        select, input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .trade-slot { background: #f9f9f9; border: 1px solid #ddd; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .venganza-badge { background: var(--danger); color: white; padding: 3px 8px; border-radius: 5px; font-size: 0.8em; font-weight: bold; }
        .active-turn { border: 2px solid var(--accent) !important; background: #ebf5fb !important; }
        .status-box { padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 0.85em; }
    </style>
</head>
<body>

<div class="container">
    <div id="scoreboard" class="scoreboard" style="display:none;"></div>
    <div id="game-ui"></div>
</div>

<script>
const CATALOGO_BASE = [
    { id: "agua", n: "Agua", c: "ali", p: 1 }, { id: "fruta", n: "Frutas", c: "ali", p: 1 }, { id: "latas", n: "Enlatados", c: "ali", p: 1 },
    { id: "botiquin", n: "Botiquín", c: "uti", p: 1 }, { id: "cuerda", n: "Cuerda", c: "uti", p: 1 }, { id: "martillo", n: "Martillo", c: "uti", p: 1 },
    { id: "lona", n: "Lona", c: "uti", p: 1 }, { id: "encendedor", n: "Encendedor", c: "uti", p: 1 }, { id: "mapa", n: "Mapa", c: "ori", p: 1 }, { id: "radio", n: "Radio", c: "ori", p: 1 }
];
const PACTO_OBJ = [{ id: "pesca", n: "Caña", c: "ali", p: 2 }, { id: "mochila", n: "Mochila", c: "uti", p: 2 }, { id: "brujula", n: "Brújula", c: "ori", p: 2 }];
const ROLES_OBJ = [
    { id: "antifaz", n: "Antifaz (Ladrón)", c: "uti", p: 1, type: "rol" },
    { id: "guantes", n: "Guantes (Recolector)", c: "ali", p: 1, type: "rol" },
    { id: "machete", n: "Machete (Luchador)", c: "uti", p: 1, type: "rol" },
    { id: "maletin", n: "Maletín (Comerciante)", c: "uti", p: 1, type: "rol" },
    { id: "alianza_mil", n: "Alianza militar (Diplomático)", c: "ori", p: 1, type: "rol" }
];

let Game = {
    paso: 1,
    equipos: [
        { nombre: "Alfa", inventario: [], attacks: 1, venganza: false },
        { nombre: "Beta", inventario: [], attacks: 1, venganza: false },
        { nombre: "Gamma", inventario: [], attacks: 1, venganza: false }
    ],
    pactoActivo: [],
    recoleccion: { indexTurno: 0, orden: [0, 1, 2, 2, 1, 0] }
};

function render() {
    const ui = document.getElementById('game-ui');
    const sb = document.getElementById('scoreboard');

    if (Game.paso >= 3 && Game.paso < 9) {
        sb.style.display = 'grid';
        sb.innerHTML = Game.equipos.map(e => {
            const p = e.inventario.reduce((acc, i) => { acc[i.c] = (acc[i.c] || 0) + (i.p || 0); return acc; }, { ali:0, uti:0, ori:0 });
            return `<div class="score-card"><b>${e.nombre}</b><br>🍎${p.ali} | 🛠${p.uti} | 🧭${p.ori}</div>`;
        }).join("");
    } else { sb.style.display = 'none'; }

    if (Game.paso === 1) {
        ui.innerHTML = `<div class="card" style="text-align:center"><h1>🏝️ LA ISLA</h1><p>Autor: Alejandro Scuro Rossi</p><button onclick="Game.paso=2; render();">Empezar Registro</button></div>`;
    }
    
    else if (Game.paso === 2) {
        ui.innerHTML = `<div class="card"><h2>Paso 2: Registro</h2><div class="grid">${Game.equipos.map((e, i) => `<div class="card"><h3>${e.nombre}</h3><select id="sz_${i}" onchange="updateFieldsUI(${i})"><option value="5">5 Jugadores</option><option value="4">4 Jugadores</option><option value="3">3 Jugadores</option></select><div id="fields_${i}">${generateFieldsHTML(5, i)}</div></div>`).join("")}</div><button onclick="Game.paso=3; render()">Continuar</button></div>`;
    }

    else if (Game.paso === 3) {
        ui.innerHTML = `<div class="card"><h2>Paso 3: Planeación</h2><div class="grid">${Game.equipos.map((e, i) => `<div class="card"><h3>${e.nombre}</h3><select id="p_${i}" multiple style="height:150px;">${CATALOGO_BASE.map(o => `<option value="${o.id}">${o.n}</option>`).join("")}</select></div>`).join("")}</div><button onclick="saveInv3()">Guardar Base</button></div>`;
    }

    else if (Game.paso === 3.5) {
        ui.innerHTML = `<div class="card"><h2>Paso 3.5: Roles</h2><div class="grid">${Game.equipos.map((e, i) => `<div class="card"><h3>${e.nombre}</h3><select id="ro_${i}" multiple style="height:120px;">${ROLES_OBJ.map(o => `<option value="${o.id}">${o.n}</option>`).join("")}</select></div>`).join("")}</div><button onclick="saveRoleInv()">Guardar Roles</button></div>`;
    }

    else if (Game.paso === 4) {
        ui.innerHTML = `<div class="card"><h2>Paso 4: Robo Nocturno</h2><div class="grid">${Game.equipos.map((e, i) => {
            const hasA = e.inventario.some(it => it.id === 'antifaz');
            return `<div class="card"><h3>${e.nombre} ${hasA ? '🎭' : ''}</h3><select id="n_act_${i}" onchange="updateNightUI(${i})"><option value="def">Defender</option><option value="atk">Robar (${hasA?2:1})</option></select><div id="n_ui_${i}" style="display:none"><select id="n_vic_${i}" onchange="loadNightItems(${i})"><option value="">¿Víctima?</option>${Game.equipos.map((v, vi) => i !== vi ? `<option value="${vi}">${v.nombre}</option>` : '').join("")}</select><select id="n_obj_${i}" multiple style="height:80px;"></select></div></div>`;
        }).join("")}</div><button onclick="processNightRobbery()">Ejecutar Robo</button></div>`;
    }

    else if (Game.paso === 5) {
        ui.innerHTML = `<div class="card"><h2>Paso 5: Pacto</h2><div style="display:flex; justify-content:center; gap:20px;">${Game.equipos.map((e,i)=>`<div><input type="checkbox" class="p-check" value="${i}" id="chk${i}" onchange="updatePactUI()"><label for="chk${i}"> ${e.nombre}</label></div>`).join("")}</div><div id="pacto-area"></div><button onclick="processPact()">Finalizar Pacto</button></div>`;
    }

    else if (Game.paso === 6) {
        ui.innerHTML = `<div class="card"><h2>Paso 6: Lucha</h2><div class="grid">${Game.equipos.map((e, i) => {
            let totalAtks = e.attacks + (e.venganza ? 1 : 0);
            return `<div class="card"><h3>${e.nombre}</h3><select id="l_act_${i}" onchange="updateLuchaUI(${i})"><option value="atk">Atacar (${totalAtks})</option><option value="def">Defender</option></select><div id="l_un_${i}" style="display:none">${Array.from({length: totalAtks}).map((_, a) => `<div class="trade-slot">Vict: <select id="vic_${i}_${a}" onchange="toggleDuelUI(${i}, ${a})"><option value="">?</option>${Game.equipos.map((v,vi)=>i!==vi?`<option value="${vi}">${v.nombre}</option>`:'').join("")}</select><div id="duel_${i}_${a}" style="display:none;">PPT: <select id="selA_${i}_${a}"><option value="pi">Pi</option><option value="pa">Pa</option><option value="ti">Ti</option></select> vs <select id="selV_${i}_${a}"><option value="pi">Pi</option><option value="pa">Pa</option><option value="ti">Ti</option></select><button onclick="resolverPPT(${i}, ${a})">Lanzar</button></div><div id="choice_${i}_${a}" style="display:none">Robar: <select id="booty_${i}_${a}"></select><button onclick="confirmarRobo(${i}, ${a})">OK</button></div></div>`).join("")}</div></div>`;
        }).join("")}</div><button onclick="Game.paso=7; render()">Recolección</button></div>`;
    }

    else if (Game.paso === 7) {
        const idxActual = Game.recoleccion.orden[Game.recoleccion.indexTurno];
        const tieneG = Game.equipos[idxActual].inventario.some(it => it.id === 'guantes');
        const es2aRonda = Game.recoleccion.indexTurno >= 3;
        ui.innerHTML = `<div class="card"><h2>Paso 7: Recolección</h2><div class="grid">${Game.equipos.map((e, i) => `<div class="card ${idxActual===i?'active-turn':''}" style="opacity:${idxActual===i?'1':'0.5'}"><h3>${e.nombre}</h3>${idxActual===i ? (!es2aRonda||tieneG ? `<select id="rec_sel">${CATALOGO_BASE.map(o=>`<option value="${o.id}">${o.n}</option>`).join("")}</select><button onclick="ejecutarTurnoRecoleccion(${i})">Confirmar</button>` : `<p>No tiene Guantes</p>`) : `<p>Esperando...</p>`}</div>`).join("")}</div></div>`;
        if(es2aRonda && !tieneG && Game.recoleccion.indexTurno < 6) { setTimeout(() => { Game.recoleccion.indexTurno++; render(); }, 800); }
    }

    else if (Game.paso === 8) {
        ui.innerHTML = `<div class="card"><h2>Paso 8: Mercado (Comerciante)</h2><div class="grid">${Game.equipos.map((e, i) => {
            const hasM = e.inventario.some(it => it.id === 'maletin');
            return `<div class="card"><h3>${e.nombre} ${hasM ? '💼' : ''}</h3><div class="trade-slot"><b>Dar:</b><select id="m_give_${i}">${e.inventario.map((it, idx) => it.type !== 'rol' ? `<option value="${idx}">${it.n}</option>` : '').join("")}</select><b>Recibir (Solo si tiene Maletín):</b><select id="m_get_${i}" ${!hasM ? 'disabled' : ''}>${CATALOGO_BASE.map(o => `<option value="${o.id}">${o.n}</option>`).join("")}</select><button onclick="ejecutarMercado(${i})">Intercambiar</button></div></div>`;
        }).join("")}</div><button onclick="Game.paso=9; render()">Finalizar Juego</button></div>`;
    }

    else if (Game.paso === 9) {
        ui.innerHTML = `<div class="card" style="text-align:center"><h2>Paso 9: Recuento Final</h2><div class="grid">${Game.equipos.map(e => {
            const p = e.inventario.reduce((acc, i) => { acc[i.c] = (acc[i.c] || 0) + (i.p || 0); return acc; }, { ali:0, uti:0, ori:0 });
            const win = p.ali>=4 && p.uti>=3 && p.ori>=2;
            return `<div class="card" style="border: 2px solid ${win?'#27ae60':'#e74c3c'}">
                <h3>${e.nombre}</h3>
                <h2 style="color:${win?'#27ae60':'#e74c3c'}">${win?'✅ SOBREVIVE':'💀 MUERE'}</h2>
                <div class="status-box" style="background:#f8f9fa; text-align:left;">
                    <p>🍎 Alimentos: <b>${p.ali} / 4</b></p>
                    <p>🛠 Utensilios: <b>${p.uti} / 3</b></p>
                    <p>🧭 Orientación: <b>${p.ori} / 2</b></p>
                </div>
            </div>`;
        }).join("")}</div><button onclick="location.reload()">Reiniciar Todo</button></div>`;
    }
}

function ejecutarMercado(eqIdx) {
    const giveIdx = document.getElementById(`m_give_${eqIdx}`).value;
    const hasM = Game.equipos[eqIdx].inventario.some(it => it.id === 'maletin');
    if (giveIdx === "") return;
    Game.equipos[eqIdx].inventario.splice(giveIdx, 1);
    if (hasM) {
        const itemGet = {...CATALOGO_BASE.find(o => o.id === document.getElementById(`m_get_${eqIdx}`).value)};
        Game.equipos[eqIdx].inventario.push(itemGet);
    }
    render();
}

function ejecutarTurnoRecoleccion(eqIdx) {
    const item = {...CATALOGO_BASE.find(o => o.id === document.getElementById('rec_sel').value)};
    Game.equipos[eqIdx].inventario.push(item);
    Game.recoleccion.indexTurno++;
    if(Game.recoleccion.indexTurno >= 6) Game.paso = 8;
    render();
}

// LOGICA AUXILIAR
function updateNightUI(eq) { document.getElementById(`n_ui_${eq}`).style.display = (document.getElementById(`n_act_${eq}`).value==='atk'?'block':'none'); }
function loadNightItems(eq) {
    const v = document.getElementById(`n_vic_${eq}`).value;
    if(v==="") return;
    document.getElementById(`n_obj_${eq}`).innerHTML = Game.equipos[v].inventario.map((it, idx) => it.type !== 'rol' ? `<option value="${idx}">${it.n}</option>` : '').join("");
}
function processNightRobbery() {
    let rs = [];
    Game.equipos.forEach((e, i) => {
        if (document.getElementById(`n_act_${i}`).value === 'atk') {
            const v = parseInt(document.getElementById(`n_vic_${i}`).value);
            const opts = Array.from(document.getElementById(`n_obj_${i}`).selectedOptions);
            const qty = e.inventario.some(it => it.id === 'antifaz') ? 2 : 1;
            if (opts.length === qty) {
                if (document.getElementById(`n_act_${v}`).value === 'def') alert(`Defensa de ${Game.equipos[v].nombre}`);
                else rs.push({ l: i, v: v, ids: opts.map(o => parseInt(o.value)).sort((a,b)=>b-a) });
            }
        }
    });
    rs.forEach(r => r.ids.forEach(idx => Game.equipos[r.l].inventario.push(Game.equipos[r.v].inventario.splice(idx, 1)[0])));
    Game.paso = 5; render();
}
function saveInv3() {
    for(let i=0; i<3; i++) {
        const s = Array.from(document.getElementById(`p_${i}`).selectedOptions);
        if(s.length!==5) return alert("Elige 5.");
        Game.equipos[i].inventario = s.map(o => ({...CATALOGO_BASE.find(b => b.id === o.value)}));
    }
    Game.paso = 3.5; render();
}
function saveRoleInv() {
    for(let i=0; i<3; i++) {
        const s = Array.from(document.getElementById(`ro_${i}`).selectedOptions);
        if(s.length!==2) return alert("Elige 2.");
        s.forEach(o => {
            const it = {...ROLES_OBJ.find(x => x.id === o.value)};
            Game.equipos[i].inventario.push(it);
            if(it.id==='machete') Game.equipos[i].attacks = 2;
        });
    }
    Game.paso = 4; render();
}
function updatePactUI() {
    let s = Array.from(document.querySelectorAll('.p-check:checked')).map(c=>parseInt(c.value));
    if(s.length!==2) return;
    let ex = [0,1,2].find(i=>!s.includes(i));
    document.getElementById('pacto-area').innerHTML = `<div class="grid">${s.map(idx => `<div class="card"><h4>${Game.equipos[idx].nombre}</h4><select class="p-sel" data-eq="${idx}" multiple style="height:60px;">${PACTO_OBJ.map(o=>`<option value="${o.id}">${o.n}</option>`).join("")}</select></div>`).join("")}<div class="card"><h4>${Game.equipos[ex].nombre}</h4><select class="v-sel">${PACTO_OBJ.map(o=>`<option value="${o.id}">${o.n}</option>`).join("")}</select></div></div>`;
}
function processPact() {
    let ps = Array.from(document.querySelectorAll('.p-check:checked')).map(c=>parseInt(c.value));
    if(ps.length!==2) return;
    document.querySelectorAll('.p-sel').forEach(s => Array.from(s.selectedOptions).forEach(o => Game.equipos[s.dataset.eq].inventario.push({...PACTO_OBJ.find(x=>x.id===o.value)})));
    let ex = [0,1,2].find(i=>!ps.includes(i));
    Game.equipos[ex].inventario.push({...PACTO_OBJ.find(x=>x.id===document.querySelector('.v-sel').value)});
    Game.equipos[ex].venganza = true; Game.paso = 6; render();
}
function toggleDuelUI(l, a) { document.getElementById(`duel_${l}_${a}`).style.display = (document.getElementById(`vic_${l}_${a}`).value!=="")?"block":"none"; }
function updateLuchaUI(i) { document.getElementById(`l_un_${i}`).style.display = (document.getElementById(`l_act_${i}`).value==='atk'?'block':'none'); }
function resolverPPT(l, a) {
    const vIdx = document.getElementById(`vic_${l}_${a}`).value;
    if(document.getElementById(`l_act_${vIdx}`).value==='def') return alert("Defendido.");
    const aC = document.getElementById(`selA_${l}_${a}`).value, vC = document.getElementById(`selV_${l}_${a}`).value;
    if(aC===vC) return alert("Empate.");
    if((aC==='pi'&&vC==='ti')||(aC==='pa'&&vC==='pi')||(aC==='ti'&&vC==='pa')) {
        document.getElementById(`duel_${l}_${a}`).style.display="none"; document.getElementById(`choice_${l}_${a}`).style.display="block";
        document.getElementById(`booty_${l}_${a}`).innerHTML = Game.equipos[vIdx].inventario.map((it, idx) => it.type !== 'rol' ? `<option value="${idx}">${it.n}</option>` : '').join("");
    } else alert("Perdiste.");
}
function confirmarRobo(l, a) {
    const vIdx = document.getElementById(`vic_${l}_${a}`).value;
    const itIdx = document.getElementById(`booty_${l}_${a}`).value;
    Game.equipos[l].inventario.push(Game.equipos[vIdx].inventario.splice(itIdx, 1)[0]);
    render();
}
function generateFieldsHTML(n, eqIdx) {
    let roles = (n==5)?["Ladrón","Dipl.","Luch.","Recol.","Comer."]:(n==4)?["Ladrón/Dipl.","Luch.","Recol.","Comer."]:["Ladrón/Dipl.","Luch/Rec.","Comer."];
    return roles.map(r => `<span class="role-tag">${r}</span><input type="text">`).join("");
}
function updateFieldsUI(i) { document.getElementById(`fields_${i}`).innerHTML = generateFieldsHTML(document.getElementById(`sz_${i}`).value, i); }
window.onload = render;
</script>
</body>
</html>
