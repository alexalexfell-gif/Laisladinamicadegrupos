<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>La Isla - Dinámica Grupal</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; }
        .scoreboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .score-card { background: var(--primary); color: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eef2f3; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        button { background: var(--success); color: white; border: none; padding: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.2em; transition: 0.3s; margin-top: 10px; box-shadow: 0 4px 0 #219150; }
        button:hover { background: #2ecc71; transform: translateY(-2px); }
        .role-tag { font-size: 0.8em; font-weight: bold; color: var(--accent); display: block; margin-top: 8px; text-transform: uppercase; }
        .name-highlight { color: var(--danger); font-weight: bold; border-bottom: 2px solid var(--danger); padding: 0 4px; }
        .instruction-highlight { color: #c0392b; font-weight: bold; background: #fff3f3; padding: 15px; border-radius: 8px; border: 1px dashed #e74c3c; margin-bottom: 20px; text-align: center; font-size: 1.1em; }
        .kbd { background: #eee; border-radius: 3px; border: 1px solid #b4b4b4; padding: 2px 4px; font-weight: bold; }
        select, input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .alliance-alert { background: #d4edda; color: #155724; padding: 15px; border-radius: 8px; border: 1px solid #c3e6cb; margin-top: 15px; font-weight: bold; display: none; }
        .venganza-badge { background: var(--danger); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7em; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="scoreboard" class="scoreboard" style="display:none;"></div>
    <div id="game-ui"></div>
</div>

<script>
const DB = {
    base: [
        { id: "agua", n: "Agua", c: "ali", p: 1 }, { id: "fruta", n: "Frutas", c: "ali", p: 1 },
        { id: "latas", n: "Enlatados", c: "ali", p: 1 }, { id: "botiquin", n: "Botiquín", c: "uti", p: 1 },
        { id: "cuerda", n: "Cuerda", c: "uti", p: 1 }, { id: "martillo", n: "Martillo", c: "uti", p: 1 },
        { id: "lona", n: "Lona", c: "uti", p: 1 }, { id: "encendedor", n: "Encendedor", c: "uti", p: 1 },
        { id: "mapa", n: "Mapa", c: "ori", p: 1 }, { id: "radio", n: "Radio", c: "ori", p: 1 }
    ],
    especiales: [
        { id: "militar", n: "Alianza Militar", c: "mil", p: 2 },
        { id: "medico", n: "Equipo Médico Avanzado", c: "uti", p: 2 },
        { id: "radar", n: "Radar Satelital", c: "ori", p: 2 },
        { id: "destiladora", n: "Destiladora Industrial", c: "ali", p: 2 }
    ]
};

let Game = {
    paso: 1,
    equipos: [
        { nombre: "Alfa", inventario: [], roles: {}, venganza: false, militar: false },
        { nombre: "Beta", inventario: [], roles: {}, venganza: false, militar: false },
        { nombre: "Omega", inventario: [], roles: {}, venganza: false, militar: false }
    ],
    pacto: [] // Indices de los equipos que pactan
};

function render() {
    const ui = document.getElementById('game-ui');
    const sb = document.getElementById('scoreboard');

    if (Game.paso >= 3) {
        sb.style.display = 'grid';
        sb.innerHTML = Game.equipos.map(e => {
            const p = e.inventario.reduce((acc, i) => { acc[i.c] = (acc[i.c] || 0) + i.p; return acc; }, { ali:0, uti:0, ori:0, mil:0 });
            return `<div class="score-card">
                <small>Equipo ${e.nombre} ${e.venganza ? '<span class="venganza-badge">VENGANZA</span>' : ''}</small>
                <div style="font-weight:bold;">🍎${p.ali} | 🛠${p.uti} | 🧭${p.ori} ${p.mil > 0 ? '| ⚔️'+p.mil : ''}</div>
            </div>`;
        }).join("");
    }

    if (Game.paso === 1) {
        ui.innerHTML = `<div class="card" style="text-align:center"><h1>🏝️ La Isla</h1><p>Autor: Alejandro Scuro Rossi</p><button onclick="Game.paso=2; render();">Iniciar Configuración</button></div>`;
    } 
    else if (Game.paso === 2) {
        ui.innerHTML = `<div class="card"><h2>Paso 2: Registro de Jugadores</h2><div class="grid">${Game.equipos.map((e, i) => `
            <div class="card"><h3>Equipo ${e.nombre}</h3>
            <label>Nº Jugadores:</label><select id="sz_${i}" onchange="updateFields(${i})"><option value="5">5 Integrantes</option><option value="4">4 Integrantes</option><option value="3">3 Integrantes</option></select>
            <div id="fields_${i}">${generateFields(5, i)}</div></div>`).join("")}</div>
            <button onclick="saveRoles()">Confirmar Roles</button></div>`;
    }
    else if (Game.paso === 3) {
        ui.innerHTML = `<div class="card"><h2>Paso 3: Planeación Inicial</h2>
            <div class="instruction-highlight">⚠️ Mantén presionada la tecla <span class="kbd">Ctrl</span> y haz clic para elegir 5 objetos.</div>
            <div class="grid">${Game.equipos.map((e, i) => `<div class="card"><h3>${e.nombre}</h3><select id="p_${i}" multiple style="height:150px;">${DB.base.map(o => `<option value="${o.id}">${o.n}</option>`).join("")}</select><div id="c_${i}">Sel: 0/5</div></div>`).join("")}</div>
            <button onclick="saveInv()">Confirmar Planeación</button></div>`;
        setTimeout(() => Game.equipos.forEach((_,i) => { const s = document.getElementById(`p_${i}`); if(s) s.onchange = () => document.getElementById(`c_${i}`).innerText = `Sel: ${Array.from(s.selectedOptions).length}/5`; }), 100);
    }
    else if (Game.paso === 4) {
        ui.innerHTML = `<div class="card"><h2>Paso 4: Robo Nocturno</h2><div class="grid">${Game.equipos.map((e, i) => `
            <div class="card"><h3>${e.nombre}</h3><span class="role-tag">Ladrón: ${e.roles.ladron}</span>
            <select id="a_${i}" onchange="toggleRoboUI(${i})"><option value="def">🛡️ Defender</option><option value="atk">👤 Robar</option></select>
            <div id="u_${i}" style="display:none;margin-top:10px;">
                <select id="v_${i}" onchange="loadVictimInv(${i})"><option value="">¿A quién?</option>${Game.equipos.map((v, vi) => i!==vi ? `<option value="${vi}">${v.nombre}</option>` : '').join("")}</select>
                <select id="it_${i}" style="margin-top:5px;"><option value="">-- Objeto --</option></select>
            </div></div>`).join("")}</div><button onclick="processNight()">Resolver Noche</button></div>`;
    }
    else if (Game.paso === 5) {
        ui.innerHTML = `<div class="card"><h2>Paso 5: Pacto de Diplomáticos</h2>
            <div class="instruction-highlight">Diplomáticos: <span class="name-highlight">${Game.equipos[0].roles.diplomatico}</span>, <span class="name-highlight">${Game.equipos[1].roles.diplomatico}</span> y <span class="name-highlight">${Game.equipos[2].roles.diplomatico}</span>.</div>
            <div class="card">
                <h3>¿Se llega a un pacto?</h3>
                <p>Selecciona los dos equipos que forman la alianza:</p>
                <div style="display:flex; gap:20px; justify-content:center;">
                    <label><input type="checkbox" class="pacto-check" value="0"> Alfa</label>
                    <label><input type="checkbox" class="pacto-check" value="1"> Beta</label>
                    <label><input type="checkbox" class="pacto-check" value="2"> Omega</label>
                </div>
                <div id="pacto-ui" style="display:none; margin-top:20px;">
                    <div class="grid">
                        <div id="pacto-aliados"></div>
                        <div id="pacto-excluido"></div>
                    </div>
                    <div id="mil-aviso" class="alliance-alert">🛡️ ALIANZA MILITAR DETECTADA: Los equipos en pacto no podrán atacarse en el siguiente paso.</div>
                </div>
                <button onclick="procesarPacto()" style="margin-top:20px;">Confirmar Pacto y Asignar Recursos</button>
            </div>
        </div>`;
        
        setTimeout(() => {
            document.querySelectorAll('.pacto-check').forEach(ck => ck.onchange = updatePactoSelection);
        }, 100);
    }
}

function updatePactoSelection() {
    const selected = Array.from(document.querySelectorAll('.pacto-check:checked')).map(c => parseInt(c.value));
    const ui = document.getElementById('pacto-ui');
    if (selected.length === 2) {
        ui.style.display = 'block';
        const excluido = [0,1,2].find(i => !selected.includes(i));
        
        document.getElementById('pacto-aliados').innerHTML = `<h4>Aliados (Eligen 2 c/u):</h4>
            ${selected.map(idx => `<div><strong>${Game.equipos[idx].nombre}:</strong> 
            <select class="sel-esp" data-eq="${idx}" multiple>${DB.especiales.map(o => `<option value="${o.id}">${o.n}</option>`).join("")}</select></div>`).join("")}`;
        
        document.getElementById('pacto-excluido').innerHTML = `<h4>Excluido (Elige 1):</h4>
            <div><strong>${Game.equipos[excluido].nombre}:</strong> 
            <select class="sel-esp" data-eq="${excluido}">${DB.especiales.map(o => `<option value="${o.id}">${o.n}</option>`).join("")}</select></div>
            <p style="color:red; font-size:0.8em;">* Recibe estado Venganza (+1 ataque)</p>`;
            
        // Listener para Alianza Militar
        document.querySelectorAll('.sel-esp').forEach(s => s.onchange = () => {
            const hasMil = Array.from(document.querySelectorAll('.sel-esp[data-eq="'+selected[0]+'"] option:selected, .sel-esp[data-eq="'+selected[1]+'"] option:selected')).some(o => o.value === 'militar');
            document.getElementById('mil-aviso').style.display = hasMil ? 'block' : 'none';
        });
    } else {
        ui.style.display = 'none';
    }
}

function procesarPacto() {
    const selected = Array.from(document.querySelectorAll('.pacto-check:checked')).map(c => parseInt(c.value));
    if(selected.length !== 2) { alert("Debes seleccionar exactamente 2 equipos para el pacto."); return; }
    
    const excluidoIdx = [0,1,2].find(i => !selected.includes(i));
    
    // Guardar selecciones
    let milEnPacto = false;
    document.querySelectorAll('.sel-esp').forEach(sel => {
        const eqIdx = sel.dataset.eq;
        const opts = Array.from(sel.selectedOptions);
        opts.forEach(o => {
            const objeto = DB.especiales.find(esp => esp.id === o.value);
            Game.equipos[eqIdx].inventario.push(objeto);
            if(objeto.id === 'militar' && selected.includes(parseInt(eqIdx))) milEnPacto = true;
        });
    });

    // Aplicar Venganza
    Game.equipos[excluidoIdx].venganza = true;
    
    let msg = `Pacto sellado entre ${Game.equipos[selected[0]].nombre} y ${Game.equipos[selected[1]].nombre}.\n`;
    msg += `${Game.equipos[excluidoIdx].nombre} ha sido excluido y su luchador (${Game.equipos[excluidoIdx].roles.luchador}) busca Venganza.`;
    if(milEnPacto) msg += `\n\nAVISO: Existe una Alianza Militar. Los aliados no pueden atacarse.`;
    
    alert(msg);
    location.reload(); // Reinicia para ver marcadores finales o finalizar sesión.
}

// Funciones heredadas (Roles, Inventario, Robo)
function generateFields(size, eqIdx) {
    let html = "";
    if(size == 5) {
        html += `<span class="role-tag">Ladrón</span><input type="text" id="r0_${eqIdx}">
                <span class="role-tag">Diplomático</span><input type="text" id="r1_${eqIdx}">
                <span class="role-tag">Luchador</span><input type="text" id="r2_${eqIdx}">
                <span class="role-tag">Recolector</span><input type="text" id="r3_${eqIdx}">
                <span class="role-tag">Comerciante</span><input type="text" id="r4_${eqIdx}">`;
    } else if(size == 4) {
        html += `<span class="role-tag">Ladrón + Diplomático</span><input type="text" id="r0_${eqIdx}">
                <span class="role-tag">Luchador</span><input type="text" id="r1_${eqIdx}">
                <span class="role-tag">Recolector</span><input type="text" id="r2_${eqIdx}">
                <span class="role-tag">Comerciante</span><input type="text" id="r3_${eqIdx}">`;
    } else {
        html += `<span class="role-tag">Ladrón + Diplomático</span><input type="text" id="r0_${eqIdx}">
                <span class="role-tag">Luchador + Recolector</span><input type="text" id="r1_${eqIdx}">
                <span class="role-tag">Comerciante</span><input type="text" id="r2_${eqIdx}">`;
    }
    return html;
}
function updateFields(i) { document.getElementById(`fields_${i}`).innerHTML = generateFields(document.getElementById(`sz_${i}`).value, i); }
function saveRoles() {
    Game.equipos.forEach((e, i) => {
        const sz = document.getElementById(`sz_${i}`).value;
        const v = (id) => document.getElementById(`r${id}_${i}`).value || "Sin Nombre";
        if(sz == 5) e.roles = { ladron: v(0), diplomatico: v(1), luchador: v(2), recolector: v(3), comerciante: v(4) };
        if(sz == 4) e.roles = { ladron: v(0), diplomatico: v(0), luchador: v(1), recolector: v(2), comerciante: v(3) };
        if(sz == 3) e.roles = { ladron: v(0), diplomatico: v(0), luchador: v(1), recolector: v(1), comerciante: v(2) };
    });
    Game.paso = 3; render();
}
function saveInv() {
    for(let i=0; i<3; i++){
        const sel = Array.from(document.getElementById(`p_${i}`).selectedOptions);
        if(sel.length !== 5) { alert("¡Elige 5!"); return; }
        Game.equipos[i].inventario = sel.map(o => DB.base.find(it => it.id === o.value));
    }
    Game.paso = 4; render();
}
function toggleRoboUI(i) { document.getElementById(`u_${i}`).style.display = document.getElementById(`a_${i}`).value === 'atk' ? 'block' : 'none'; }
function loadVictimInv(i) {
    const v = document.getElementById(`v_${i}`).value;
    if(v==="") return;
    document.getElementById(`it_${i}`).innerHTML = Game.equipos[v].inventario.map((obj, idx) => `<option value="${idx}">${obj.n}</option>`).join("");
}
function processNight() {
    const defs = Game.equipos.map((_, i) => document.getElementById(`a_${i}`).value === 'def');
    Game.equipos.forEach((l, i) => {
        const vIdx = document.getElementById(`v_${i}`).value;
        const itIdx = document.getElementById(`it_${i}`).value;
        if(document.getElementById(`a_${i}`).value === 'atk' && vIdx !== "" && !defs[vIdx]) {
            const robado = Game.equipos[vIdx].inventario.splice(itIdx, 1)[0];
            l.inventario.push(robado);
        }
    });
    Game.paso = 5; render();
}

document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
