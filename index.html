<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Isla - Alejandro Scuro Rossi</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --light: #ecf0f1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; }
        .scoreboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .score-card { background: var(--primary); color: white; padding: 12px; border-radius: 10px; text-align: center; font-size: 0.9em; border-bottom: 4px solid var(--accent); }
        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eef2f3; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        button { background: var(--success); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #2ecc71; transform: translateY(-1px); }
        .instruction { background: #fff3cd; color: #856404; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ffeeba; font-size: 0.95em; text-align: center; }
        .role-tag { font-size: 0.75em; font-weight: bold; color: var(--accent); display: block; margin-top: 8px; text-transform: uppercase; }
        select, input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .trade-slot { background: #f9f9f9; border: 1px solid #ddd; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .venganza-badge { background: var(--danger); color: white; padding: 3px 8px; border-radius: 5px; font-size: 0.8em; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="scoreboard" class="scoreboard" style="display:none;"></div>
    <div id="game-ui"></div>
</div>

<script>
const CATALOGO_BASE = [
    { id: "agua", n: "Agua", c: "ali", p: 1 }, { id: "fruta", n: "Frutas", c: "ali", p: 1 }, { id: "latas", n: "Enlatados", c: "ali", p: 1 },
    { id: "botiquin", n: "Botiquín", c: "uti", p: 1 }, { id: "cuerda", n: "Cuerda", c: "uti", p: 1 }, { id: "martillo", n: "Martillo", c: "uti", p: 1 },
    { id: "lona", n: "Lona", c: "uti", p: 1 }, { id: "encendedor", n: "Encendedor", c: "uti", p: 1 }, { id: "mapa", n: "Mapa", c: "ori", p: 1 }, { id: "radio", n: "Radio", c: "ori", p: 1 }
];
const PACTO_OBJ = [{ id: "pesca", n: "Caña", c: "ali", p: 2 }, { id: "mochila", n: "Mochila", c: "uti", p: 2 }, { id: "brujula", n: "Brújula", c: "ori", p: 2 }];
const ROLES_OBJ = [
    { id: "antifaz", n: "Antifaz (Ladrón)", c: "uti", p: 1, type: "rol" },
    { id: "guantes", n: "Guantes (Recolector)", c: "ali", p: 1, type: "rol" },
    { id: "machete", n: "Machete (Luchador)", c: "uti", p: 1, type: "rol" },
    { id: "maletin", n: "Maletín (Comerciante)", c: "uti", p: 1, type: "rol" },
    { id: "alianza_mil", n: "Alianza militar (Diplomático)", c: "ori", p: 1, type: "rol" }
];

let Game = {
    paso: 1,
    equipos: [
        { nombre: "Alfa", inventario: [], attacks: 1, venganza: false, defiendeNocturno: false },
        { nombre: "Beta", inventario: [], attacks: 1, venganza: false, defiendeNocturno: false },
        { nombre: "Gamma", inventario: [], attacks: 1, venganza: false, defiendeNocturno: false }
    ],
    pactoActivo: []
};

function render() {
    const ui = document.getElementById('game-ui');
    const sb = document.getElementById('scoreboard');

    if (Game.paso >= 3 && Game.paso < 9) {
        sb.style.display = 'grid';
        sb.innerHTML = Game.equipos.map(e => {
            const p = e.inventario.reduce((acc, i) => { acc[i.c] = (acc[i.c] || 0) + (i.p || 0); return acc; }, { ali:0, uti:0, ori:0 });
            return `<div class="score-card"><b>${e.nombre}</b><br>🍎${p.ali} | 🛠${p.uti} | 🧭${p.ori}</div>`;
        }).join("");
    } else { sb.style.display = 'none'; }

    if (Game.paso === 1) {
        ui.innerHTML = `<div class="card" style="text-align:center"><h1>🏝️ LA ISLA</h1><p>Autor: Alejandro Scuro Rossi</p><button onclick="Game.paso=2; render();">Empezar Registro</button></div>`;
    }
    
    else if (Game.paso === 2) {
        ui.innerHTML = `<div class="card"><h2>Paso 2: Registro</h2><div class="grid">${Game.equipos.map((e, i) => `<div class="card"><h3>${e.nombre}</h3><select id="sz_${i}" onchange="updateFieldsUI(${i})"><option value="5">5 Jugadores</option><option value="4">4 Jugadores</option><option value="3">3 Jugadores</option></select><div id="fields_${i}">${generateFieldsHTML(5, i)}</div></div>`).join("")}</div><button onclick="Game.paso=3; render()">Continuar</button></div>`;
    }

    else if (Game.paso === 3) {
        ui.innerHTML = `<div class="card"><h2>Paso 3: Planeación</h2><div class="instruction">Elige 5 objetos (Ctrl+Click).</div><div class="grid">${Game.equipos.map((e, i) => `<div class="card"><h3>${e.nombre}</h3><select id="p_${i}" multiple style="height:150px;">${CATALOGO_BASE.map(o => `<option value="${o.id}">${o.n}</option>`).join("")}</select></div>`).join("")}</div><button onclick="saveInv3()">Guardar Base</button></div>`;
    }

    else if (Game.paso === 3.5) {
        ui.innerHTML = `<div class="card"><h2>Paso 3.5: Roles</h2><div class="instruction">Elige 2 roles (Ctrl+Click).</div><div class="grid">${Game.equipos.map((e, i) => `<div class="card"><h3>${e.nombre}</h3><select id="ro_${i}" multiple style="height:120px;">${ROLES_OBJ.map(o => `<option value="${o.id}">${o.n}</option>`).join("")}</select></div>`).join("")}</div><button onclick="saveRoleInv()">Guardar Roles</button></div>`;
    }

    else if (Game.paso === 4) {
        ui.innerHTML = `<div class="card"><h2>Paso 4: Robo Nocturno (Antifaz)</h2><div class="instruction">💡 Cada equipo con Antifaz tiene 2 acciones (Robar o Defender).</div><div class="grid">${Game.equipos.map((e, i) => {
            const hasLadrón = e.inventario.some(it => it.id === 'antifaz');
            return `<div class="card"><h3>${e.nombre} ${hasLadrón ? '🎭' : ''}</h3>
                ${hasLadrón ? `
                    ${[0,1].map(a => `
                        <div class="trade-slot">
                            <b>Acción ${a+1}:</b>
                            <select id="n_act_${i}_${a}" onchange="updateNightUI(${i}, ${a})">
                                <option value="none">Esperar</option>
                                <option value="def">Defender</option>
                                <option value="atk">Robar</option>
                            </select>
                            <div id="n_ui_${i}_${a}" style="display:none; margin-top:5px;">
                                Víctima: <select id="n_vic_${i}_${a}" onchange="loadNightItems(${i}, ${a})">
                                    <option value="">Seleccionar...</option>
                                    ${Game.equipos.map((v, vi) => i !== vi ? `<option value="${vi}">${v.nombre}</option>` : '').join("")}
                                </select>
                                Objeto: <select id="n_obj_${i}_${a}"></select>
                            </div>
                        </div>`).join("")}
                ` : `<p>Este equipo no tiene Antifaz. Solo puede ser robado si no pacta defensa verbalmente.</p>`}
            </div>`;
        }).join("")}</div><button onclick="processNightRobbery()">Ejecutar Robo Nocturno</button></div>`;
    }

    else if (Game.paso === 5) {
        ui.innerHTML = `<div class="card"><h2>Paso 5: Pacto</h2><div style="display:flex; justify-content:center; gap:20px;">${Game.equipos.map((e,i)=>`<div><input type="checkbox" class="p-check" value="${i}" id="chk${i}" onchange="updatePactUI()"><label for="chk${i}"> ${e.nombre}</label></div>`).join("")}</div><div id="pacto-area"></div><button onclick="processPact()">Finalizar Pacto</button></div>`;
    }

    else if (Game.paso === 6) {
        const tieneAlianza = Game.pactoActivo.some(idx => Game.equipos[idx].inventario.some(it => it.id === 'alianza_mil'));
        ui.innerHTML = `<div class="card"><h2>Paso 6: Lucha</h2>
            ${tieneAlianza ? `<div style="background:#d1ecf1; padding:10px; border-radius:8px; margin-bottom:15px; font-weight:bold; text-align:center;">🛡️ Alianza Militar Activa.</div>` : ''}
            <div class="grid">${Game.equipos.map((e, i) => {
                let totalAtks = e.attacks + (e.venganza ? 1 : 0);
                let h = `<div class="card"><h3>${e.nombre} ${e.venganza?'<span class="venganza-badge">VENGANZA +1</span>':''}</h3>
                <select id="l_act_${i}" onchange="updateLuchaUI(${i})"><option value="atk">Atacar (${totalAtks})</option><option value="def">Defender</option></select>
                <div id="l_un_${i}" style="display:none">`;
                for(let a=0; a<totalAtks; a++){ 
                    h += `<div class="trade-slot">
                        <select id="vic_${i}_${a}" onchange="toggleDuelUI(${i}, ${a})"><option value="">¿Objetivo?</option>${Game.equipos.map((v,vi)=>i!==vi?`<option value="${vi}">${v.nombre}</option>`:'').join("")}</select>
                        <div id="duel_${i}_${a}" style="display:none; margin-top:10px;">
                            A: <select id="selA_${i}_${a}"><option value="pi">Piedra</option><option value="pa">Papel</option><option value="ti">Tijera</option></select>
                            V: <select id="selV_${i}_${a}"><option value="pi">Piedra</option><option value="pa">Papel</option><option value="ti">Tijera</option></select>
                            <button onclick="resolverPPT(${i}, ${a})">Lanzar</button>
                        </div>
                        <div id="choice_${i}_${a}" style="display:none; margin-top:10px; background:#e8f5e9; padding:10px;">
                            <b>¡Victoria!</b> Robar: <select id="booty_${i}_${a}"></select>
                            <button onclick="confirmarRobo(${i}, ${a})">Confirmar</button>
                        </div>
                    </div>`; 
                }
                return h + `</div></div>`;
            }).join("")}</div><button onclick="Game.paso=7; render()">A Recolección</button></div>`;
    }

    else if (Game.paso === 7) {
        ui.innerHTML = `<div class="card"><h2>Paso 7: Recolección</h2><div class="grid">${Game.equipos.map((e, i) => {
            const hasGuantes = e.inventario.some(it => it.id === 'guantes');
            return `<div class="card"><h3>${e.nombre} ${hasGuantes?'🧤':''}</h3><p>Elige objeto ${hasGuantes?'(x2)':''}:</p><select id="rec_${i}">${CATALOGO_BASE.map(o=>`<option value="${o.id}">${o.n}</option>`).join("")}</select></div>`;
        }).join("")}</div><button onclick="saveRecoleccion()">Siguiente</button></div>`;
    }

    else if (Game.paso === 8) {
        ui.innerHTML = `<div class="card"><h2>Paso 8: Mercado</h2><button onclick="Game.paso=9; render()">Finalizar</button></div>`;
    }

    else if (Game.paso === 9) {
        ui.innerHTML = `<div class="card" style="text-align:center"><h2>Paso 9: Recuento</h2><div class="grid">${Game.equipos.map(e=>{
            const p = e.inventario.reduce((acc, i) => { acc[i.c] = (acc[i.c] || 0) + (i.p || 0); return acc; }, { ali:0, uti:0, ori:0 });
            const win = p.ali>=4 && p.uti>=3 && p.ori>=2;
            return `<div class="card"><h3>${e.nombre}</h3><p style="color:${win?'green':'red'}; font-weight:bold;">${win?'✅ VIVE':'💀 MUERE'}</p><p>🍎${p.ali}/4 🛠${p.uti}/3 🧭${p.ori}/2</p></div>`;
        }).join("")}</div><button onclick="location.reload()">Reiniciar</button></div>`;
    }
}

// --- LOGICA PASO 4: ROBO NOCTURNO ---
function updateNightUI(eq, act) {
    const mode = document.getElementById(`n_act_${eq}_${act}`).value;
    document.getElementById(`n_ui_${eq}_${act}`).style.display = (mode === 'atk') ? 'block' : 'none';
}

function loadNightItems(eq, act) {
    const vicIdx = document.getElementById(`n_vic_${eq}_${act}`).value;
    const sel = document.getElementById(`n_obj_${eq}_${act}`);
    if (vicIdx === "") return;
    sel.innerHTML = Game.equipos[vicIdx].inventario
        .map((it, idx) => it.type !== 'rol' ? `<option value="${idx}">${it.n}</option>` : '')
        .join("");
}

function processNightRobbery() {
    // 1. Detectar quién defiende primero
    Game.equipos.forEach((e, i) => {
        e.defiendeNocturno = false;
        if (e.inventario.some(it => it.id === 'antifaz')) {
            if (document.getElementById(`n_act_${i}_0`).value === 'def' || 
                document.getElementById(`n_act_${i}_1`).value === 'def') {
                e.defiendeNocturno = true;
            }
        }
    });

    // 2. Procesar ataques
    let robosRealizados = [];
    Game.equipos.forEach((e, i) => {
        if (e.inventario.some(it => it.id === 'antifaz')) {
            for (let a = 0; a < 2; a++) {
                if (document.getElementById(`n_act_${i}_a`)?.value === 'atk' || document.getElementById(`n_act_${i}_${a}`).value === 'atk') {
                    const vicIdx = document.getElementById(`n_vic_${i}_${a}`).value;
                    const itemIdx = document.getElementById(`n_obj_${i}_${a}`).value;
                    
                    if (vicIdx !== "" && itemIdx !== "") {
                        if (Game.equipos[vicIdx].defiendeNocturno) {
                            alert(`El robo de ${e.nombre} a ${Game.equipos[vicIdx].nombre} falló: el equipo está defendiendo.`);
                        } else {
                            robosRealizados.push({ ladrón: i, victima: vicIdx, itemIdx: itemIdx });
                        }
                    }
                }
            }
        }
    });

    // Ejecutar transferencias
    robosRealizados.forEach(r => {
        const item = Game.equipos[r.victima].inventario.splice(r.itemIdx, 1)[0];
        if (item) Game.equipos[r.ladrón].inventario.push(item);
    });

    alert("Robo Nocturno finalizado.");
    Game.paso = 5;
    render();
}

// --- LOGICA GENERAL ---
function saveInv3() {
    for(let i=0; i<3; i++) {
        const sel = Array.from(document.getElementById(`p_${i}`).selectedOptions);
        if(sel.length !== 5) return alert("Elige 5.");
        Game.equipos[i].inventario = sel.map(o => ({...CATALOGO_BASE.find(b => b.id === o.value)}));
    }
    Game.paso = 3.5; render();
}
function saveRoleInv() {
    for(let i=0; i<3; i++) {
        const sel = Array.from(document.getElementById(`ro_${i}`).selectedOptions);
        if(sel.length !== 2) return alert("Elige 2.");
        sel.forEach(o => {
            const item = {...ROLES_OBJ.find(x => x.id === o.value)};
            Game.equipos[i].inventario.push(item);
            if(item.id === 'machete') Game.equipos[i].attacks = 2;
        });
    }
    Game.paso = 4; render();
}
function saveRecoleccion() {
    for(let i=0; i<3; i++) {
        const item = {...CATALOGO_BASE.find(o => o.id === document.getElementById(`rec_${i}`).value)};
        const qty = Game.equipos[i].inventario.some(it => it.id === 'guantes') ? 2 : 1;
        for(let q=0; q<qty; q++) Game.equipos[i].inventario.push({...item});
    }
    Game.paso = 8; render();
}
function updatePactUI() {
    let sel = Array.from(document.querySelectorAll('.p-check:checked')).map(c=>parseInt(c.value));
    if(sel.length !== 2) return;
    let excl = [0,1,2].find(i => !sel.includes(i));
    document.getElementById('pacto-area').innerHTML = `<div class="grid">${sel.map(idx => `<div class="card"><h4>${Game.equipos[idx].nombre}</h4><select class="p-sel" data-eq="${idx}" multiple style="height:60px;">${PACTO_OBJ.map(o=>`<option value="${o.id}">${o.n}</option>`).join("")}</select></div>`).join("")}<div class="card"><h4>${Game.equipos[excl].nombre}</h4><select class="v-sel" data-eq="${excl}">${PACTO_OBJ.map(o=>`<option value="${o.id}">${o.n}</option>`).join("")}</select></div></div>`;
}
function processPact() {
    let pactantes = Array.from(document.querySelectorAll('.p-check:checked')).map(c=>parseInt(c.value));
    if(pactantes.length !== 2) return alert("Elige 2.");
    document.querySelectorAll('.p-sel').forEach(s => {
        Array.from(s.selectedOptions).forEach(o => Game.equipos[s.dataset.eq].inventario.push({...PACTO_OBJ.find(x=>x.id===o.value)}));
    });
    let excl = [0,1,2].find(i => !pactantes.includes(i));
    Game.equipos[excl].inventario.push({...PACTO_OBJ.find(x=>x.id===document.querySelector('.v-sel').value)});
    Game.equipos[excl].venganza = true;
    Game.pactoActivo = pactantes; Game.paso = 6; render();
}
function toggleDuelUI(l, a) { document.getElementById(`duel_${l}_${a}`).style.display = document.getElementById(`vic_${l}_${a}`).value !== "" ? "block" : "none"; }
function updateLuchaUI(i) { document.getElementById(`l_un_${i}`).style.display = document.getElementById(`l_act_${i}`).value === 'atk' ? 'block' : 'none'; }
function resolverPPT(l, a) {
    const vIdx = parseInt(document.getElementById(`vic_${l}_${a}`).value);
    const tieneAlianza = Game.pactoActivo.some(idx => Game.equipos[idx].inventario.some(it => it.id === 'alianza_mil'));
    if(tieneAlianza && Game.pactoActivo.includes(l) && Game.pactoActivo.includes(vIdx)) return alert("Alianza Militar.");
    if(document.getElementById(`l_act_${vIdx}`).value === 'def') return alert("Defendido.");
    const aC = document.getElementById(`selA_${l}_${a}`).value, vC = document.getElementById(`selV_${l}_${a}`).value;
    if(aC === vC) return alert("Empate.");
    if((aC==='pi' && vC==='ti') || (aC==='pa' && vC==='pi') || (aC==='ti' && vC==='pa')) {
        document.getElementById(`duel_${l}_${a}`).style.display = "none";
        document.getElementById(`choice_${l}_${a}`).style.display = "block";
        document.getElementById(`booty_${l}_${a}`).innerHTML = Game.equipos[vIdx].inventario.map((it, idx) => it.type !== 'rol' ? `<option value="${idx}">${it.n}</option>` : '').join("");
    } else { alert("Defensor gana."); render(); }
}
function confirmarRobo(l, a) {
    const vIdx = document.getElementById(`vic_${l}_${a}`).value;
    const itIdx = document.getElementById(`booty_${l}_${a}`).value;
    Game.equipos[l].inventario.push(Game.equipos[vIdx].inventario.splice(itIdx, 1)[0]);
    render();
}
function generateFieldsHTML(n, eqIdx) {
    let roles = (n==5) ? ["Ladrón", "Diplomático", "Luchador", "Recolector", "Comerciante"] : (n==4) ? ["Ladrón/Dipl.", "Luchador", "Recolector", "Comerciante"] : ["Ladrón/Dipl.", "Luchador/Recol.", "Comerciante"];
    return roles.map((r, i) => `<span class="role-tag">${r}</span><input type="text" placeholder="Nombre">`).join("");
}
function updateFieldsUI(i) { document.getElementById(`fields_${i}`).innerHTML = generateFieldsHTML(document.getElementById(`sz_${i}`).value, i); }
window.onload = render;
</script>
</body>
</html>
