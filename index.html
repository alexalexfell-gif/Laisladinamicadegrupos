<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La isla - Dinámica grupal</title>

<style>
body{
font-family: Arial;
padding:20px;
background:#eef2f3;
}

.equipo{
border:1px solid #ccc;
padding:10px;
margin:10px 0;
background:white;
}

button{
margin-top:15px;
padding:8px 15px;
}

.log{
background:#111;
color:#0f0;
padding:10px;
height:220px;
overflow:auto;
font-size:13px;
margin-top:20px;
}
</style>
</head>

<body>

<div id="contenido"></div>
<div class="log" id="log"></div>

<script>

/* ===========================
ESTADO GLOBAL
=========================== */

let paso=0;

const rolesDisponibles=[
"Ladrón",
"Luchador",
"Diplomático",
"Comerciante",
"Recolector"
];

let grupos=["Alfa","Beta","Omega"].map(nombre=>({
nombre,
miembros:Array(5).fill().map(()=>({
nombre:"",
roles:[]
})),
recursos:[]
}));

/* ===========================
FLUJO
=========================== */

function siguiente(){
paso++;
mostrar();
}

/* ===========================
RENDER
=========================== */

function mostrar(){

let html="";

/* ---------- PASO 0 ---------- */

if(paso===0){

html+=`
<h2>La isla - Dinámica grupal</h2>

<p><strong>Autor:</strong> Alejandro Scuro Rossi</p>

<hr>

<h4>Configuración de equipos</h4>
`;

grupos.forEach((g,i)=>{

html+=`<div class="equipo"><h4>${g.nombre}</h4>`;

for(let j=0;j<5;j++){
html+=`Jugador ${j+1}: <input id="jug${i}_${j}"><br>`;
}

html+="</div>";
});

html+=`<button onclick="guardarJugadores()">Comenzar</button>`;
}

/* ---------- PASO 1 ROLES ---------- */

if(paso===1){

html+="<h3>Asignación de Roles</h3>";

grupos.forEach((g,i)=>{

html+=`<div class="equipo"><h4>${g.nombre}</h4>`;

let total=g.miembros.filter(m=>m.nombre!=="").length;

g.miembros.forEach((m,j)=>{

if(m.nombre==="") return;

html+=`<div>${m.nombre}</div>`;

html+=`<select id="rol${i}_${j}">`;

rolesDisponibles.forEach(r=>{
html+=`<option>${r}</option>`;
});

html+=`</select><br>`;

});

html+="</div>";

});

html+=`<button onclick="guardarRoles()">Continuar</button>`;
}

/* ---------- RESULTADOS ---------- */

if(paso===2){
calcularResultados();
return;
}

document.getElementById("contenido").innerHTML=html;
}

/* ===========================
LOGICA
=========================== */

function guardarJugadores(){

grupos.forEach((g,i)=>{

let activos=0;

g.miembros.forEach((m,j)=>{

let val=document.getElementById(`jug${i}_${j}`).value.trim();

m.nombre=val;

if(val!=="") activos++;

});

if(activos<3){
alert("Cada equipo necesita mínimo 3 jugadores");
throw new Error();
}

});

siguiente();
}

/* -------------------------- */

function guardarRoles(){

grupos.forEach((g,i)=>{

let total=g.miembros.filter(m=>m.nombre!=="").length;

let rolesUsados=new Set();

g.miembros.forEach((m,j)=>{

if(m.nombre==="") return;

let oblig=1;

/* ===== REGLAS EXACTAS ===== */

if(total===3){
if(j===0 || j===1) oblig=2;
}

else if(total===4){
if(j===0) oblig=2;
}

else if(total===5){
oblig=1;
}

/* ===== LECTURA SELECT ===== */

let sel=document.getElementById(`rol${i}_${j}`);

if(!sel) return;

let rol=sel.value;

/* No repetir roles */

if(rolesUsados.has(rol)){
alert("No se pueden repetir roles dentro del equipo");
throw new Error();
}

rolesUsados.add(rol);

/* Guardar roles */

m.roles=Array(oblig).fill(rol);

});

});

siguiente();
}

/* -------------------------- */

function calcularResultados(){

let html="=== RESULTADOS FINALES ===<br>";

grupos.forEach(g=>{
html+=g.nombre+"<br>";
});

document.getElementById("log").innerHTML=html;
}

mostrar();

</script>

</body>
</html>
