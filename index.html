<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Isla - Alejandro Scuro Rossi</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --light: #ecf0f1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eef2f3; }
        .intro-text { line-height: 1.6; color: #555; text-align: justify; margin-bottom: 20px; }
        h1 { color: var(--primary); }
        button { background: var(--success); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; max-width: 300px; transition: 0.3s; font-size: 1rem; }
        button:hover { background: #2ecc71; transform: translateY(-1px); }
        .author-box { margin-top: 30px; border-top: 2px solid var(--light); padding-top: 15px; color: #7f8c8d; }
        .author-name { color: var(--primary); font-weight: bold; font-size: 1.1em; }
        .role-tag { font-size: 0.8em; font-weight: bold; color: var(--accent); display: block; margin-top: 5px; text-transform: uppercase; }
        select, input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="game-ui"></div>
</div>

<script>
let Game = {
    paso: 1,
    equipos: [
        { nombre: "Alfa", inventario: [], roles: {}, trades: 0 },
        { nombre: "Beta", inventario: [], roles: {}, trades: 0 },
        { nombre: "Gamma", inventario: [], roles: {}, trades: 0 }
    ]
};

function render() {
    const ui = document.getElementById('game-ui');

    // PASO 1: Portada Restaurada
    if (Game.paso === 1) {
        ui.innerHTML = `
            <div class="card" style="text-align:center">
                <h1>🏝️ La Isla: Dinámica de Supervivencia</h1>
                <div class="intro-text">
                    <p>Habéis naufragado en una isla desierta tras una tormenta devastadora. Tres equipos han logrado llegar a la orilla, pero los recursos son escasos. Solo aquellos que logren equilibrar la recolección, la defensa y la diplomacia podrán ser rescatados.</p>
                    <p><strong>Objetivo:</strong> Conseguir al menos 4 puntos de Alimento (🍎), 3 de Utensilios (🛠) y 2 de Orientación (🧭) antes de que llegue el barco de rescate.</p>
                    <p>A través de varias fases de planeación, robos nocturnos, alianzas y luchas, deberéis gestionar vuestro inventario de forma estratégica. Cada rol es vital para el éxito del grupo.</p>
                </div>
                <button onclick="Game.paso=2; render();">Comenzar Configuración</button>
                <div class="author-box">
                    <p>Una experiencia diseñada por:</p>
                    <p class="author-name">Alejandro Scuro Rossi</p>
                </div>
            </div>`;
    } 
    // PASO 2: Registro con Lógica de Roles (3, 4, 5 jugadores)
    else if (Game.paso === 2) {
        ui.innerHTML = `
            <div class="card">
                <h2>Paso 2: Registro de Sobrevivientes</h2>
                <p>Define el tamaño de cada equipo. La asignación de roles se ajustará automáticamente.</p>
                <div class="grid">${Game.equipos.map((e, i) => `
                    <div class="card">
                        <h3>Equipo ${e.nombre}</h3>
                        <label>Integrantes:</label>
                        <select id="sz_${i}" onchange="updateFields(${i})">
                            <option value="5">5 Jugadores</option>
                            <option value="4">4 Jugadores (J1 doble rol)</option>
                            <option value="3">3 Jugadores (J1 y J2 doble rol)</option>
                        </select>
                        <div id="fields_${i}">${generateFields(5, i)}</div>
                    </div>`).join("")}</div>
                <button onclick="saveRoles()" style="max-width:100%">Confirmar Equipos</button>
            </div>`;
    }
    else {
        ui.innerHTML = `<div class="card"><h2>Paso ${Game.paso}</h2><p>Lógica de juego en proceso...</p><button onclick="Game.paso=1; render();">Volver al inicio</button></div>`;
    }
}

function generateFields(numPlayers, teamIdx) {
    let html = "";
    if (numPlayers == 5) {
        html += `<span class="role-tag">Ladrón</span><input type="text" id="r0_${teamIdx}" placeholder="Nombre J1">`;
        html += `<span class="role-tag">Diplomático</span><input type="text" id="r1_${teamIdx}" placeholder="Nombre J2">`;
        html += `<span class="role-tag">Luchador</span><input type="text" id="r2_${teamIdx}" placeholder="Nombre J3">`;
        html += `<span class="role-tag">Recolector</span><input type="text" id="r3_${teamIdx}" placeholder="Nombre J4">`;
        html += `<span class="role-tag">Comerciante</span><input type="text" id="r4_${teamIdx}" placeholder="Nombre J5">`;
    } else if (numPlayers == 4) {
        html += `<span class="role-tag">Ladrón / Diplomático</span><input type="text" id="r0_${teamIdx}" placeholder="Nombre J1">`;
        html += `<span class="role-tag">Luchador</span><input type="text" id="r1_${teamIdx}" placeholder="Nombre J2">`;
        html += `<span class="role-tag">Recolector</span><input type="text" id="r2_${teamIdx}" placeholder="Nombre J3">`;
        html += `<span class="role-tag">Comerciante</span><input type="text" id="r3_${teamIdx}" placeholder="Nombre J4">`;
    } else if (numPlayers == 3) {
        html += `<span class="role-tag">Ladrón / Diplomático</span><input type="text" id="r0_${teamIdx}" placeholder="Nombre J1">`;
        html += `<span class="role-tag">Luchador / Recolector</span><input type="text" id="r1_${teamIdx}" placeholder="Nombre J2">`;
        html += `<span class="role-tag">Comerciante</span><input type="text" id="r2_${teamIdx}" placeholder="Nombre J3">`;
    }
    return html;
}

function updateFields(teamIdx) {
    const val = document.getElementById(`sz_${teamIdx}`).value;
    document.getElementById(`fields_${teamIdx}`).innerHTML = generateFields(val, teamIdx);
}

function saveRoles() {
    Game.equipos.forEach((e, i) => {
        const sz = document.getElementById(`sz_${i}`).value;
        const getName = (id) => document.getElementById(`r${id}_${i}`).value || `Jugador ${id+1}`;
        if (sz == 5) {
            e.roles = { ladron: getName(0), diplomatico: getName(1), luchador: getName(2), recolector: getName(3), comerciante: getName(4) };
        } else if (sz == 4) {
            let n = getName(0);
            e.roles = { ladron: n, diplomatico: n, luchador: getName(1), recolector: getName(2), comerciante: getName(3) };
        } else {
            let n1 = getName(0), n2 = getName(1);
            e.roles = { ladron: n1, diplomatico: n1, luchador: n2, recolector: n2, comerciante: getName(2) };
        }
    });
    alert("Equipos registrados con éxito.");
    Game.paso = 3; render();
}

window.onload = render;
</script>
</body>
</html>
