<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La Isla - Dinámica grupal</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #f4f6f9; max-width: 900px; margin: auto; }
h1, h2, h3 { text-align: center; margin: 5px 0; }
h1 { font-size: 2em; }
h2 { font-size: 1.2em; color: #555; }
h3 { font-size: 1em; color: #777; margin-bottom: 20px; }
hr { margin: 20px 0; }
textarea { width: 100%; height: 150px; padding: 10px; margin-bottom: 15px; resize: vertical; }
input, button, select { padding: 10px; margin-top: 10px; font-size: 1em; }
button { background-color: #4CAF50; color: white; border: none; cursor: pointer; }
button:disabled { background-color: #aaa; cursor: default; }
.grupo { background: white; padding: 15px; margin: 15px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
ul { padding-left: 20px; }
.objetos { margin-top: 10px; font-style: italic; color: #333; }
.paso-contenido { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-top: 20px; min-height: 150px; white-space: pre-wrap; }
.nav-btns { text-align: center; margin-top: 10px; }
.relevante { color: red; font-weight: bold; }
.usado { color: gray; font-style: italic; }
</style>
</head>
<body>

<h1>La Isla</h1>
<h2>Dinámica grupal para evaluación de liderazgo, trabajo en equipo y estrategia</h2>
<h3>por Alejandro Scuro Rossi</h3>
<hr>

<div class="paso-contenido" id="pasoContenido"></div>

<div class="nav-btns">
<button id="prevBtn" onclick="cambiarPaso(-1)" disabled>Anterior</button>
<button id="nextBtn" onclick="cambiarPaso(1)">Siguiente</button>
</div>

<script>
// Roles y objetos
const roles = ["Comerciante","Diplomático","Luchador","Ladrón","Recolector"];
const objetosRol = ["Machete","Antifaz","Maletín","Alianza militar","Guantes"];
let pasoActual = 0;
let grupos = [];

// Mapear solo los objetos que tienen un paso relevante
const objetoAPaso = {
  "Machete": 6,
  "Antifaz": 4,
  "Alianza militar": 5,
  "Guantes": 7
};

// Recursos iniciales
const recursos = [
  {nombre: "Agua", categoria:"Alimentación", puntos:1},
  {nombre: "Frutas", categoria:"Alimentación", puntos:1},
  {nombre: "Comida enlatada", categoria:"Alimentación", puntos:1},
  {nombre: "Botiquín", categoria:"Utilidad", puntos:1},
  {nombre: "Cuerda", categoria:"Utilidad", puntos:1},
  {nombre: "Martillo", categoria:"Utilidad", puntos:1},
  {nombre: "Lona", categoria:"Utilidad", puntos:1},
  {nombre: "Encendedor", categoria:"Utilidad", puntos:1},
  {nombre: "Mapa", categoria:"Orientación", puntos:1},
  {nombre: "Radio", categoria:"Orientación", puntos:1}
];

const pasos = [
  {titulo:"Paso 1: Introducción", contenido:"3 equipos en una isla, solo se podrá sobrevivir a través de acumular objetos. Cada objeto tiene una puntuación de 1 o 2 puntos en una categoría determinada.\nObjetivos a reunir: 4 puntos en Alimentación, 3 puntos en Utilidad y 2 puntos en Orientación.\nPueden obtenerse objetos repetidos a través del robo, el comercio o la lucha."},
  {titulo:"Paso 2: Formación de equipo y roles", contenido:"Aquí se generarán los grupos y se asignarán roles y objetos de rol."},
  {titulo:"Paso 3: Planeación inicial", contenido:"Selecciona 5 recursos para cada grupo.\nResumen de objetos y recursos elegidos por cada grupo."},
  {titulo:"Paso 4: Robo nocturno", contenido:"Los Ladrones de cada equipo pueden decidir robar un objeto de otro equipo o proteger los objetos de su equipo evitando robos.\nDos Ladrones pueden robar al mismo equipo."},
  {titulo:"Paso 5: Pacto", contenido:"Los Diplomáticos negocian entre sí. Aquellos dos que logren alcanzar un pacto deben darse la mano.\nObtendrán cada uno 2 recursos especiales a elegir. El Diplomático que no llegue a un pacto solo podrá elegir 1 recurso especial.\nEn caso de no llegarse a un pacto todos los Diplomáticos obtendrán 1 recurso especial.\nSi se forma una Alianza militar, los Luchadores de ambos equipos no podrán atacarse en el siguiente paso."},
  {titulo:"Paso 6: Combate", contenido:"Los Luchadores combaten entre sí. Cada Luchador dispone de un ataque.\nAtaque exitoso: roba un objeto del equipo contrario.\nDefensa exitosa: no se pierden objetos.\nEn caso de empate se repite hasta que atacante o defensor tengan éxito.\nVenganza: El luchador del equipo excluido del pacto del Paso 5 ataca 2 veces."},
  {titulo:"Paso 7: Recolección", contenido:"Los Recolectores de todos los equipos se reunirán llevando consigo los 5 objetos descartados inicialmente.\nDe esta pila de 15 objetos, cada uno podrá elegir 2 objetos."},
  {titulo:"Paso 8: Intercambio", contenido:"Los Comerciantes elegirán dos objetos para intercambiar con los demás equipos."},
  {titulo:"Paso 9: Decisión final", contenido:"Se sumarán las puntuaciones obtenidas en cada categoría. El equipo que logre alcanzar el mínimo de todas las categorías (4 puntos en Alimentación, 3 puntos en Utilidad y 2 puntos en Orientación) gana la dinámica."}
];

// Mostrar paso
function mostrarPaso(){
  let html = `<strong>${pasos[pasoActual].titulo}</strong>\n\n` + pasos[pasoActual].contenido;

  // Paso 2 → generador de grupos y selección de objetos
  if(pasoActual === 1){
    html += `<br><br>Introduce los participantes y genera los grupos y objetos de rol.`;
    html += `<br><label>Participantes (uno por línea, máximo 15):</label>
    <textarea id="participantes" placeholder="Ej: Juan Pérez&#10;María López"></textarea><br>
    <label>Número de grupos:</label>
    <input type="number" id="numGrupos" value="3" min="2" max="3"><br><br>
    <button onclick="generarGrupos()">Generar Grupos y Asignar Roles</button>
    <div id="resultado"></div>`;
  }

  // Paso 3 → selección de recursos por grupo
  if(pasoActual === 2 && grupos.length > 0){
    html += `<br><strong>Selecciona 5 recursos por grupo:</strong>`;
    grupos.forEach((grupo,i)=>{
      const g = i+1;
      html += `<div class="grupo"><h3>Grupo ${g}</h3>`;
      html += `<ul>${grupo.miembros.map((p,j)=>`<li>${p} - ${grupo.roles[j]}</li>`).join('')}</ul>`;
      html += `<p>Selecciona 5 recursos:</p>`;
      for(let r=1;r<=5;r++){
        html += `<select id="grupo${g}-rec${r}" onchange="actualizarRecursos(${g})"><option value="">--Seleccionar--</option>`;
        recursos.forEach(res=> html += `<option value="${res.nombre}">${res.nombre} (${res.categoria})</option>`);
        html += `</select> `;
      }
      html += `<br><button onclick="guardarRecursos(${g})">Guardar recursos del Grupo ${g}</button>`;
      html += `<p id="grupo${g}-recursos-asignados" class="objetos"></p></div>`;
    });
  }

  // Pasos posteriores → mostrar resumen de grupos y objetos
  if(pasoActual > 2 && grupos.length > 0){
    html += "\n\nResumen de grupos, objetos y recursos:\n";
    grupos.forEach((grupo,i)=>{
      html += `Grupo ${i+1}:\n`;
      grupo.miembros.forEach((p,j)=>{ html += `  ${p} - ${grupo.roles[j]}\n`; });
      html += "  Objetos: ";
      grupo.objetos.forEach(obj=>{
        let clase = "";
        const pasoObjeto = objetoAPaso[obj];
        if(pasoObjeto !== undefined){
          if(pasoActual + 1 === pasoObjeto) clase = "relevante";
          else if(pasoActual + 1 > pasoObjeto) clase = "usado";
        }
        html += `<span class="${clase}">${obj}</span> `;
      });
      html += "\n  Recursos: ";
      if(grupo.recursos) grupo.recursos.forEach(r=> html += `${r} `);
      html += "\n";
    });
  }

  document.getElementById("pasoContenido").innerHTML = html;
  document.getElementById("prevBtn").disabled = pasoActual === 0;
  document.getElementById("nextBtn").disabled = pasoActual === pasos.length - 1;
}

// Navegación
function cambiarPaso(direccion){
  pasoActual += direccion;
  if(pasoActual < 0) pasoActual = 0;
  if(pasoActual >= pasos.length) pasoActual = pasos.length - 1;
  mostrarPaso();
}

// Generar grupos y asignar roles
function generarGrupos(){
  const nombres = document.getElementById("participantes").value.split("\n").filter(n => n.trim() !== "");
  const numGrupos = parseInt(document.getElementById("numGrupos").value);
  if(nombres.length === 0){ alert("Introduce al menos un participante"); return; }
  if(nombres.length > 15){ alert("Máximo 15 participantes"); return; }

  // Mezclar participantes
  for(let i=nombres.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [nombres[i], nombres[j]] = [nombres[j], nombres[i]];
  }

  grupos = Array.from({length: numGrupos}, ()=>({miembros:[], roles:[], objetos:[], recursos:[]}));
  nombres.forEach((nombre,index)=>{
    const g = index % numGrupos;
    grupos[g].miembros.push(nombre);
    grupos[g].roles.push(roles[index % roles.length]);
  });

  // Crear HTML para seleccionar objetos
  let html = "";
  grupos.forEach((grupo,i)=>{
    const grupoNum = i+1;
    html += `<div class="grupo"><h3>Grupo ${grupoNum}</h3><ul>`;
    grupo.miembros.forEach((p,j)=>{ html += `<li>${p} - ${grupo.roles[j]}</li>`; });
    html += `</ul><p>Elegir 2 objetos de rol:</p>`;
    html += `<select id="grupo${grupoNum}-obj1" onchange="actualizarOpciones(${grupoNum})"><option value="">--Seleccionar--</option>`;
    objetosRol.forEach(obj => html += `<option value="${obj}">${obj}</option>`);
    html += `</select>`;
    html += `<select id="grupo${grupoNum}-obj2"><option value="">--Seleccionar--</option>`;
    objetosRol.forEach(obj => html += `<option value="${obj}">${obj}</option>`);
    html += `</select>`;
    html += ` <button onclick="guardarObjetos(${grupoNum})">Guardar objetos del grupo ${grupoNum}</button>`;
    html += `<p id="grupo${grupoNum}-objetos-asignados" class="objetos"></p></div>`;
  });
  document.getElementById("resultado").innerHTML = html;
}

// Guardar objetos
function guardarObjetos(numGrupo){
  const obj1 = document.getElementById(`grupo${numGrupo}-obj1`).value;
  const obj2 = document.getElementById(`grupo${numGrupo}-obj2`).value;
  if(obj1 === "" || obj2 === ""){ alert("Selecciona ambos objetos de rol"); return; }
  if(obj1 === obj2){ alert("No se puede seleccionar el mismo objeto dos veces"); return; }
  grupos[numGrupo-1].objetos = [obj1, obj2];
  document.getElementById(`grupo${numGrupo}-objetos-asignados`).innerText = `Objetos elegidos: ${obj1}, ${obj2}`;
}

// Guardar recursos
function guardarRecursos(numGrupo){
  const seleccion = [];
  for(let r=1;r<=5;r++){
    const val = document.getElementById(`grupo${numGrupo}-rec${r}`).value;
    if(val === "") { alert("Selecciona los 5 recursos"); return; }
    if(seleccion.includes(val)){ alert("No se puede seleccionar el mismo recurso dos veces"); return; }
    seleccion.push(val);
  }
  grupos[numGrupo-1].recursos = seleccion;
  document.getElementById(`grupo${numGrupo}-recursos-asignados`).innerText = `Recursos elegidos: ${seleccion.join(", ")}`;
}

// Evitar duplicados en recursos
function actualizarRecursos(grupoNum){
  const seleccionados = [];
  for(let r=1;r<=5;r++){
    const sel = document.getElementById(`grupo${grupoNum}-rec${r}`);
    seleccionados.push(sel.value);
    Array.from(sel.options).forEach(opt => opt.disabled = false);
    seleccionados.forEach(v=>{
      if(v!=="" && v!==sel.value){
        const opt = Array.from(sel.options).find(o=>o.value===v);
        if(opt) opt.disabled = true;
      }
    });
  }
}

// Mostrar primer paso al cargar
mostrarPaso();
</script>
</body>
</html>
