<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La Isla - Versión Profesional</title>

<style>

body{
font-family: Arial;
background:#eef2f3;
padding:25px;
}

.card{
background:white;
border-radius:12px;
padding:18px;
margin-bottom:15px;
box-shadow:0 0 8px rgba(0,0,0,0.08);
}

button{
padding:10px 18px;
margin-top:15px;
cursor:pointer;
}

.log{
background:#111;
color:#0f0;
height:200px;
overflow:auto;
padding:12px;
margin-top:20px;
font-size:13px;
}

</style>
</head>

<body>

<div id="app"></div>
<div class="log" id="log"></div>

<script>

/* ============================
ESTADO DEL JUEGO
============================ */

const Game = {

fase:0,

roles:[
"Ladrón",
"Luchador",
"Diplomático",
"Comerciante",
"Recolector"
],

grupos:["Alfa","Beta","Omega"].map(nombre=>({

nombre,

miembros:Array(5).fill().map(()=>({
nombre:"",
roles:[]
})),

recursos:[]

}))

};

/* ============================
RENDER
============================ */

function render(){

let html="";

/* ===== INTRO ===== */

if(Game.fase===0){

html+=`
<h2>🏝 La Isla - Dinámica grupal profesional</h2>

<p><strong>Autor:</strong> Alejandro Scuro Rossi</p>

<div class="card">

<h3>Introducción</h3>

<p>
Tras un naufragio, tres equipos llegan a una isla desconocida.
Deben organizarse, negociar, luchar y sobrevivir.
</p>

<h4>Objetivos de supervivencia</h4>

<ul>
<li>4 puntos en Alimentación</li>
<li>3 puntos en Utilidad</li>
<li>2 puntos en Orientación</li>
</ul>

</div>

<div class="card">

<h3>Configuración de equipos</h3>
`;

Game.grupos.forEach((g,i)=>{

html+=`<div class="card"><h4>${g.nombre}</h4>`;

for(let j=0;j<5;j++){

html+=`
Jugador ${j+1}
<input id="jug${i}_${j}">
<br>
`;

}

html+="</div>";

});

html+=`
<button onclick="guardarJugadores()">
Comenzar dinámica
</button>
`;

}

/* ===== ROLES ===== */

if(Game.fase===1){

html+=`<h3>Asignación de Roles</h3>`;

Game.grupos.forEach((g,i)=>{

html+=`<div class="card"><h4>${g.nombre}</h4>`;

let jugadores=g.miembros.filter(m=>m.nombre);

let total=jugadores.length;

/* Control matemático de roles */

g.miembros.forEach((m,j)=>{

if(!m.nombre) return;

let multiplicador=1;

/* REGLA PROFESIONAL */

if(total===3 && (j===0 || j===1)){
multiplicador=2;
}

if(total===4 && j===0){
multiplicador=2;
}

html+=`
<div>${m.nombre}</div>

<select id="rol${i}_${j}">
${Game.roles.map(r=>`<option>${r}</option>`).join("")}
</select>
<br>
`;

m._multiplicador=multiplicador;

});

html+="</div>";

});

html+=`
<button onclick="guardarRoles()">
Continuar
</button>
`;

}

/* ===== FINAL ===== */

if(Game.fase===2){

html+=`
<div class="card">
<h2>Dinámica lista</h2>
<p>Fase de juego completada.</p>
</div>
`;
}

document.getElementById("app").innerHTML=html;

}

/* ============================
CONTROLADORES
============================ */

function guardarJugadores(){

Game.grupos.forEach((g,i)=>{

let activos=0;

g.miembros.forEach((m,j)=>{

let val=document.getElementById(`jug${i}_${j}`).value.trim();

m.nombre=val;

if(val) activos++;

});

if(activos<3){
alert("Cada equipo necesita mínimo 3 jugadores");
throw new Error();
}

});

Game.fase=1;
render();

}

/* --------------------------- */

function guardarRoles(){

Game.grupos.forEach((g,i)=>{

let jugadores=g.miembros.filter(m=>m.nombre);

let total=jugadores.length;

let usados=new Set();

/* Distribución profesional */

g.miembros.forEach((m,j)=>{

if(!m.nombre) return;

let select=document.getElementById(`rol${i}_${j}`);
if(!select) return;

let rol=select.value;

if(usados.has(rol)){
alert("No se pueden repetir roles en el equipo");
throw new Error();
}

usados.add(rol);

let cantidad=1;

if(total===3 && (j===0 || j===1)){
cantidad=2;
}

if(total===4 && j===0){
cantidad=2;
}

m.roles=Array(cantidad).fill(rol);

});

});

Game.fase=2;
render();

}

/* ============================ */

render();

</script>

</body>
</html>
</html>
