<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La isla - Dinámica grupal</title>

<style>

body{
font-family: Arial;
padding:20px;
background:#eef2f3;
}

.equipo{
border:1px solid #ccc;
padding:10px;
margin:10px 0;
background:white;
padding:15px;
}

button{
margin-top:15px;
padding:10px;
}

.log{
background:#111;
color:#0f0;
padding:10px;
height:220px;
overflow:auto;
margin-top:20px;
}

</style>
</head>

<body>

<div id="app"></div>
<div class="log" id="log"></div>

<script>

/* ===============================
GAME STATE (MODELO CENTRAL)
=============================== */

const GameState = {

fase:0,

rolesDisponibles:[
"Ladrón",
"Luchador",
"Diplomático",
"Comerciante",
"Recolector"
],

grupos:["Alfa","Beta","Omega"].map(nombre=>({

nombre,

miembros:Array(5).fill().map(()=>({
nombre:"",
roles:[]
})),

recursos:[]

}))

};

/* ===============================
ENGINE
=============================== */

const GameEngine = {

validarJugadores(){

for(let g of GameState.grupos){

let activos=g.miembros.filter(m=>m.nombre!=="").length;

if(activos<3){
alert("Cada equipo necesita mínimo 3 jugadores");
return false;
}

}

return true;
},

guardarJugadores(){

GameState.grupos.forEach((g,i)=>{

g.miembros.forEach((m,j)=>{

let val=document.getElementById(`jug${i}_${j}`).value.trim();

m.nombre=val;

});

});

if(!this.validarJugadores()) return;

GameState.fase=1;
Renderer.render();

},

guardarRoles(){

GameState.grupos.forEach((g,i)=>{

let jugadores=g.miembros.filter(m=>m.nombre!=="");

let total=jugadores.length;

let rolesUsados=new Set();

/* Distribución matemática exacta */

g.miembros.forEach((m,j)=>{

if(m.nombre==="") return;

let select=document.getElementById(`rol${i}_${j}`);
if(!select) return;

let rol=select.value;

/* No repetir roles */

if(rolesUsados.has(rol)){
alert("No se pueden repetir roles dentro del equipo");
throw new Error();
}

rolesUsados.add(rol);

/* Cantidad de roles según regla */

let cantidad=1;

if(total===3 && (j===0 || j===1)){
cantidad=2;
}

else if(total===4 && j===0){
cantidad=2;
}

else if(total===5){
cantidad=1;
}

m.roles=Array(cantidad).fill(rol);

});

});

GameState.fase=2;
Renderer.render();

}

};

/* ===============================
RENDERER
=============================== */

const Renderer={

render(){

let html="";

/* INTRO */

if(GameState.fase===0){

html+=`
<h2>La isla - Dinámica grupal</h2>

<p><strong>Autor:</strong> Alejandro Scuro Rossi</p>

<p>
Dinámica grupal para liderazgo, trabajo en equipo y estrategia.
</p>

<hr>

<h3>Configuración de equipos</h3>
`;

GameState.grupos.forEach((g,i)=>{

html+=`<div class="equipo"><h4>${g.nombre}</h4>`;

for(let j=0;j<5;j++){
html+=`
Jugador ${j+1}:
<input id="jug${i}_${j}">
<br>
`;
}

html+=`</div>`;

});

html+=`
<button onclick="GameEngine.guardarJugadores()">
Comenzar
</button>
`;

}

/* ROLES */

if(GameState.fase===1){

html+=`<h3>Asignación de Roles</h3>`;

GameState.grupos.forEach((g,i)=>{

html+=`<div class="equipo"><h4>${g.nombre}</h4>`;

g.miembros.forEach((m,j)=>{

if(m.nombre==="") return;

html+=`
<div>${m.nombre}</div>

<select id="rol${i}_${j}">
${GameState.rolesDisponibles.map(r=>
`<option>${r}</option>`).join("")}
</select>
<br>
`;

});

html+="</div>";

});

html+=`
<button onclick="GameEngine.guardarRoles()">
Continuar
</button>
`;

}

/* FINAL */

if(GameState.fase===2){

html+=`<h3>Dinámica lista</h3>`;
html+=`<p>Fase de juego completada.</p>`;

}

document.getElementById("app").innerHTML=html;

}

};

/* ===============================
INICIALIZAR
=============================== */

Renderer.render();

</script>

</body>
</html>
