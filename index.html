<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La isla - Dinámica grupal</title>

<style>

body{
font-family: Arial;
padding:20px;
background:#eef2f3;
}

.equipo{
border:1px solid #ccc;
padding:10px;
margin:10px 0;
background:white;
}

button{
margin-top:15px;
padding:8px 15px;
}

.log{
background:#111;
color:#0f0;
padding:10px;
height:220px;
overflow:auto;
font-size:13px;
margin-top:20px;
}

</style>
</head>

<body>

<div id="contenido"></div>
<div class="log" id="log"></div>

<script>

/* ===============================
ESTADO GLOBAL
=============================== */

let paso=0;

/* Roles */

const rolesDisponibles=[
"Ladrón",
"Luchador",
"Diplomático",
"Comerciante",
"Recolector"
];

/* Grupos */

let grupos=["Alfa","Beta","Omega"].map(nombre=>({

nombre,

miembros:Array(5).fill().map(()=>({
nombre:"",
roles:[]
})),

recursos:[]

}));

/* ===============================
FLUJO
=============================== */

function siguiente(){
paso++;
mostrar();
}

/* ===============================
RENDER
=============================== */

function mostrar(){

let html="";

/* ===== INTRODUCCIÓN ===== */

if(paso===0){

html+=`
<h2>La isla - Dinámica grupal</h2>

<p><strong>Autor:</strong> Alejandro Scuro Rossi</p>

<p>
Dinámica grupal para la evaluación del liderazgo,
trabajo en equipo y estrategia.
</p>

<hr>

<h3>Introducción</h3>

<p>
Tras un naufragio, tres equipos han llegado a una isla desconocida.
Deberán organizarse, conseguir recursos, negociar, robar, luchar
y sobrevivir.
</p>

<h4>Objetivos de supervivencia</h4>

<ul>
<li>4 puntos en Alimentación</li>
<li>3 puntos en Utilidad</li>
<li>2 puntos en Orientación</li>
</ul>

<hr>

<h4>Reglas</h4>

<ul>
<li>Mínimo 2 equipos</li>
<li>Mínimo 3 jugadores por equipo</li>
</ul>

<hr>

<h4>Configuración de equipos</h4>
`;

grupos.forEach((g,i)=>{

html+=`<div class="equipo"><h4>${g.nombre}</h4>`;

for(let j=0;j<5;j++){
html+=`Jugador ${j+1}: <input id="jug${i}_${j}"><br>`;
}

html+="</div>";

});

html+=`<button onclick="guardarJugadores()">Comenzar</button>`;
}

/* ===== ROLES ===== */

if(paso===1){

html+=`<h3>Asignación de Roles</h3>`;

const rolesDisponiblesLocal=[
"Ladrón","Luchador","Diplomático","Comerciante","Recolector"
];

grupos.forEach((g,i)=>{

html+=`<div class="equipo"><h4>${g.nombre}</h4>`;

let jugadores=g.miembros.filter(m=>m.nombre!=="");

let total=jugadores.length;

g.miembros.forEach((m,j)=>{

if(m.nombre==="") return;

html+=`<div>${m.nombre}</div>`;

html+=`<select id="rol${i}_${j}">`;

rolesDisponiblesLocal.forEach(r=>{
html+=`<option>${r}</option>`;
});

html+=`</select><br>`;

});

html+="</div>";

});

html+=`<button onclick="guardarRoles()">Continuar</button>`;
}

/* RESULTADOS */

if(paso===2){
calcularResultados();
return;
}

document.getElementById("contenido").innerHTML=html;

}

/* ===============================
LOGICA
=============================== */

function guardarJugadores(){

grupos.forEach((g,i)=>{

let activos=0;

g.miembros.forEach((m,j)=>{

let val=document.getElementById(`jug${i}_${j}`).value.trim();

m.nombre=val;

if(val!=="") activos++;

});

if(activos<3){
alert("Cada equipo necesita mínimo 3 jugadores");
throw new Error();
}

});

siguiente();
}

/* ----------------------------- */

function guardarRoles(){

grupos.forEach((g,i)=>{

let jugadores=g.miembros.filter(m=>m.nombre!=="");

let total=jugadores.length;

/* Control de repetición de roles */
let rolesUsados=new Set();

/* Distribución exacta */

g.miembros.forEach((m,j)=>{

if(m.nombre==="") return;

let select=document.getElementById(`rol${i}_${j}`);
if(!select) return;

let rol=select.value;

/* No repetir roles dentro del equipo */

if(rolesUsados.has(rol)){
alert("No se pueden repetir roles dentro del equipo");
throw new Error();
}

rolesUsados.add(rol);

/* ===== REGLA DE DISTRIBUCIÓN ===== */

let cantidad=1;

/* 3 jugadores → jugador 1 y 2 tienen 2 roles */
if(total===3 && (j===0 || j===1)){
cantidad=2;
}

/* 4 jugadores → jugador 1 tiene 2 roles */
else if(total===4 && j===0){
cantidad=2;
}

/* 5 jugadores → todos 1 rol */
else if(total===5){
cantidad=1;
}

/* Guardar roles */

m.roles=Array(cantidad).fill(rol);

});

});

siguiente();
}

/* ----------------------------- */

function calcularResultados(){

document.getElementById("log").innerHTML=
"=== RESULTADOS FINALES ===";

}

mostrar();

</script>

</body>
</html>
