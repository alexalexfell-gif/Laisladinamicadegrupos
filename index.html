<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La isla - Dinámica grupal</title>

<style>

body{
font-family: Arial;
padding:20px;
background:#eef2f3;
}

h3{margin-top:30px}

.equipo{
border:1px solid #ccc;
padding:10px;
margin:10px 0;
background:white;
}

.destacado{
color:#b30000;
font-weight:bold;
}

button{
margin-top:15px;
padding:8px 15px;
}

.log{
background:#111;
color:#0f0;
padding:10px;
height:220px;
overflow:auto;
font-size:13px;
margin-top:20px;
}

</style>
</head>

<body>

<div id="contenido"></div>
<div class="log" id="log"></div>

<script>

/* =============================
CONFIGURACIÓN GLOBAL
============================= */

let paso=0;

let pilaRecoleccion=[];

const recursosBase=[
{nombre:"Agua",categoria:"Alimentación",puntos:1},
{nombre:"Fruta",categoria:"Alimentación",puntos:1},
{nombre:"Comida enlatada",categoria:"Alimentación",puntos:1},
{nombre:"Botiquín",categoria:"Utilidad",puntos:1},
{nombre:"Cuerda",categoria:"Utilidad",puntos:1},
{nombre:"Martillo",categoria:"Utilidad",puntos:1},
{nombre:"Mapa",categoria:"Orientación",puntos:1},
{nombre:"Radio",categoria:"Orientación",puntos:1}
];

const recursosEspeciales=[
{nombre:"Caña de pescar",categoria:"Alimentación",puntos:2},
{nombre:"Mochila",categoria:"Utilidad",puntos:2},
{nombre:"Encendedor",categoria:"Utilidad",puntos:2}
];

let grupos=["Alfa","Beta","Omega"].map(nombre=>({
nombre,
miembros:Array(5).fill().map(()=>({nombre:"",roles:[]}))
}));

let logJuego=[];

/* =============================
UTILIDADES
============================= */

function siguiente(){
paso++;
mostrar();
}

function mostrarLog(){
document.getElementById("log").innerHTML=
logJuego.join("<br>");
}

function buscarRol(grupo,rol){
for(let m of grupo.miembros){
if(m.roles.includes(rol)) return m;
}
return null;
}

function actualizarResumen(){
grupos.forEach(g=>{
let resumen={};

g.recursos?.forEach(r=>{
resumen[r]=(resumen[r]||0)+1;
});

g.resumen=resumen;
});
}

/* =============================
RENDERIZADO
============================= */

function mostrar(){

let html="";

/* -------- PASO 0 -------- */

if(paso===0){

html+=`
<h2>La isla - Dinámica grupal</h2>

<p><strong>Autor:</strong> Alejandro Scuro Rossi</p>

<p>Dinámica grupal para liderazgo, trabajo en equipo y estrategia.</p>

<hr>

<h4>📌 Reglas</h4>

<ul>
<li>Mínimo 2 equipos</li>
<li>Mínimo 3 jugadores por equipo</li>
</ul>

<hr>

<h4>Configuración de equipos</h4>
`;

grupos.forEach((g,i)=>{

html+=`<div class="equipo"><h4>${g.nombre}</h4>`;

for(let j=0;j<5;j++){
html+=`Jugador ${j+1}: <input id="jug${i}_${j}"><br>`;
}

html+="</div>";

});

html+=`<button onclick="guardarJugadores()">Comenzar partida</button>`;
}

/* -------- PASO 1 ROLES -------- */

if(paso===1){

html+="<h3>Asignación de Roles</h3>";

grupos.forEach((g,i)=>{

html+=`<div class="equipo"><h4>${g.nombre}</h4>`;

let total=g.miembros.filter(m=>m.nombre!=="").length;

g.miembros.forEach((m,j)=>{

if(m.nombre==="") return;

let oblig=1;

/* Reglas de roles */

if(total===3){
if(j===0 || j===1) oblig=2;
}

else if(total===4){
if(j===0) oblig=2;
}

else if(total===5){
oblig=1;
}

/* Selector */

html+=`
<div>${m.nombre}</div>

<select id="rol${i}_${j}">
<option>Ladrón</option>
<option>Luchador</option>
<option>Diplomático</option>
<option>Comerciante</option>
<option>Recolector</option>
</select><br>
`;

});

html+="</div>";

});

html+=`<button onclick="guardarRoles()">Continuar</button>`;
}

/* -------- PASO 2 PLANEACIÓN -------- */

if(paso===2){

html+="<h3>Planeación inicial (5 objetos base)</h3>";

grupos.forEach((g,i)=>{
html+=selectorObjetosBase(i,5);
});

html+=`<button onclick="resolverPlaneacion()">Continuar</button>`;
}

/* -------- PASO 3 ROBO -------- */

if(paso===3){

html+="<h3>Robo Nocturno</h3>";

grupos.forEach((g,i)=>{

html+=`
<div class="equipo">

<strong>${g.nombre}</strong>

<select id="accion${i}">
<option value="robar">Robar</option>
<option value="proteger">Proteger</option>
</select>

<select id="objetivo${i}">
${grupos.map((x,j)=>
j!==i?`<option value="${j}">${x.nombre}</option>`:""
).join("")}
</select>

</div>
`;

});

html+=`<button onclick="resolverRobo()">Continuar</button>`;
}

/* -------- PASO 4 COMBATE -------- */

if(paso===4){

html+="<h3>Combate</h3>";

grupos.forEach((g,i)=>{

html+=`
<div class="equipo">

<strong>${g.nombre}</strong>

<select id="ataque${i}">
${grupos.map((x,j)=>
j!==i?`<option value="${j}">${x.nombre}</option>`:""
).join("")}
</select>

<select id="juego${i}">
<option>Piedra</option>
<option>Papel</option>
<option>Tijera</option>
</select>

</div>
`;

});

html+=`<button onclick="resolverCombate()">Continuar</button>`;
}

/* -------- PASO 5 DIPLOMACIA -------- */

if(paso===5){

html+="<h3>Diplomacia (objetos especiales)</h3>";

grupos.forEach((g,i)=>{
html+=selectorObjetosEspeciales(i,2);
});

html+=`<button onclick="resolverDiplomacia()">Continuar</button>`;
}

/* -------- PASO 6 RECOLECCIÓN -------- */

if(paso===6){

html+="<h3>Recolección Global</h3>";

if(pilaRecoleccion.length===0)
inicializarPila();

grupos.forEach((g,i)=>{

let recolector=buscarRol(g,"Recolector");
if(!recolector) return;

html+=`<div class="equipo"><strong>${g.nombre}</strong><br>`;

for(let x=0;x<2;x++){

html+=`
<select id="rec${i}_${x}">
${pilaRecoleccion.map(r=>`<option>${r}</option>`).join("")}
</select><br>
`;

}

html+="</div>";

});

html+=`<button onclick="resolverRecoleccion()">Continuar</button>`;
}

/* -------- RESULTADOS -------- */

if(paso===7){

calcularResultados();
return;
}

document.getElementById("contenido").innerHTML=html;
mostrarLog();
}

/* =============================
FUNCIONES LOGICAS
============================= */

function selectorObjetosBase(i,cantidad){

let html=`<div class="equipo"><h4>${grupos[i].nombre}</h4>`;

for(let x=0;x<cantidad;x++){

html+=`
<select id="esp${i}_${x}">
${recursosBase.map(r=>`<option>${r.nombre}</option>`).join("")}
</select><br>
`;

}

html+="</div>";

return html;
}

function selectorObjetosEspeciales(i,cantidad){

let html=`<div class="equipo"><h4>${grupos[i].nombre}</h4>`;

for(let x=0;x<cantidad;x++){

html+=`
<select id="dip${i}_${x}">
${recursosEspeciales.map(r=>`<option>${r.nombre}</option>`).join("")}
</select><br>
`;

}

html+="</div>";

return html;
}

function guardarJugadores(){

grupos.forEach((g,i)=>{

let activos=0;

g.miembros.forEach((m,j)=>{

let val=document.getElementById(`jug${i}_${j}`).value.trim();

m.nombre=val;

if(val!=="") activos++;

});

if(activos<3){
alert("Cada equipo necesita mínimo 3 jugadores");
throw new Error();
}

});

siguiente();
}

function guardarRoles(){

grupos.forEach(g=>{
g.miembros.forEach((m,j)=>{

let sel=document.getElementById(`rol0_${j}`);

if(sel) m.roles=[sel.value];

});
});

siguiente();
}

function resolverPlaneacion(){

grupos.forEach((g,i)=>{

g.recursos=[];

document.querySelectorAll(`[id^="esp${i}_"]`).forEach(sel=>{
g.recursos.push(sel.value);
});

});

actualizarResumen();
siguiente();
}

function resolverRobo(){

grupos.forEach((g,i)=>{

let accion=document.getElementById(`accion${i}`).value;
let obj=parseInt(document.getElementById(`objetivo${i}`).value);

if(accion==="robar"){

let victima=grupos[obj];

if(victima.recursos.length)
g.recursos.push(victima.recursos.pop());

}

});

actualizarResumen();
siguiente();
}

function resolverCombate(){

let reglas={
"Piedra":"Tijera",
"Tijera":"Papel",
"Papel":"Piedra"
};

grupos.forEach((g,i)=>{

let rivalSel=document.getElementById(`ataque${i}`);
if(!rivalSel) return;

let rival=grupos[parseInt(rivalSel.value)];

let jugada=document.getElementById(`juego${i}`).value;

while(true){

let jugadaRival=["Piedra","Papel","Tijera"][Math.floor(Math.random()*3)];

if(reglas[jugada]===jugadaRival){

if(rival.recursos.length)
g.recursos.push(rival.recursos.pop());

break;
}
else if(reglas[jugadaRival]===jugada){
break;
}

}

});

actualizarResumen();
siguiente();
}

function resolverDiplomacia(){

grupos.forEach((g,i)=>{

document.querySelectorAll(`[id^="dip${i}_"]`).forEach(sel=>{
g.recursos.push(sel.value);
});

});

actualizarResumen();
siguiente();
}

function resolverRecoleccion(){

grupos.forEach((g,i)=>{

let recolector=buscarRol(g,"Recolector");

if(!recolector) return;

for(let x=0;x<2;x++){

let sel=document.getElementById(`rec${i}_${x}`);
if(sel) g.recursos.push(sel.value);

}

});

actualizarResumen();
siguiente();
}

function calcularResultados(){

let ganadores=[];

logJuego.push("=== RESULTADOS FINALES ===");

grupos.forEach(g=>{

let puntos={Alimentación:0,Utilidad:0,Orientación:0};

g.recursos.forEach(nombre=>{
let r=[...recursosBase,...recursosEspeciales]
.find(x=>x.nombre===nombre);

if(r) puntos[r.categoria]+=r.puntos;
});

if(puntos.Alimentación>=4 &&
puntos.Utilidad>=3 &&
puntos.Orientación>=2){

ganadores.push(g.nombre);
logJuego.push(g.nombre+" SOBREVIVE");
}
else logJuego.push(g.nombre+" NO sobrevive");

});

if(ganadores.length)
logJuego.push("🏝 Sobrevivientes: "+ganadores.join(","));

mostrarLog();
}

function inicializarPila(){

let todos=[...recursosBase,...recursosEspeciales];

pilaRecoleccion=[];

for(let i=0;i<15;i++){
pilaRecoleccion.push(
todos[Math.floor(Math.random()*todos.length)].nombre
);
}

}

mostrar();

</script>
</body>
</html>
