<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Isla - Dinámica Grupal</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --light: #ecf0f1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; }
        .scoreboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .score-card { background: var(--primary); color: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eef2f3; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        button { background: var(--success); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; font-size: 1rem; margin-top: 10px; }
        button:hover { background: #2ecc71; transform: translateY(-1px); }
        .role-tag { font-size: 0.8em; font-weight: bold; color: var(--accent); display: block; margin-top: 5px; text-transform: uppercase; }
        .player-name { font-weight: bold; color: var(--primary); border-bottom: 1px solid #eee; margin-bottom: 5px; padding-bottom: 2px; }
        .instruction-highlight { color: #c0392b; font-weight: bold; background: #fff3f3; padding: 15px; border-radius: 8px; border: 1px dashed #e74c3c; margin-bottom: 20px; text-align: center; }
        .kbd { background: #eee; border-radius: 3px; border: 1px solid #b4b4b4; padding: 1px 4px; font-family: monospace; font-size: 0.9em; }
        select, input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .recoleccion-list { display: flex; justify-content: space-around; background: #eee; padding: 10px; border-radius: 8px; margin-bottom: 20px; }
        .recoleccion-item { padding: 5px 10px; border-radius: 4px; font-weight: bold; opacity: 0.4; }
        .recoleccion-item.active { opacity: 1; background: var(--warning); color: white; transform: scale(1.1); }
    </style>
</head>
<body>

<div class="container">
    <div id="scoreboard" class="scoreboard" style="display:none;"></div>
    <div id="game-ui"></div>
</div>

<script>
const CATALOGO_BASE_UNICO = [
    { id: "agua", n: "Agua", c: "ali", p: 1, type: "base" },
    { id: "fruta", n: "Frutas", c: "ali", p: 1, type: "base" },
    { id: "latas", n: "Enlatados", c: "ali", p: 1, type: "base" },
    { id: "botiquin", n: "Botiquín", c: "uti", p: 1, type: "base" },
    { id: "cuerda", n: "Cuerda", c: "uti", p: 1, type: "base" },
    { id: "martillo", n: "Martillo", c: "uti", p: 1, type: "base" },
    { id: "lona", n: "Lona", c: "uti", p: 1, type: "base" },
    { id: "encendedor", n: "Encendedor", c: "uti", p: 1, type: "base" },
    { id: "mapa", n: "Mapa", c: "ori", p: 1, type: "base" },
    { id: "radio", n: "Radio", c: "ori", p: 1, type: "base" }
];

const ROLES_OBJ = [
    { id: "antifaz", n: "Antifaz (Ladrón)", c: "uti", p: 1, type: "rol" },
    { id: "guantes", n: "Guantes (Recolector)", c: "ali", p: 1, type: "rol" },
    { id: "machete", n: "Machete (Luchador)", c: "uti", p: 1, type: "rol" },
    { id: "maletin", n: "Maletín (Comerciante)", c: "uti", p: 1, type: "rol" },
    { id: "alianza_mil", n: "Alianza militar (Diplomático)", c: "ori", p: 1, type: "rol" }
];

const PACTO_OBJ = [
    { id: "pesca", n: "Caña de pescar", c: "ali", p: 2, type: "base" },
    { id: "mochila", n: "Mochila", c: "uti", p: 2, type: "base" },
    { id: "brujula", n: "Brújula", c: "ori", p: 2, type: "base" }
];

let Game = {
    paso: 1,
    equipos: [
        { nombre: "Alfa", inventario: [], roles: {}, trades: 0, attacks: 1 },
        { nombre: "Beta", inventario: [], roles: {}, trades: 0, attacks: 1 },
        { nombre: "Gamma", inventario: [], roles: {}, trades: 0, attacks: 1 }
    ],
    descarte: [], 
    recoleccionTurno: 0, 
    ordenRecoleccion: [0, 1, 2, 2, 1, 0] 
};

function render() {
    const ui = document.getElementById('game-ui');
    const sb = document.getElementById('scoreboard');

    // Scoreboard
    if (Game.paso >= 3 && Game.paso < 9) {
        sb.style.display = 'grid';
        sb.innerHTML = Game.equipos.map(e => {
            const p = e.inventario.reduce((acc, i) => { acc[i.c] = (acc[i.c] || 0) + i.p; return acc; }, { ali:0, uti:0, ori:0 });
            return `<div class="score-card"><small>${e.nombre}</small><div>🍎${p.ali} 🛠${p.uti} 🧭${p.ori}</div></div>`;
        }).join("");
    } else { sb.style.display = 'none'; }

    // PASO 1: Inicio
    if (Game.paso === 1) {
        ui.innerHTML = `<div class="card" style="text-align:center"><h1>🏝️ La Isla</h1><button onclick="Game.paso=2; render();">Iniciar Configuración</button></div>`;
    } 
    // PASO 2: Registro con Roles
    else if (Game.paso === 2) {
        ui.innerHTML = `<div class="card"><h2>Paso 2: Registro de Sobrevivientes</h2><div class="grid">${Game.equipos.map((e, i) => `
            <div class="card"><h3>Equipo ${e.nombre}</h3>
            <select id="sz_${i}" onchange="updateFields(${i})"><option value="5">5 Miembros</option><option value="4">4 Miembros</option><option value="3">3 Miembros</option></select>
            <div id="fields_${i}">${generateFields(5, i)}</div></div>`).join("")}</div>
            <button onclick="saveRoles()">Confirmar Equipos</button></div>`;
    }
    // PASO 3: Planeación
    else if (Game.paso === 3) {
        ui.innerHTML = `<div class="card"><h2>Paso 3: Planeación</h2><p class="instruction-highlight">Cada equipo elige 5 objetos base.</p><div class="grid">${Game.equipos.map((e, i) => `<div class="card"><h3>${e.nombre}</h3><select id="p_${i}" multiple style="height:200px;">${CATALOGO_BASE_UNICO.map(o => `<option value="${o.id}">${o.n}</option>`).join("")}</select></div>`).join("")}</div><button onclick="saveInvPaso3()">Siguiente</button></div>`;
    }
    // PASO 3.5: Objetos de Rol
    else if (Game.paso === 3.5) {
        ui.innerHTML = `<div class="card"><h2>Paso 3.5: Equipamiento de Roles</h2><div class="grid">${Game.equipos.map((e, i) => `<div class="card"><h3>${e.nombre}</h3><p>Elijan 2 objetos especiales:</p><select id="ro_${i}" multiple style="height:120px;">${ROLES_OBJ.map(o => `<option value="${o.id}">${o.n}</option>`).join("")}</select></div>`).join("")}</div><button onclick="saveRoleInv()">Confirmar</button></div>`;
    }
    // PASO 4: Robo Nocturno (Nombres explícitos)
    else if (Game.paso === 4) {
        ui.innerHTML = `<div class="card"><h2>Paso 4: Robo Nocturno</h2><p class="instruction-highlight">Solo los Ladrones actúan en este turno.</p><div class="grid">${Game.equipos.map((e, i) => `
            <div class="card"><div class="player-name">${e.roles.ladron} (Ladrón)</div><h3>Equipo ${e.nombre}</h3>
            <select id="a_${i}" onchange="toggleRoboUI(${i})"><option value="def">🛡️ Defender</option><option value="atk">👤 Robar</option></select>
            <div id="u_${i}" style="display:none; margin-top:10px;"><select id="v_${i}" onchange="loadVictimInv(${i})"><option value="">¿A quién roba ${e.roles.ladron}?</option>${Game.equipos.map((v, vi) => i!==vi ? `<option value="${vi}">${v.nombre}</option>` : '').join("")}</select><select id="it_${i}_1"></select></div></div>`).join("")}</div><button onclick="processNight()">Finalizar Robo</button></div>`;
    }
    // PASO 5: Alianza (Diplomáticos)
    else if (Game.paso === 5) {
        ui.innerHTML = `<div class="card"><h2>Paso 5: Alianza Diplomática</h2><p class="instruction-highlight">Los Diplomáticos de 2 equipos deben negociar.</p>
            <div class="pacto-selector">${[0,1,2].map(i => `<div style="margin:0 10px;"><input type="checkbox" class="p-check" id="eq${i}" value="${i}"><label for="eq${i}"> <strong>${Game.equipos[i].roles.diplomatico}</strong> (${Game.equipos[i].nombre})</label></div>`).join("")}</div><div id="pacto-area" class="grid"></div><button onclick="confirmarPacto()">Confirmar Pacto</button></div>`;
        setTimeout(() => document.querySelectorAll('.p-check').forEach(c => c.onchange = updatePactoUI), 100);
    }
    // PASO 6: Lucha (Luchadores)
    else if (Game.paso === 6) {
        ui.innerHTML = `<div class="card"><h2>Paso 6: Lucha por Recursos</h2><div class="grid">${Game.equipos.map((e, i) => {
            let targets = Game.equipos.map((v, vi) => i===vi ? null : `<option value="${vi}">${v.nombre}</option>`).filter(x=>x).join("");
            let h = `<div class="card"><div class="player-name">${e.roles.luchador} (Luchador)</div><h3>Equipo ${e.nombre}</h3>`;
            for(let a=0; a<e.attacks; a++){ h += `<div style="border-bottom:1px solid #eee; padding:5px;"><select class="atk-target" data-from="${i}">${targets}</select><select class="atk-res" onchange="toggleLuchaInv(this)"><option value="def">Pierde combate</option><option value="win">Gana objeto</option></select><select class="atk-item" style="display:none;"></select></div>`; }
            return h + `</div>`;
        }).join("")}</div><button onclick="resolverLucha()">Resolver Combates</button></div>`;
        setTimeout(initLuchaSelects, 100);
    }
    // PASO 7: Recolección (Orden Explícito)
    else if (Game.paso === 7) {
        const eqIdx = Game.ordenRecoleccion[Game.recoleccionTurno];
        const eqA = Game.equipos[eqIdx];
        ui.innerHTML = `<div class="card" style="text-align:center;">
            <h2>Paso 7: Recolección</h2>
            <div class="recoleccion-list">${Game.ordenRecoleccion.map((idx, turn) => `
                <div class="recoleccion-item ${Game.recoleccionTurno === turn ? 'active' : ''}">${Game.equipos[idx].nombre}</div>`).join(" → ")}
            </div>
            <p class="instruction-highlight" style="font-size:1.5em;">Turno de: <strong>${eqA.roles.recolector}</strong> (${eqA.nombre})</p>
            <p>Quedan ${Game.descarte.length} objetos en la isla.</p>
            <select id="pick-recoleccion" style="max-width:400px; font-size:1.2em;"><option value="">-- Selecciona el objeto a recolectar --</option>${Game.descarte.map((o, idx) => `<option value="${idx}">${o.n}</option>`).join("")}</select>
            <button onclick="tomarObjetoRecoleccion()" style="max-width:400px; margin:20px auto; display:block;">Confirmar Recolección</button></div>`;
    }
    // PASO 8: Mercado (Comerciantes)
    else if (Game.paso === 8) {
        ui.innerHTML = `<div class="card"><h2>Paso 8: Mercado Final</h2><p class="instruction-highlight">Los Comerciantes lideran los intercambios (Máx 2).</p><div class="grid">${Game.equipos.map((e, i) => `
            <div class="card"><div class="player-name">${e.roles.comerciante} (Comerciante)</div><h3>Equipo ${e.nombre} (${e.trades}/2)</h3>
            ${e.trades < 2 ? `<div class="trade-box"><select id="partner_${i}" onchange="loadTradeOptions(${i})"><option value="">-- ¿Con quién negocia? --</option>${Game.equipos.map((v, vi) => i!==vi ? `<option value="${vi}">${v.nombre}</option>` : '').join("")}</select><div id="trade_ui_${i}" style="display:none;"><label>Ofrece:</label><select id="give_${i}"></select><label>Pide:</label><select id="take_${i}"></select><button onclick="execTrade(${i})">Cerrar Trato</button></div></div>` : 'Intercambios agotados'}</div>`).join("")}</div><button onclick="Game.paso=9; render();">Finalizar Juego</button></div>`;
    }
    // PASO 9: Resultados
    else if (Game.paso === 9) {
        ui.innerHTML = `<div class="card"><h2>Resultados del Naufragio</h2><div class="grid">${Game.equipos.map(e => {
            const p = e.inventario.reduce((acc, i) => { acc[i.c] = (acc[i.c] || 0) + i.p; return acc; }, { ali:0, uti:0, ori:0 });
            const win = p.ali >= 4 && p.uti >= 3 && p.ori >= 2;
            return `<div class="card" style="text-align:center; border-top: 6px solid ${win?'#27ae60':'#e74c3c'}"><h3>Equipo ${e.nombre}</h3><h1>${win?'SOBREVIVE':'PERECE'}</h1><p>Alimentos: ${p.ali}/4 | Utensilios: ${p.uti}/3 | Orientación: ${p.ori}/2</p></div>`;
        }).join("")}</div><button onclick="location.reload()">Nuevo Juego</button></div>`;
    }
}

// FUNCIONES DE SOPORTE
function generateFields(s, i) { 
    let roles = (s==5) ? ["Ladrón", "Diplomático", "Luchador", "Recolector", "Comerciante"] : (s==4) ? ["Ladrón/Dip", "Luchador", "Recolector", "Comerciante"] : ["Ladrón/Dip", "Luchador/Rec", "Comerciante"];
    return roles.map((n, idx) => `<span class="role-tag">${n}</span><input type="text" id="r${idx}_${i}" placeholder="Nombre del jugador">`).join(""); 
}
function updateFields(i) { document.getElementById(`fields_${i}`).innerHTML = generateFields(document.getElementById(`sz_${i}`).value, i); }
function saveRoles() { 
    Game.equipos.forEach((e, i) => {
        const sz = document.getElementById(`sz_${i}`).value;
        const v = (id) => document.getElementById(`r${id}_${i}`).value || `Jugador ${id+1}`;
        if(sz==5) e.roles = { ladron:v(0), diplomatico:v(1), luchador:v(2), recolector:v(3), comerciante:v(4) };
        else if(sz==4) e.roles = { ladron:v(0), diplomatico:v(0), luchador:v(1), recolector:v(2), comerciante:v(3) };
        else e.roles = { ladron:v(0), diplomatico:v(0), luchador:v(1), recolector:v(1), comerciante:v(2) };
    });
    Game.paso = 3; render(); 
}

function saveInvPaso3() {
    let bolsaGlobal = []; CATALOGO_BASE_UNICO.forEach(obj => { for(let i=0; i<3; i++) bolsaGlobal.push({...obj, instanceId: `${obj.id}_${i}`}); });
    for(let i=0; i<3; i++) {
        const sel = Array.from(document.getElementById(`p_${i}`).selectedOptions);
        if(sel.length !== 5) return alert(`${Game.equipos[i].nombre} debe elegir 5.`);
        Game.equipos[i].inventario = sel.map(opt => {
            const idx = bolsaGlobal.findIndex(b => b.id === opt.value);
            return bolsaGlobal.splice(idx, 1)[0];
        });
    }
    Game.descarte = bolsaGlobal; Game.paso = 3.5; render();
}

function saveRoleInv() {
    for(let i=0; i<3; i++) {
        const s = Array.from(document.getElementById(`ro_${i}`).selectedOptions);
        if(s.length!==2) return alert("Elijan 2 objetos.");
        s.forEach(o => {
            const it = ROLES_OBJ.find(x => x.id === o.value);
            Game.equipos[i].inventario.push({...it});
            if(it.id === 'machete') Game.equipos[i].attacks = 2;
        });
    }
    Game.paso = 4; render();
}

// LOGICA DE ROBO, PACTO Y LUCHA
function loadTradeOptions(i) {
    const pIdx = document.getElementById(`partner_${i}`).value;
    const ui = document.getElementById(`trade_ui_${i}`);
    if (pIdx === "") { ui.style.display = "none"; return; }
    ui.style.display = "block";
    document.getElementById(`give_${i}`).innerHTML = Game.equipos[i].inventario.map((o, idx) => `<option value="${idx}">${o.n}</option>`).join("");
    document.getElementById(`take_${i}`).innerHTML = Game.equipos[pIdx].inventario.map((o, idx) => `<option value="${idx}">${o.n}</option>`).join("");
}
function execTrade(i) {
    const pIdx = document.getElementById(`partner_${i}`).value;
    if (Game.equipos[i].trades >= 2 || Game.equipos[pIdx].trades >= 2) return alert("Límite de 2 alcanzado.");
    const myItem = Game.equipos[i].inventario.splice(document.getElementById(`give_${i}`).value, 1)[0];
    const pItem = Game.equipos[pIdx].inventario.splice(document.getElementById(`take_${i}`).value, 1)[0];
    Game.equipos[i].inventario.push(pItem); Game.equipos[pIdx].inventario.push(myItem);
    Game.equipos[i].trades++; Game.equipos[pIdx].trades++; render();
}
function toggleRoboUI(i) { document.getElementById(`u_${i}`).style.display = document.getElementById(`a_${i}`).value === 'atk' ? 'block' : 'none'; }
function loadVictimInv(i) {
    const vIdx = document.getElementById(`v_${i}`).value; if(vIdx === "") return;
    const opt = Game.equipos[vIdx].inventario.map((o, idx) => o.type !== 'rol' ? `<option value="${idx}">${o.n}</option>` : null).filter(x => x).join("");
    document.getElementById(`it_${i}_1`).innerHTML = opt || '<option value="">Sin robables</option>';
}
function processNight() {
    let rbs = []; const defs = Game.equipos.map((_, i) => document.getElementById(`a_${i}`).value === 'def');
    Game.equipos.forEach((eq, i) => { if(document.getElementById(`a_${i}`).value === 'atk') { const v = document.getElementById(`v_${i}`).value; if(!defs[v]) { const i1 = document.getElementById(`it_${i}_1`).value; if(i1 !== "") rbs.push({ l: i, v: v, idx: parseInt(i1) }); } } });
    rbs.sort((a,b) => b.idx - a.idx).forEach(r => { const it = Game.equipos[r.v].inventario.splice(r.idx, 1)[0]; if(it) Game.equipos[r.l].inventario.push(it); });
    Game.paso = 5; render();
}
function updatePactoUI() {
    const sel = Array.from(document.querySelectorAll('.p-check:checked')).map(c => parseInt(c.value));
    const area = document.getElementById('pacto-area');
    if (sel.length === 2) {
        const exc = [0,1,2].find(i => !sel.includes(i));
        area.innerHTML = `<div class="card"><h4>Alianza entre ${Game.equipos[sel[0]].roles.diplomatico} y ${Game.equipos[sel[1]].roles.diplomatico}</h4>${sel.map(idx => `<label>${Game.equipos[idx].nombre}:</label><select class="p-sel" data-eq="${idx}" multiple style="height:80px;">${PACTO_OBJ.map(o => `<option value="${o.id}">${o.n}</option>`).join("")}</select>`).join("")}</div>
            <div class="card"><h4>Excluido (${Game.equipos[exc].roles.diplomatico})</h4><label>${Game.equipos[exc].nombre}:</label><select class="p-sel" data-eq="${exc}">${PACTO_OBJ.map(o => `<option value="${o.id}">${o.n}</option>`).join("")}</select></div>`;
    } else area.innerHTML = "";
}
function confirmarPacto() {
    if(document.querySelectorAll('.p-check:checked').length !== 2) return alert("Seleccionen 2 diplomáticos.");
    document.querySelectorAll('.p-sel').forEach(s => { const eq = Game.equipos[s.dataset.eq]; Array.from(s.selectedOptions).forEach(o => eq.inventario.push({...PACTO_OBJ.find(x => x.id === o.value)})); });
    Game.equipos[[0,1,2].find(i => !Array.from(document.querySelectorAll('.p-check:checked')).map(c=>parseInt(c.value)).includes(i))].attacks++;
    Game.paso = 6; render();
}
function initLuchaSelects() {
    document.querySelectorAll('.atk-target').forEach(s => { s.onchange = () => { const vIdx = s.value; const opt = Game.equipos[vIdx].inventario.map((o, idx) => o.type !== 'rol' ? `<option value="${idx}">${o.n}</option>` : null).filter(x => x).join(""); s.parentElement.querySelector('.atk-item').innerHTML = opt || '<option value="">Sin robables</option>'; }; s.dispatchEvent(new Event('change')); });
}
function toggleLuchaInv(el) { el.nextElementSibling.style.display = el.value === 'win' ? 'block' : 'none'; }
function resolverLucha() {
    let acs = []; document.querySelectorAll('[data-from]').forEach(sel => { const div = sel.parentElement; if(div.querySelector('.atk-res').value === 'win') { const i = div.querySelector('.atk-item').value; if(i !== "") acs.push({ l: sel.dataset.from, v: sel.value, idx: parseInt(i) }); } });
    acs.sort((a,b) => b.idx - a.idx).forEach(r => { const it = Game.equipos[r.v].inventario.splice(r.idx, 1)[0]; if(it) Game.equipos[r.l].inventario.push(it); });
    Game.paso = 7; render();
}
function tomarObjetoRecoleccion() {
    const sI = document.getElementById('pick-recoleccion').value;
    if(sI === "") return alert("Selecciona un objeto.");
    Game.equipos[Game.ordenRecoleccion[Game.recoleccionTurno]].inventario.push(Game.descarte.splice(parseInt(sI), 1)[0]);
    Game.recoleccionTurno++; if(Game.recoleccionTurno >= Game.ordenRecoleccion.length || Game.descarte.length === 0) Game.paso = 8; render();
}

window.onload = render;
</script>
</body>
</html>
