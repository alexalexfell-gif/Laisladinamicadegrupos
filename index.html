<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>La Isla - Dinámica Grupal</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; }
        .scoreboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; position: sticky; top: 10px; z-index: 100; }
        .score-card { background: var(--primary); color: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        button { background: var(--success); color: white; border: none; padding: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.2em; transition: 0.3s; margin-top: 10px; box-shadow: 0 4px 0 #219150; }
        button:hover { background: #2ecc71; transform: translateY(-2px); box-shadow: 0 6px 0 #219150; }
        button:active { transform: translateY(2px); box-shadow: none; }
        
        .log { background: #111; color: #0f0; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; height: 100px; overflow-y: auto; margin-top: 20px; }
        .intro-box { text-align: center; padding: 40px; }
        .author { margin-top: 30px; font-weight: bold; color: var(--primary); border-top: 1px solid #eee; padding-top: 15px; }
        .instruction-highlight { color: #c0392b; font-weight: bold; background: #fff3f3; padding: 15px; border-radius: 8px; border: 1px dashed #e74c3c; margin-bottom: 20px; text-align: center; }
        
        select { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 6px; }
        input { width: 100%; padding: 8px; margin: 4px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .role-label { font-size: 0.85em; color: #7f8c8d; font-weight: bold; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="scoreboard" class="scoreboard" style="display:none;"></div>
    <div id="game-ui"></div>
    <div class="log" id="game-log">>> Sistema iniciado.</div>
</div>

<script>
const DB = {
    base: [
        { id: "agua", n: "Agua", c: "ali", p: 1 }, { id: "fruta", n: "Frutas", c: "ali", p: 1 },
        { id: "latas", n: "Enlatados", c: "ali", p: 1 }, { id: "botiquin", n: "Botiquín", c: "uti", p: 1 },
        { id: "cuerda", n: "Cuerda", c: "uti", p: 1 }, { id: "martillo", n: "Martillo", c: "uti", p: 1 },
        { id: "lona", n: "Lona", c: "uti", p: 1 }, { id: "encendedor", n: "Encendedor", c: "uti", p: 1 },
        { id: "mapa", n: "Mapa", c: "ori", p: 1 }, { id: "radio", n: "Radio", c: "ori", p: 1 }
    ]
};

let Game = {
    paso: 1,
    equipos: [
        { nombre: "Alfa", inventario: [] },
        { nombre: "Beta", inventario: [] },
        { nombre: "Omega", inventario: [] }
    ]
};

function log(msg) {
    const l = document.getElementById('game-log');
    l.innerHTML += `<br>> ${msg}`;
    l.scrollTop = l.scrollHeight;
}

function updateScoreboard() {
    const sb = document.getElementById('scoreboard');
    if (Game.paso < 3) return;
    sb.style.display = 'grid';
    sb.innerHTML = Game.equipos.map(e => {
        const p = e.inventario.reduce((acc, i) => { acc[i.c] += i.p; return acc; }, { ali:0, uti:0, ori:0 });
        return `<div class="score-card">
            <small>Equipo ${e.nombre}</small>
            <div class="points">🍎${p.ali} | 🛠${p.uti} | 🧭${p.ori}</div>
        </div>`;
    }).join("");
}

function render() {
    const ui = document.getElementById('game-ui');
    updateScoreboard();

    if (Game.paso === 1) {
        ui.innerHTML = `
            <div class="card intro-box">
                <h1>🏝️ La Isla</h1>
                <h3>Dinámica grupal para la evaluación de liderazgo, trabajo en equipo y estrategia</h3>
                <div class="author">Autor: Alejandro Scuro Rossi</div>
                <button onclick="Game.paso=2; render();">Siguiente: Registro de Roles</button>
            </div>`;
    } 
    else if (Game.paso === 2) {
        ui.innerHTML = `
            <div class="card">
                <h2>Paso 2: Registro de Integrantes y Roles</h2>
                <p>Ingresa el nombre de cada estudiante según su función:</p>
                <div class="grid">${Game.equipos.map(e => `
                    <div class="card">
                        <h3>Equipo ${e.nombre}</h3>
                        <label class="role-label">Ladrón:</label> <input type="text" placeholder="Nombre...">
                        <label class="role-label">Diplomático:</label> <input type="text" placeholder="Nombre...">
                        <label class="role-label">Luchador:</label> <input type="text" placeholder="Nombre...">
                        <label class="role-label">Recolector:</label> <input type="text" placeholder="Nombre...">
                        <label class="role-label">Comerciante:</label> <input type="text" placeholder="Nombre...">
                    </div>
                `).join("")}</div>
                <button onclick="Game.paso=3; render();">Siguiente: Planeación Inicial</button>
            </div>`;
    }
    else if (Game.paso === 3) {
        ui.innerHTML = `
            <div class="card">
                <h2>Paso 3: Planeación Inicial</h2>
                <div class="instruction-highlight">
                    🖱️ <strong>INSTRUCCIÓN:</strong> Mantén presionado <strong>CTRL</strong> y haz <strong>clic</strong> para elegir exactamente <strong>5 objetos</strong> por equipo.
                </div>
                <div class="grid">${Game.equipos.map((e, i) => `
                    <div class="card">
                        <h3>Equipo ${e.nombre}</h3>
                        <select id="plan_${i}" multiple style="height:200px;">
                            ${DB.base.map(o => `<option value="${o.id}">${o.n} (${o.c})</option>`).join("")}
                        </select>
                        <div id="count_${i}" style="font-weight:bold; margin-top:5px; color:var(--accent);">Seleccionados: 0</div>
                    </div>
                `).join("")}</div>
                <button id="confirmar-btn" onclick="procesarPaso3()">Confirmar Planeación</button>
            </div>`;

        setTimeout(() => {
            Game.equipos.forEach((_, i) => {
                const sel = document.getElementById(`plan_${i}`);
                if(sel) {
                    sel.onchange = () => {
                        const count = Array.from(sel.selectedOptions).length;
                        document.getElementById(`count_${i}`).innerText = `Seleccionados: ${count}`;
                    };
                }
            });
        }, 100);
    }
    else if (Game.paso === 4) {
        ui.innerHTML = `
            <div class="card">
                <h2>Paso 4: Robo Nocturno</h2>
                <p>¡Planeación confirmada! Ahora los ladrones deben decidir su acción secreta.</p>
                <div class="grid">${Game.equipos.map((e, i) => `
                    <div class="card">
                        <h3>Ladrón de ${e.nombre}</h3>
                        <select id="accion_${i}">
                            <option value="def">🛡️ Defender Campamento</option>
                            <option value="atk">👤 Robar a otro equipo</option>
                        </select>
                    </div>
                `).join("")}</div>
                <button onclick="alert('Lógica de robo en desarrollo...')">Procesar Noche</button>
            </div>`;
    }
}

function procesarPaso3() {
    let errores = [];
    let nuevosInventarios = [];

    Game.equipos.forEach((e, i) => {
        const selectElement = document.getElementById(`plan_${i}`);
        const selectedOptions = Array.from(selectElement.selectedOptions);
        
        if (selectedOptions.length !== 5) {
            errores.push(`${e.nombre} (${selectedOptions.length}/5)`);
        } else {
            const items = selectedOptions.map(opt => DB.base.find(item => item.id === opt.value));
            nuevosInventarios.push(items);
        }
    });

    if (errores.length > 0) {
        alert("⚠️ Selección incorrecta.\nEquipos que no tienen 5 objetos: " + errores.join(", "));
    } else {
        Game.equipos.forEach((e, i) => { e.inventario = nuevosInventarios[i]; });
        log("Inventarios guardados. Pasando al Robo Nocturno.");
        Game.paso = 4;
        render();
    }
}

render();
</script>
</body>
</html>
