<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="y2jTAuWIOHGZjEVlHQWZikiKp-2kZubUix0gA1uebRo" />
    
    <title>The Island - Alejandro Scuro Rossi</title>
    <meta name="description" content="La Isla: Una dinámica grupal creada por Alejandro Scuro Rossi.">
    <meta name="keywords" content="Alejandro Scuro Rossi, trabajo en equipo, recursos humanos, dinámica grupal, liderazgo, roleplay, simulación de supervivencia, evaluación de competencias">
    <meta name="author" content="Alejandro Scuro Rossi">
    
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --light: #ecf0f1; --info: #2980b9; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; }
        .scoreboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .score-card { background: var(--primary); color: white; padding: 12px; border-radius: 10px; text-align: center; border-bottom: 4px solid var(--accent); }
        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        button { background: var(--success); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button:disabled { background: #95a5a6; cursor: not-allowed; opacity: 0.6; }
        .instruction { background: #fff3cd; color: #856404; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ffeeba; text-align: center; }
        .role-tag { font-size: 0.75em; font-weight: bold; color: var(--accent); display: block; margin-top: 12px; text-transform: uppercase; }
        .player-name-display { font-size: 0.9em; color: #1a252f; font-weight: 800; margin-bottom: 12px; display: block; background: #d6eaf8; padding: 8px; border-radius: 4px; border-left: 5px solid var(--accent); }
        select, input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 6px; }
        .trade-slot { background: #f9f9f9; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-top: 10px; }
        .active-turn { border: 2px solid var(--accent) !important; background: #ebf5fb !important; }
        .maletin-box { background: #eef2f3; border: 2px dashed var(--primary); padding: 10px; border-radius: 8px; margin-top: 10px; }
        
        .manual-container { text-align: left; background: #f8f9fa; padding: 25px; border-radius: 8px; border-left: 5px solid var(--info); margin: 25px 0; }
        .manual-container h3 { margin-top: 0; color: var(--info); border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .manual-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; font-size: 0.85em; line-height: 1.4; }
        .req-list { list-style: none; padding: 0; font-weight: bold; }
        .phase-list { padding-left: 18px; margin: 5px 0; }

        /* Estilos específicos para la nueva descarga */
        .disclaimer-box { text-align: left; font-size: 0.85em; line-height: 1.5; background: #fff; border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin: 20px 0; max-height: 300px; overflow-y: auto; color: #555; }
        .disclaimer-box h2, .disclaimer-box h4 { color: var(--primary); margin-top: 15px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="scoreboard" class="scoreboard" style="display:none;"></div>
    <div id="game-ui"></div>
</div>

<script>
const PrivacyKernel = {
    consentGiven: false,
    grantConsent() {
        this.consentGiven = true;
        Game.paso = 2;
        render();
    },
    wipeSessionData() {
        if (typeof Game !== 'undefined' && Game.equipos) {
            Game.equipos.forEach(e => {
                e.rolesNombres = {};
                e.inventario = [];
                e.maletin = [];
            });
        }
    },
    requireConsent(action) {
        if (!this.consentGiven) {
            alert("Error: No se puede proceder sin consentimiento.");
            return false;
        }
        return action();
    }
};

window.addEventListener('beforeunload', () => PrivacyKernel.wipeSessionData());

let CATALOGO_BASE = [
    { id: "agua", n: "Agua", c: "ali", p: 1 }, { id: "fruta", n: "Frutas", c: "ali", p: 1 }, { id: "latas", n: "Enlatados", c: "ali", p: 1 },
    { id: "botiquin", n: "Botiquín", c: "uti", p: 1 }, { id: "cuerda", n: "Cuerda", c: "uti", p: 1 }, { id: "martillo", n: "Martillo", c: "uti", p: 1 },
    { id: "lona", n: "Lona", c: "uti", p: 1 }, { id: "encendedor", n: "Encendedor", c: "uti", p: 1 }, { id: "mapa", n: "Mapa", c: "ori", p: 1 }, { id: "radio", n: "Radio", c: "ori", p: 1 }
];
const PACTO_OBJ = [
    { id: "pesca", n: "Caña de Pescar", c: "ali", p: 2 },
    { id: "mochila", n: "Mochila", c: "uti", p: 2 },
    { id: "brujula", n: "Brújula", c: "ori", p: 2 }
];
const ROLES_OBJ = [
    { id: "antifaz", n: "Antifaz (Ladrón)", c: "uti", p: 1, type: "rol" },
    { id: "guantes", n: "Guantes (Recolector)", c: "ali", p: 1, type: "rol" },
    { id: "machete", n: "Machete (Luchador)", c: "uti", p: 1, type: "rol" },
    { id: "maletin", n: "Maletín (Comerciante)", c: "uti", p: 1, type: "rol" },
    { id: "alianza_mil", n: "Alianza militar (Diplomático)", c: "ori", p: 1, type: "rol" }
];

let Game = {
    paso: 1,
    equipos: [
        { nombre: "Alfa", inventario: [], maletin: [], actionsMarket: 0, venganza: false, numJugadores: 5, yaUsoGuantes: false, rolesNombres: {} },
        { nombre: "Beta", inventario: [], maletin: [], actionsMarket: 0, venganza: false, numJugadores: 5, yaUsoGuantes: false, rolesNombres: {} },
        { nombre: "Gamma", inventario: [], maletin: [], actionsMarket: 0, venganza: false, numJugadores: 5, yaUsoGuantes: false, rolesNombres: {} }
    ],
    recoleccion: { indexPaso: 0, secuencia: [{ eq: 0, cant: 1 }, { eq: 1, cant: 1 }, { eq: 2, cant: 2 }, { eq: 1, cant: 1 }, { eq: 0, cant: 1 }] }
};

function render() {
    const ui = document.getElementById('game-ui');
    const sb = document.getElementById('scoreboard');
    if (Game.paso >= 3 && Game.paso < 9) { sb.style.display = 'grid'; updateScoreboard(); } else { sb.style.display = 'none'; }

    if (Game.paso === 1) {
        ui.innerHTML = `<div class="card" style="text-align:center">
            <h1>🏝️ LA ISLA</h1>
            <p style="font-weight:bold; color:var(--primary); margin-bottom:10px;">Autor: Alejandro Scuro Rossi</p>
            <div class="manual-container">
                <h3>📜 Guía de Supervivencia</h3>
                <div class="manual-grid">
                    <div>
                        <p><b>Objetivos:</b></p>
                        <ul class="req-list">
                            <li style="color:var(--danger)">🍎 4 Ali</li>
                            <li style="color:var(--primary)">🛠️ 3 Uti</li>
                            <li style="color:var(--info)">🧭 2 Ori</li>
                        </ul>
                    </div>
                    <div>
                        <p><b>Roles:</b></p>
                        <ul class="phase-list" style="list-style:none; padding:0; font-size:0.9em;">
                            <li>👤 Ladrón</li>
                            <li>👤 Diplomático</li>
                            <li>👤 Luchador</li>
                            <li>👤 Recolector</li>
                            <li>👤 Comerciante</li>
                        </ul>
                    </div>
                    <div>
                        <p><b>Fases:</b></p>
                        <ol class="phase-list" style="font-size:0.9em;">
                            <li>Planeación</li>
                            <li>Robo Nocturno</li>
                            <li>Pacto</li>
                            <li>Lucha</li>
                            <li>Recolección</li>
                            <li>Mercado</li>
                        </ol>
                    </div>
                </div>
            </div>

            <div class="disclaimer-box">
                <h2>Descarga de Responsabilidades y Términos de Uso de La Isla</h2>
                <p>¡Bienvenido/a a La Isla! Antes de empezar a jugar, es importante que leas y entiendas esto. Al continuar, aceptas estos términos.</p>
                
                <h4>Naturaleza del Juego:</h4>
                <p>Esta aplicación es una simulación de interacción grupal con fines puramente lúdicos y recreativos. Su objetivo es el entretenimiento y la experimentación de dinámicas de grupo en un entorno virtual. Las acciones que se realizan dentro del juego (como robos, luchas, diplomacia, mercadeo o recolección) son ficticias y simuladas. No tienen ninguna repercusión en la vida real ni deben interpretarse como un reflejo de comportamientos o habilidades personales. No está diseñada ni debe utilizarse para análisis psicológicos, evaluaciones de habilidades, perfiles profesionales, ni para tomar decisiones en la vida real.</p>
                
                <h4>Uso y Responsabilidad del Usuario/Facilitador:</h4>
                <p>El uso de esta aplicación es bajo tu propio riesgo y responsabilidad. Es responsabilidad exclusiva del facilitador asegurarse de que todos los participantes han sido debidamente informados sobre la naturaleza simulada de la actividad, sus reglas y estos términos antes de comenzar. Los participantes pueden usar su nombre real o un alias/nick. En cualquier caso, la responsabilidad sobre la elección y el uso de dicho nombre recae en el usuario.</p>
                
                <h4>Datos y Privacidad (RGPD):</h4>
                <p>Todos los datos generados durante la sesión se almacenan localmente en el navegador de forma estrictamente temporal. No se envían a ningún servidor externo ni se recopila información personal identificable de los usuarios por parte del autor de la aplicación. Debido a que la aplicación no recopila, almacena ni procesa datos personales de los usuarios en servidores externos, cumple con los principios fundamentales del Reglamento General de Protección de Datos (RGPD) al no requerir un tratamiento de datos que active sus obligaciones más complejas. Una vez finalizada la sesión o cerrado el navegador, estos datos temporales pueden desaparecer.</p>
                
                <h4>Exención de Responsabilidad del Autor:</h4>
                <p>El autor de esta aplicación no se hace responsable de ninguna consecuencia directa o indirecta, daño, pérdida o perjuicio (material o inmaterial) que pueda derivarse del uso de la misma. Esto incluye, pero no se limita a, malentendidos entre participantes, decisiones tomadas basándose en la simulación, o cualquier otro incidente relacionado con la dinámica. La responsabilidad total del uso de esta herramienta recae sobre el facilitador y los participantes.</p>
                
                <h4>Asignación de Roles:</h4>
                <p>Al continuar, reconoces que el azar es el único criterio de asignación de roles o situaciones dentro del juego.</p>
            </div>

            <div style="margin-top:15px;">
                <input type="checkbox" id="consent_check" onchange="document.getElementById('start_btn').disabled = !this.checked">
                <label for="consent_check" style="cursor:pointer;">He leído y acepto la Descarga de Responsabilidades y Términos de Uso.</label>
            </div>
            <button id="start_btn" disabled onclick="PrivacyKernel.grantConsent()">Iniciar Dinámica</button>
        </div>`;
    }
    else if (Game.paso === 2) {
        ui.innerHTML = `<div class="card"><h2>Paso 2: Registro</h2><div class="grid">${Game.equipos.map((e, i) => `
            <div class="card">
                <h3>Equipo ${e.nombre}</h3>
                <select id="sz_${i}" onchange="updateFieldsUI(${i})"><option value="5">5 Jugadores</option><option value="4">4 Jugadores</option><option value="3">3 Jugadores</option></select>
                <div id="fields_${i}">${generateFieldsHTML(5)}</div>
            </div>`).join("")}</div><button onclick="saveRegistration()">Continuar</button></div>`;
    }
    else if (Game.paso === 3) {
        ui.innerHTML = `<div class="card"><h2>Paso 3: Planeación</h2><p class="instruction">Selecciona exactamente 5 objetos.</p><div class="grid">${Game.equipos.map((e, i) => `<div class="card"><h3>${e.nombre}</h3><select id="p_${i}" multiple style="height:150px;">${CATALOGO_BASE.map(o => `<option value="${o.id}">[${o.c.toUpperCase()}] ${o.n}</option>`).join("")}</select></div>`).join("")}</div><button onclick="saveInv3()">Siguiente</button></div>`;
    }
    else if (Game.paso === 3.5) {
        ui.innerHTML = `<div class="card"><h2>Paso 3.5: Objetos de Rol</h2><p class="instruction">Elige 2 objetos especiales.</p><div class="grid">${Game.equipos.map((e, i) => `<div class="card"><h3>${e.nombre}</h3><select id="ro_${i}" multiple style="height:120px;">${ROLES_OBJ.map(o => `<option value="${o.id}">${o.n}</option>`).join("")}</select></div>`).join("")}</div><button onclick="saveRoleInv()">Confirmar</button></div>`;
    }
    else if (Game.paso === 4) {
        ui.innerHTML = `<div class="card"><h2>Paso 4: Robo Nocturno</h2><div class="grid">${Game.equipos.map((e, i) => {
            const hasA = e.inventario.some(it => it.id === 'antifaz');
            return `<div class="card"><h3>${e.nombre} ${hasA ? '🎭' : ''}</h3><span class="player-name-display">👤 Ladrón: ${e.rolesNombres['Ladrón'] || 'No asignado'}</span><select id="n_act_${i}" onchange="updateNightUI(${i})"><option value="def">Defender</option><option value="atk">Robar</option></select><div id="n_ui_${i}" style="display:none"><select id="n_vic_${i}" onchange="loadNightItems(${i})"><option value="">¿Víctima?</option>${Game.equipos.map((v, vi) => i !== vi ? `<option value="${vi}">${v.nombre}</option>` : '').join("")}</select><select id="n_obj_${i}" multiple style="height:80px;"></select></div></div>`;
        }).join("")}</div><button onclick="processNightRobbery()">Ejecutar</button></div>`;
    }
    else if (Game.paso === 5) {
        ui.innerHTML = `<div class="card"><h2>Paso 5: El Pacto</h2><div class="grid">${Game.equipos.map((e,i)=>`<div class="card"><h3>${e.nombre}</h3><span class="player-name-display">👤 Diplomático: ${e.rolesNombres['Diplomático'] || 'No asignado'}</span><input type="checkbox" class="p-check" value="${i}" id="chk${i}" onchange="updatePactUI()"><label for="chk${i}"> Participa</label><div id="pact_choice_${i}" style="display:none; margin-top:10px;"><select id="pact_sel_${i}" multiple style="height:80px;">${PACTO_OBJ.map(o=>`<option value="${o.id}">${o.n}</option>`).join("")}</select></div></div>`).join("")}</div><button onclick="processPact()">Cerrar Pacto</button></div>`;
    }
    else if (Game.paso === 6) {
        let pactTeams = Array.from(document.querySelectorAll('.p-check:checked')).map(c => parseInt(c.value));
        ui.innerHTML = `<div class="card"><h2>Paso 6: Lucha</h2><div class="grid">${Game.equipos.map((e, i) => {
            let numAtks = 1 + (e.inventario.some(it => it.id === 'machete') ? 1 : 0) + (e.venganza ? 1 : 0);
            const vVal = Game.equipos.map((v, vi) => (i===vi || (pactTeams.includes(i) && pactTeams.includes(vi))) ? null : `<option value="${vi}">${v.nombre}</option>`).filter(o=>o).join("");
            return `<div class="card"><h3>${e.nombre}</h3><span class="player-name-display">👤 Luchador: ${e.rolesNombres['Luchador'] || 'No asignado'}</span><div id="lucha_area_${i}">${Array.from({length: numAtks}).map((_, a) => `<div class="trade-slot" id="atk_block_${i}_${a}"><b>Ataque ${a+1}:</b><select id="vic_sel_${i}_${a}" onchange="toggleAtkControls(${i}, ${a})"><option value="">¿Víctima?</option>${vVal}</select><div id="atk_ctrls_${i}_${a}" style="display:none;"><button onclick="handleLuchaAtk(${i}, ${a}, true)">ÉXITO</button><button onclick="handleLuchaAtk(${i}, ${a}, false)" style="background:#95a5a6">FALLO</button></div><div id="rob_area_${i}_${a}" style="display:none;"><select id="item_to_rob_${i}_${a}"></select><button onclick="finishLuchaRob(${i}, ${a})">Robar</button></div></div>`).join("")}</div></div>`;
        }).join("")}</div><button onclick="Game.paso=7; render()">Siguiente</button></div>`;
    }
    else if (Game.paso === 7) {
        const tIdx = Game.recoleccion.indexPaso;
        const eqIdx = Game.recoleccion.secuencia[tIdx].eq;
        const e = Game.equipos[eqIdx];
        const cant = Game.recoleccion.secuencia[tIdx].cant + ((e.inventario.some(it => it.id === 'guantes') && !e.yaUsoGuantes) ? 1 : 0);
        ui.innerHTML = `<div class="card"><h2>Paso 7: Recolección</h2><div class="grid">${Game.equipos.map((eq, i) => `<div class="card ${eqIdx===i?'active-turn':''}" style="opacity:${eqIdx===i?'1':'0.5'}"><h3>${eq.nombre}</h3><span class="player-name-display">👤 Recolector: ${eq.rolesNombres['Recolector'] || 'No asignado'}</span>${eqIdx===i ? `<select id="rec_sel" multiple style="height:120px;">${CATALOGO_BASE.map(o=>`<option value="${o.id}">[${o.c.toUpperCase()}] ${o.n}</option>`).join("")}</select><button onclick="ejecutarTurnoRecoleccion(${i}, ${cant})">Recolectar (${cant})</button>` : `<p>Esperando...</p>`}</div>`).join("")}</div></div>`;
    }
    else if (Game.paso === 8) {
        ui.innerHTML = `<div class="card"><h2>Paso 8: Mercado Final</h2><div class="grid">${Game.equipos.map((e, i) => `<div class="card"><h3>${e.nombre}</h3><span class="player-name-display">👤 Comerciante: ${e.rolesNombres['Comerciante'] || 'No asignado'}</span><div class="trade-slot"><select id="m_partner_${i}" onchange="updateTradeProposalUI(${i})"><option value="">Socio...</option>${Game.equipos.map((p, pIdx) => (pIdx !== i) ? `<option value="${pIdx}">${p.nombre}</option>` : '').join("")}</select><div id="trade_ui_${i}" style="display:none;"><select id="m_give_${i}">${e.inventario.map((it, idx) => it.type !== 'rol' ? `<option value="${idx}">${it.n}</option>` : '').join("")}</select><div id="partner_give_area_${i}"></div><button onclick="ejecutarIntercambioDirecto(${i})">Confirmar</button></div></div></div>`).join("")}</div><button onclick="Game.paso=9; render()">Resultados</button></div>`;
    }
    else if (Game.paso === 9) {
        ui.innerHTML = `<div class="card" style="text-align:center"><h2>Resultados</h2><div class="grid">${Game.equipos.map(e => {
            const inv = [...e.inventario, ...e.maletin];
            const p = inv.reduce((acc, i) => { if(i.c) { acc[i.c] = (acc[i.c] || 0) + (i.p || 0); } return acc; }, { ali:0, uti:0, ori:0 });
            const win = p.ali >= 4 && p.uti >= 3 && p.ori >= 2;
            return `<div class="card" style="border-top: 5px solid ${win?'#27ae60':'#e74c3c'}"><h3>${e.nombre}</h3><h1 style="color:${win?'#27ae60':'#e74c3c'}">${win?'SOBREVIVE':'MUERE'}</h1><p>🍎${p.ali}/4 🛠${p.uti}/3 🧭${p.ori}/2</p></div>`;
        }).join("")}</div><button onclick="location.reload()">Reiniciar</button></div>`;
    }
}

function generateFieldsHTML(n) {
    let fields = [];
    if (n == 5) fields = [{r:"Ladrón"},{r:"Diplomático"},{r:"Luchador"},{r:"Recolector"},{r:"Comerciante"}];
    else if (n == 4) fields = [{r:"Ladrón/Diplomático"},{r:"Luchador"},{r:"Recolector"},{r:"Comerciante"}];
    else if (n == 3) fields = [{r:"Ladrón/Diplomático"},{r:"Luchador/Recolector"},{r:"Comerciante"}];
    return fields.map(f => `<span class="role-tag">${f.r}</span><input type="text" class="player-input" data-role="${f.r}" placeholder="Nombre...">`).join("");
}

function updateFieldsUI(i) { document.getElementById(`fields_${i}`).innerHTML = generateFieldsHTML(parseInt(document.getElementById(`sz_${i}`).value)); }

function saveRegistration() {
    PrivacyKernel.requireConsent(() => {
        for(let i=0; i<3; i++) {
            const inputs = document.querySelectorAll(`#fields_${i} .player-input`);
            Game.equipos[i].rolesNombres = {};
            inputs.forEach(input => {
                const name = input.value.trim() || "Anónimo";
                const roleTag = input.getAttribute("data-role").toLowerCase();
                if(roleTag.includes("ladrón")) Game.equipos[i].rolesNombres['Ladrón'] = name;
                if(roleTag.includes("diplomático")) Game.equipos[i].rolesNombres['Diplomático'] = name;
                if(roleTag.includes("luchador")) Game.equipos[i].rolesNombres['Luchador'] = name;
                if(roleTag.includes("recolector")) Game.equipos[i].rolesNombres['Recolector'] = name;
                if(roleTag.includes("comerciante")) Game.equipos[i].rolesNombres['Comerciante'] = name;
            });
        }
        Game.paso = 3; render();
    });
}

function updatePactUI() {
    let ps = Array.from(document.querySelectorAll('.p-check:checked')).map(c=>parseInt(c.value));
    Game.equipos.forEach((_, i) => {
        if(document.getElementById(`pact_choice_${i}`)) document.getElementById(`pact_choice_${i}`).style.display = ps.includes(i) ? "block" : "none";
    });
}

function processPact() {
    let ps = Array.from(document.querySelectorAll('.p-check:checked')).map(c=>parseInt(c.value));
    if(ps.length !== 2) return alert("Selecciona 2 equipos.");
    Game.equipos.forEach((_, i) => {
        if(ps.includes(i)) {
            const s = Array.from(document.getElementById(`pact_sel_${i}`).selectedOptions);
            s.forEach(opt => Game.equipos[i].inventario.push({...PACTO_OBJ.find(p => p.id === opt.value)}));
        } else { Game.equipos[i].venganza = true; }
    });
    Game.paso = 6; render();
}

function updateScoreboard() {
    document.getElementById('scoreboard').innerHTML = Game.equipos.map(e => {
        const inv = [...e.inventario, ...e.maletin];
        const p = inv.reduce((acc, i) => { if(i.c) { acc[i.c] = (acc[i.c] || 0) + (i.p || 0); } return acc; }, { ali:0, uti:0, ori:0 });
        return `<div class="score-card"><b>${e.nombre}</b><br>🍎${p.ali} 🛠${p.uti} 🧭${p.ori}</div>`;
    }).join("");
}

function saveInv3() {
    for(let i=0; i<3; i++) {
        const s = Array.from(document.getElementById(`p_${i}`).selectedOptions);
        if(s.length!==5) return alert(`Elige 5 objetos.`);
        Game.equipos[i].inventario = s.map(o => ({...CATALOGO_BASE.find(b => b.id === o.value)}));
    }
    Game.paso = 3.5; render();
}

function saveRoleInv() {
    for(let i=0; i<3; i++) {
        const s = Array.from(document.getElementById(`ro_${i}`).selectedOptions);
        s.forEach(o => Game.equipos[i].inventario.push({...ROLES_OBJ.find(x => x.id === o.value)}));
    }
    Game.paso = 4; render();
}

function updateNightUI(eq) { document.getElementById(`n_ui_${eq}`).style.display = (document.getElementById(`n_act_${eq}`).value==='atk'?'block':'none'); }

function loadNightItems(eq) {
    const v = document.getElementById(`n_vic_${eq}`).value;
    if(v==="") return;
    document.getElementById(`n_obj_${eq}`).innerHTML = Game.equipos[v].inventario.filter(it => it.type !== 'rol').map((it, idx) => `<option value="${idx}">${it.n}</option>`).join("");
}

function processNightRobbery() {
    Game.equipos.forEach((e, i) => {
        if (document.getElementById(`n_act_${i}`).value === 'atk') {
            const v = parseInt(document.getElementById(`n_vic_${i}`).value);
            const opts = Array.from(document.getElementById(`n_obj_${i}`).selectedOptions).map(o => parseInt(o.value)).sort((a,b)=>b-a);
            if (document.getElementById(`n_act_${v}`).value !== 'def') {
                opts.forEach(idx => { if(Game.equipos[v].inventario[idx]) Game.equipos[i].inventario.push(Game.equipos[v].inventario.splice(idx, 1)[0]); });
            }
        }
    });
    Game.paso = 5; render();
}

function toggleAtkControls(eq, atk) { document.getElementById(`atk_ctrls_${eq}_${atk}`).style.display = "block"; }

function handleLuchaAtk(eq, atk, win) {
    if(!win) { document.getElementById(`atk_block_${eq}_${atk}`).innerHTML = "FALLO"; return; }
    const vic = document.getElementById(`vic_sel_${eq}_${atk}`).value;
    document.getElementById(`atk_ctrls_${eq}_${atk}`).style.display = "none";
    document.getElementById(`rob_area_${eq}_${atk}`).style.display = "block";
    document.getElementById(`item_to_rob_${eq}_${atk}`).innerHTML = Game.equipos[vic].inventario.filter(it => it.type !== 'rol').map((it, idx) => `<option value="${idx}">${it.n}</option>`).join("");
}

function finishLuchaRob(eq, atk) {
    const vic = document.getElementById(`vic_sel_${eq}_${atk}`).value;
    const idx = document.getElementById(`item_to_rob_${eq}_${atk}`).value;
    if(idx !== "") Game.equipos[eq].inventario.push(Game.equipos[vic].inventario.splice(idx, 1)[0]);
    document.getElementById('atk_block_'+eq+'_'+atk).innerHTML = "ÉXITO";
    updateScoreboard();
}

function ejecutarTurnoRecoleccion(eqIdx, cant) {
    const opts = Array.from(document.getElementById('rec_sel').selectedOptions);
    if (opts.length !== cant) return alert(`Elige ${cant}.`);
    opts.forEach(o => {
        const idx = CATALOGO_BASE.findIndex(x => x.id === o.value);
        if(idx !== -1) Game.equipos[eqIdx].inventario.push({...CATALOGO_BASE[idx]});
    });
    Game.equipos[eqIdx].yaUsoGuantes = true;
    Game.recoleccion.indexPaso++;
    if(Game.recoleccion.indexPaso >= Game.recoleccion.secuencia.length) Game.paso = 8;
    render();
}

function updateTradeProposalUI(eqIdx) {
    const pIdx = document.getElementById(`m_partner_${eqIdx}`).value;
    if (pIdx === "") { document.getElementById(`trade_ui_${eqIdx}`).style.display = "none"; return; }
    document.getElementById(`trade_ui_${eqIdx}`).style.display = "block";
    document.getElementById(`partner_give_area_${eqIdx}`).innerHTML = `<b>Recibe de ${Game.equipos[pIdx].nombre}:</b><select id="m_partner_give_${eqIdx}">${Game.equipos[pIdx].inventario.filter(it => it.type !== 'rol').map((it, idx) => `<option value="${idx}">${it.n}</option>`).join("")}</select>`;
}

function ejecutarIntercambioDirecto(eqIdx) {
    const pIdx = document.getElementById(`m_partner_${eqIdx}`).value;
    const gIdx = document.getElementById(`m_give_${eqIdx}`).value;
    const pgIdx = document.getElementById(`m_partner_give_${eqIdx}`).value;
    const itemA = Game.equipos[eqIdx].inventario.splice(gIdx, 1)[0];
    const itemB = Game.equipos[pIdx].inventario.splice(pgIdx, 1)[0];
    Game.equipos[eqIdx].inventario.push(itemB); Game.equipos[pIdx].inventario.push(itemA);
    render();
}

function renderMaletinUI(eqIdx) {
    const e = Game.equipos[eqIdx];
    if (!e.inventario.some(it => it.id === 'maletin')) return '';
    return `<div class="maletin-box"><b>🧳 Maletín</b></div>`;
}

window.onload = render;
</script>
</body>
</html>
