<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>La Isla - Versión Profesional</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f3; padding: 25px; color: #333; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; margin-top: 0; }
        .tagline { font-style: italic; color: #555; margin-bottom: 20px; border-left: 4px solid #3498db; padding-left: 15px; }
        .equipo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .jugador-row { margin-bottom: 10px; padding: 10px; border-bottom: 1px solid #eee; }
        button { background: #3498db; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2980b9; }
        select { margin: 5px 0; padding: 5px; width: 100%; }
        .log { background: #111; color: #0f0; height: 150px; overflow: auto; padding: 12px; margin-top: 20px; font-family: monospace; font-size: 13px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="app"></div>
<div class="log" id="log">>> Sistema iniciado. Esperando configuración de equipos...</div>

<script>
/* ============================
ESTADO DEL JUEGO
============================ */
const Game = {
    fase: 0,
    roles: ["Ladrón", "Luchador", "Diplomático", "Comerciante", "Recolector"],
    grupos: ["Alfa", "Beta", "Omega"].map(nombre => ({
        nombre,
        miembros: [] // Se llenará dinámicamente
    }))
};

function logger(msg) {
    const logDiv = document.getElementById("log");
    logDiv.innerHTML += `<br>> ${msg}`;
    logDiv.scrollTop = logDiv.scrollHeight;
}

/* ============================
RENDER
============================ */
function render() {
    let html = "";

    if (Game.fase === 0) {
        html += `
            <h2>🏝 La Isla - Dinámica Grupal</h2>
            <p class="tagline">Dinámica adecuada para la evaluación de <strong>liderazgo</strong>, <strong>trabajo en equipo</strong> y <strong>estrategia</strong>.</p>
            
            <div class="card">
                <h3>Configuración de Equipos</h3>
                <p><small>Mínimo 3, máximo 5 jugadores por equipo. Deja en blanco para menos de 5.</small></p>
                <div class="equipo-grid">
        `;

        Game.grupos.forEach((g, i) => {
            html += `<div class="card"><h4>Equipo ${g.nombre}</h4>`;
            for (let j = 0; j < 5; j++) {
                html += `
                    <div class="jugador-row">
                        <label>Jugador ${j + 1}:</label><br>
                        <input type="text" id="input_${i}_${j}" placeholder="Nombre del participante">
                    </div>`;
            }
            html += `</div>`;
        });

        html += `</div><button onclick="guardarJugadores()">Comenzar dinámica</button></div>`;
    }

    if (Game.fase === 1) {
        html += `<h2>Asignación de Roles</h2>
                 <p class="tagline">Seleccionen sus especialidades. Recuerden: algunos jugadores deben asumir doble responsabilidad.</p>
                 <div class="equipo-grid">`;

        Game.grupos.forEach((g, gIdx) => {
            html += `<div class="card"><h4>Equipo ${g.nombre}</h4>`;
            
            const total = g.miembros.length;

            g.miembros.forEach((m, jIdx) => {
                // Lógica de cantidad de roles solicitada
                let cantRoles = 1;
                if (total === 3 && (jIdx === 0 || jIdx === 1)) cantRoles = 2;
                if (total === 4 && jIdx === 0) cantRoles = 2;

                html += `<div class="jugador-row"><strong>${m.nombre}</strong> (Elige ${cantRoles})`;
                
                for(let r=0; r < cantRoles; r++) {
                    html += `
                        <select class="sel-rol" data-grupo="${gIdx}" id="rol_${gIdx}_${jIdx}_${r}">
                            <option value="">-- Seleccionar Rol --</option>
                            ${Game.roles.map(rol => `<option value="${rol}">${rol}</option>`).join("")}
                        </select>`;
                }
                html += `</div>`;
            });
            html += `</div>`;
        });

        html += `</div><button onclick="guardarRoles()">Finalizar Configuración</button>`;
    }

    if (Game.fase === 2) {
        html += `
            <div class="card" style="text-align:center">
                <h2>¡Dinámica Iniciada!</h2>
                <p>Los roles han sido asignados estratégicamente. Revisen el log para ver la distribución final.</p>
                <button onclick="location.reload()">Reiniciar</button>
            </div>`;
    }

    document.getElementById("app").innerHTML = html;
}

/* ============================
CONTROLADORES
============================ */
function guardarJugadores() {
    let error = false;
    Game.grupos.forEach((g, i) => {
        g.miembros = []; // Reset
        for (let j = 0; j < 5; j++) {
            let nombre = document.getElementById(`input_${i}_${j}`).value.trim();
            if (nombre) g.miembros.push({ nombre: nombre, roles: [] });
        }
        if (g.miembros.length < 3) {
            alert(`El equipo ${g.nombre} necesita al menos 3 jugadores.`);
            error = true;
        }
    });

    if (!error) {
        Game.fase = 1;
        logger("Jugadores registrados. Pasando a selección de roles.");
        render();
    }
}

function guardarRoles() {
    let errorMsg = "";
    
    Game.grupos.forEach((g, gIdx) => {
        let usados = new Set();
        
        g.miembros.forEach((m, jIdx) => {
            const selects = document.querySelectorAll(`[id^="rol_${gIdx}_${jIdx}_"]`);
            m.roles = [];
            
            selects.forEach(sel => {
                let rVal = sel.value;
                if (!rVal) errorMsg = "Todos los jugadores deben tener sus roles asignados.";
                if (usados.has(rVal)) errorMsg = `Conflicto en equipo ${g.nombre}: El rol '${rVal}' está repetido.`;
                usados.add(rVal);
                m.roles.push(rVal);
            });
        });
    });

    if (errorMsg) {
        alert(errorMsg);
        return;
    }

    logger("Roles asignados correctamente. Equipos listos para la isla.");
    Game.fase = 2;
    render();
}

render();
</script>
</body>
</html>
