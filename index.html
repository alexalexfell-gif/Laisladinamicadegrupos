<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>La Isla - Dinámica Grupal</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; }
        .scoreboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; position: sticky; top: 10px; z-index: 100; }
        .score-card { background: var(--primary); color: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        button { background: var(--success); color: white; border: none; padding: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.2em; transition: 0.3s; margin-top: 10px; box-shadow: 0 4px 0 #219150; }
        button:hover { background: #2ecc71; transform: translateY(-2px); }
        .log { background: #111; color: #0f0; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; height: 100px; overflow-y: auto; margin-top: 20px; }
        .instruction-highlight { color: #c0392b; font-weight: bold; background: #fff3f3; padding: 15px; border-radius: 8px; border: 1px dashed #e74c3c; margin-bottom: 20px; text-align: center; }
        select, input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 6px; }
        .role-label { font-size: 0.85em; color: #7f8c8d; font-weight: bold; display: block; margin-top: 5px; }
        .venganza-active { border: 2px solid var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div id="scoreboard" class="scoreboard" style="display:none;"></div>
    <div id="game-ui"></div>
    <div class="log" id="game-log">>> Sistema iniciado.</div>
</div>

<script>
const DB = {
    base: [
        { id: "agua", n: "Agua", c: "ali", p: 1 }, { id: "fruta", n: "Frutas", c: "ali", p: 1 },
        { id: "latas", n: "Enlatados", c: "ali", p: 1 }, { id: "botiquin", n: "Botiquín", c: "uti", p: 1 },
        { id: "cuerda", n: "Cuerda", c: "uti", p: 1 }, { id: "martillo", n: "Martillo", c: "uti", p: 1 },
        { id: "lona", n: "Lona", c: "uti", p: 1 }, { id: "encendedor", n: "Encendedor", c: "uti", p: 1 },
        { id: "mapa", n: "Mapa", c: "ori", p: 1 }, { id: "radio", n: "Radio", c: "ori", p: 1 }
    ],
    especiales: [
        { id: "pesca", n: "Caña de Pescar (2 pts)", c: "ali", p: 2 },
        { id: "mochila", n: "Mochila (2 pts)", c: "uti", p: 2 },
        { id: "brujula", n: "Brújula (2 pts)", c: "ori", p: 2 }
    ]
};

let Game = {
    paso: 1,
    equipos: [
        { nombre: "Alfa", inventario: [], venganza: false },
        { nombre: "Beta", inventario: [], venganza: false },
        { nombre: "Omega", inventario: [], venganza: false }
    ]
};

function log(msg) {
    const l = document.getElementById('game-log');
    l.innerHTML += `<br>> ${msg}`;
    l.scrollTop = l.scrollHeight;
}

function updateScoreboard() {
    const sb = document.getElementById('scoreboard');
    if (Game.paso < 3) return;
    sb.style.display = 'grid';
    sb.innerHTML = Game.equipos.map(e => {
        const p = e.inventario.reduce((acc, i) => { acc[i.c] += i.p; return acc; }, { ali:0, uti:0, ori:0 });
        return `<div class="score-card ${e.venganza ? 'venganza-active' : ''}">
            <small>Equipo ${e.nombre} ${e.venganza ? '🔥' : ''}</small>
            <div class="points">🍎${p.ali} | 🛠${p.uti} | 🧭${p.ori}</div>
        </div>`;
    }).join("");
}

function render() {
    const ui = document.getElementById('game-ui');
    updateScoreboard();

    if (Game.paso === 1) {
        ui.innerHTML = `<div class="card" style="text-align:center"><h1>🏝️ La Isla</h1><h3>Dinámica Grupal</h3><div class="author">Autor: Alejandro Scuro Rossi</div><button onclick="Game.paso=2; render();">Configurar Jugadores</button></div>`;
    } 
    else if (Game.paso === 2) {
        ui.innerHTML = `
            <div class="card">
                <h2>Paso 2: Registro de Jugadores</h2>
                <div class="instruction-highlight">
                    Equipos de 3: Jugadores 1 y 2 tienen 2 roles.<br>
                    Equipos de 4: Jugador 1 tiene 2 roles.
                </div>
                <div class="grid">${Game.equipos.map((e, i) => `
                    <div class="card">
                        <h3>Equipo ${e.nombre}</h3>
                        <label>Nº de Jugadores:</label>
                        <select id="num_jug_${i}" onchange="cambiarInputsJugadores(${i})">
                            <option value="5">5 Jugadores</option>
                            <option value="4">4 Jugadores</option>
                            <option value="3">3 Jugadores</option>
                        </select>
                        <div id="inputs_jug_${i}">
                            <input type="text" placeholder="Jugador 1 (Ladrón + ...)">
                            <input type="text" placeholder="Jugador 2">
                            <input type="text" placeholder="Jugador 3">
                            <input type="text" placeholder="Jugador 4">
                            <input type="text" placeholder="Jugador 5">
                        </div>
                    </div>
                `).join("")}</div>
                <button onclick="Game.paso=3; render();">Siguiente: Planeación</button>
            </div>`;
    }
    else if (Game.paso === 3) {
        ui.innerHTML = `<div class="card"><h2>Paso 3: Planeación Inicial (5 objetos)</h2><div class="instruction-highlight">🖱️ CTRL + CLIC para elegir 5 objetos.</div><div class="grid">${Game.equipos.map((e, i) => `<div class="card"><h3>Equipo ${e.nombre}</h3><select id="plan_${i}" multiple style="height:150px;">${DB.base.map(o => `<option value="${o.id}">${o.n} (${o.c})</option>`).join("")}</select><div id="count_${i}">Seleccionados: 0</div></div>`).join("")}</div><button onclick="procesarPaso3()">Confirmar Planeación</button></div>`;
        setTimeout(() => { Game.equipos.forEach((_, i) => { const s = document.getElementById(`plan_${i}`); if(s) s.onchange = () => document.getElementById(`count_${i}`).innerText = `Seleccionados: ${Array.from(s.selectedOptions).length}`; }); }, 100);
    }
    else if (Game.paso === 4) {
        ui.innerHTML = `
            <div class="card">
                <h2>Paso 4: Robo Nocturno</h2>
                <div class="grid">${Game.equipos.map((e, i) => `
                    <div class="card">
                        <h3>Ladrón de ${e.nombre}</h3>
                        <select id="accion_${i}" onchange="toggleRoboUI(${i})">
                            <option value="def">🛡️ Defender Campamento</option>
                            <option value="atk">👤 Robar a otro equipo</option>
                        </select>
                        <div id="robo_ui_${i}" style="display:none; margin-top:10px;">
                            <label class="role-label">¿A quién robar?</label>
                            <select id="victima_${i}" onchange="cargarItems(${i})">
                                <option value="">-- Elige Equipo --</option>
                                ${Game.equipos.map((v, vi) => i !== vi ? `<option value="${vi}">${v.nombre}</option>` : '').join("")}
                            </select>
                            <label class="role-label">¿Qué objeto?</label>
                            <select id="item_robo_${i}"><option value="">-- Elige Objeto --</option></select>
                        </div>
                    </div>
                `).join("")}</div>
                <button onclick="procesarPaso4()">Procesar Noche</button>
            </div>`;
    }
    else if (Game.paso === 5) {
        ui.innerHTML = `
            <div class="card">
                <h2>Paso 5: Pacto de Diplomáticos</h2>
                <div class="instruction-highlight">Selecciona los 2 equipos que hacen el pacto. El tercero tendrá Venganza.</div>
                <div class="grid">
                    <div class="card">
                        <h3>Equipos en Pacto</h3>
                        ${Game.equipos.map((e, i) => `<label><input type="checkbox" class="pacto-check" value="${i}"> ${e.nombre}</label><br>`).join("")}
                    </div>
                    <div class="card">
                        <h3>Entrega de Especiales</h3>
                        <p>Los equipos del pacto reciben 2 objetos especiales. El de venganza 1.</p>
                        <button onclick="resolverPacto()">Finalizar Pactos</button>
                    </div>
                </div>
            </div>`;
    }
}

/* LÓGICA DE JUGADORES */
function cambiarInputsJugadores(idx) {
    const num = document.getElementById(`num_jug_${idx}`).value;
    const cont = document.getElementById(`inputs_jug_${idx}`);
    let html = "";
    if(num == "3") {
        html = `<input type="text" placeholder="Jugador 1 (Ladrón + Diplomático)">
                <input type="text" placeholder="Jugador 2 (Luchador + Recolector)">
                <input type="text" placeholder="Jugador 3 (Comerciante)">`;
    } else if(num == "4") {
        html = `<input type="text" placeholder="Jugador 1 (Ladrón + Diplomático)">
                <input type="text" placeholder="Jugador 2">
                <input type="text" placeholder="Jugador 3">
                <input type="text" placeholder="Jugador 4">`;
    } else {
        html = `<input type="text" placeholder="Jugador 1">
                <input type="text" placeholder="Jugador 2">
                <input type="text" placeholder="Jugador 3">
                <input type="text" placeholder="Jugador 4">
                <input type="text" placeholder="Jugador 5">`;
    }
    cont.innerHTML = html;
}

/* FUNCIONES DE PASO 4 */
function toggleRoboUI(i) {
    const act = document.getElementById(`accion_${i}`).value;
    document.getElementById(`robo_ui_${i}`).style.display = (act === 'atk') ? 'block' : 'none';
}

function cargarItems(i)
