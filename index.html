<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La Isla - Dinámica Grupal</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  .resaltar { color: red; font-weight: bold; }
  .pasado { color: gray; }
  select, input, button { margin: 3px; }
</style>
</head>
<body>

<h1>La Isla - Dinámica grupal</h1>
<h2>Facilitador: Alejandro Scuro Rossi</h2>

<div id="contenido"></div>
<button onclick="siguientePaso()">Siguiente Paso</button>

<script>
let pasoActual = 0;

const nombresGrupos = ["Alfa","Beta","Omega"];

// Recursos iniciales
const recursos = [
  {nombre:"Agua", categoria:"Alimentación", puntos:1},
  {nombre:"Frutas", categoria:"Alimentación", puntos:1},
  {nombre:"Comida enlatada", categoria:"Alimentación", puntos:1},
  {nombre:"Botiquín", categoria:"Utilidad", puntos:1},
  {nombre:"Cuerda", categoria:"Utilidad", puntos:1},
  {nombre:"Martillo", categoria:"Utilidad", puntos:1},
  {nombre:"Lona", categoria:"Utilidad", puntos:1},
  {nombre:"Encendedor", categoria:"Utilidad", puntos:1},
  {nombre:"Mapa", categoria:"Orientación", puntos:1},
  {nombre:"Radio", categoria:"Orientación", puntos:1}
];

// Objetos de rol
const objetosRol = ["Machete","Antifaz","Maletín","Alianza militar","Guantes"];

// Recursos especiales Paso 5
const recursosEspeciales = [
  {nombre:"Caña de pescar", categoria:"Alimentación", puntos:2},
  {nombre:"Mochila", categoria:"Utilidad", puntos:2},
  {nombre:"Brújula", categoria:"Orientación", puntos:2}
];

// Grupos
let grupos = [
  {nombre:"Alfa", miembros:["Jugador1","Jugador2","Jugador3","Jugador4","Jugador5"], roles:[], objetos:[], protegido:false, noPacto:false},
  {nombre:"Beta", miembros:["Jugador6","Jugador7","Jugador8","Jugador9","Jugador10"], roles:[], objetos:[], protegido:false, noPacto:false},
  {nombre:"Omega", miembros:["Jugador11","Jugador12","Jugador13","Jugador14","Jugador15"], roles:[], objetos:[], protegido:false, noPacto:false}
];

// Paso 4
let objetosDescartados = [];

// Paso 5
let pactos = [];

// Función principal para mostrar cada paso
function mostrarPaso(){
  let html = "";
  switch(pasoActual){
    case 0:
      html += "<h3>Paso 1: Introducción</h3>";
      html += "<p>3 equipos en una isla. Sobrevivir requiere acumular objetos:</p>";
      html += "<ul><li>Alimentación: mínimo 4 puntos</li><li>Utilidad: mínimo 3 puntos</li><li>Orientación: mínimo 2 puntos</li></ul>";
      break;
      
    case 1:
      html += "<h3>Paso 2: Selección de roles y objetos de rol</h3>";
      grupos.forEach((g,i)=>{
        html += `<p><strong>Equipo ${g.nombre}</strong></p>`;
        g.miembros.forEach((m,j)=>{
          html += `${m} - Rol: <select id="rol${i}${j}" onchange="validarRoles(${i})">`;
          ["Comerciante","Diplomático","Luchador","Ladrón","Recolector"].forEach(r=>{
            html += `<option value="${r}">${r}</option>`;
          });
          html += `</select> `;
          html += `Objeto de rol: <select id="objRol${i}${j}" onchange="validarObjetos(${i})">`;
          objetosRol.forEach(o=> html += `<option value="${o}">${o}</option>`);
          html += `</select><br>`;
        });
      });
      html += `<button onclick="guardarPaso2()">Guardar roles y objetos</button>`;
      break;
      
    case 2:
      html += "<h3>Paso 3: Selección de 5 recursos por equipo</h3>";
      grupos.forEach((g,i)=>{
        html += `<p><strong>Equipo ${g.nombre}</strong></p>`;
        for(let r=0;r<5;r++){
          html += `Recurso ${r+1}: <select id="rec${i}${r}">`;
          recursos.forEach(obj=> html += `<option value="${obj.nombre}">${obj.nombre}</option>`);
          html += `</select><br>`;
        }
      });
      html += `<button onclick="guardarPaso3()">Guardar recursos</button>`;
      break;

    case 3:
      html += "<h3>Paso 4: Robo nocturno</h3>";
      grupos.forEach((g,i)=>{
        g.roles.forEach((rol,j)=>{
          if(rol==="Ladrón"){
            const ladr = g.miembros[j];
            html += `<p>${ladr} (${g.nombre}): 
              <select id="accion${i}${j}">
                <option value="">--Seleccionar acción--</option>
                <option value="proteger">Proteger</option>`;
            grupos.forEach((otro,k)=>{
              if(k!==i) html += `<option value="robar-${k}">Robar a ${nombresGrupos[k]}</option>`;
            });
            html += `</select> Objeto a robar (si aplica): <input type="text" id="objetoRobo${i}${j}"></p>`;
          }
        });
      });
      html += `<button onclick="resolverRobo()">Registrar acciones de robo</button>`;
      break;
      
    case 4:
      html += "<h3>Paso 5: Pacto entre diplomáticos</h3>";
      grupos.forEach((g,i)=>{
        g.roles.forEach((rol,j)=>{
          if(rol==="Diplomático"){
            const participante = g.miembros[j];
            html += `<button onclick="hacerPacto(${i},'${participante}')">Pacto: ${participante}</button> `;
          }
        });
      });
      html += `<p id="pactosActuales"></p>`;
      break;
      
    case 5:
      html += "<h3>Paso 6: Combate</h3>";
      grupos.forEach((g,i)=>{
        g.roles.forEach((rol,j)=>{
          if(rol==="Luchador"){
            const luch = g.miembros[j];
            html += `<p>${luch} (${g.nombre}):
              <select id="ataca${i}${j}"><option value="">--Atacar a--</option>`;
            grupos.forEach((otro,k)=>{
              if(k!==i && !(g.objetos.includes("Alianza militar") && grupos[k].objetos.includes("Alianza militar"))) html += `<option value="${k}">${nombresGrupos[k]}</option>`;
            });
            html += `</select>
            <select id="resultado${i}${j}"><option value="">--Resultado--</option>
              <option value="atacante">Victoria atacante</option>
              <option value="defensa">Victoria defensa</option>
            </select>
            Objeto a robar: <input type="text" id="objetoCombate${i}${j}"></p>`;
          }
        });
      });
      html += `<button onclick="resolverCombate()">Registrar Combates</button>`;
      break;

    case 6:
      html += "<h3>Paso 7: Recolección</h3>";
      const orden = ["Alfa","Beta","Omega","Beta","Alfa"];
      orden.forEach((nombre, idx)=>{
        const g = grupos[nombresGrupos.indexOf(nombre)];
        html += `<p>${nombre} elige objeto ${idx+1}: <select id="recolecta${idx}">`;
        objetosDescartados.forEach(obj => html += `<option value="${obj}">${obj}</option>`);
        html += `</select></p>`;
      });
      html += `<button onclick="resolverRecoleccion()">Registrar Recolección</button>`;
      break;
      
    case 7:
      html += "<h3>Paso 8: Intercambio</h3>";
      grupos.forEach((g,i)=>{
        html += `<p>${g.nombre}</p>`;
        for(let n=1;n<=2;n++){
          html += `Intercambio ${n}: <select id="intercambioPropio${i}${n}">`;
          g.objetos.forEach(obj => html += `<option value="${obj}">${obj}</option>`);
          html += `</select> con <select id="intercambioOtro${i}${n}">`;
          grupos.forEach((otro,k)=>{
            if(k!==i) otro.objetos.forEach(obj => html += `<option value="${k}|${obj}">${nombresGrupos[k]} - ${obj}</option>`);
          });
          html += `</select><br>`;
        }
      });
      html += `<button onclick="resolverIntercambios()">Registrar intercambios</button>`;
      break;

    case 8:
      html += "<h3>Paso 9: Resultados finales</h3>";
      grupos.forEach((g,i)=>{
        const puntajes = {Alimentación:0, Utilidad:0, Orientación:0};
        g.objetos.forEach(obj=>{
          let r = recursos.find(r=>r.nombre===obj);
          if(!r) r = recursosEspeciales.find(r=>r.nombre===obj);
          if(r) puntajes[r.categoria] += r.puntos;
        });
        let mensaje = (puntajes.Alimentación>=4 && puntajes.Utilidad>=3 && puntajes.Orientación>=2) ? "¡Victoria!" : "Derrota!";
        html += `<p>${g.nombre}: Alimentación ${puntajes.Alimentación}, Utilidad ${puntajes.Utilidad}, Orientación ${puntajes.Orientación} → <strong>${mensaje}</strong></p>`;
      });
      break;
  }
  document.getElementById("contenido").innerHTML = html;
}

// Funciones auxiliares

function validarRoles(indiceGrupo){
  const roles = new Set();
  grupos[indiceGrupo].miembros.forEach((m,j)=>{
    const rol = document.getElementById(`rol${indiceGrupo}${j}`).value;
    if(roles.has(rol)){
      alert("Este rol ya fue seleccionado en este grupo. Elige otro.");
      document.getElementById(`rol${indiceGrupo}${j}`).value = "";
    } else roles.add(rol);
  });
}

function validarObjetos(indiceGrupo){
  let seleccionados = [];
  grupos[indiceGrupo].miembros.forEach((m,j)=>{
    const obj = document.getElementById(`objRol${indiceGrupo}${j}`).value;
    if(obj) seleccionados.push(obj);
  });
  const contador = {};
  seleccionados.forEach(o=> contador[o]=(contador[o]||0)+1);
  for(let key in contador){
    if(contador[key]>1){
      alert("No se puede elegir el mismo objeto de rol más de una vez por grupo.");
      grupos[indiceGrupo].miembros.forEach((m,j)=>{
        const sel = document.getElementById(`objRol${indiceGrupo}${j}`);
        if(sel.value===key) sel.value="";
      });
    }
  }
  if(seleccionados.length>2){
    alert("Solo se pueden seleccionar 2 objetos de rol por grupo.");
  }
}

function guardarPaso2(){
  grupos.forEach((g,i)=>{
    g.roles = [];
    g.miembros.forEach((m,j)=>{
      g.roles[j] = document.getElementById(`rol${i}${j}`).value;
      g.objetos[j] = document.getElementById(`objRol${i}${j}`).value;
    });
  });
  alert("Roles y objetos de rol guardados");
}

// Resto de funciones paso 3 a 9 se mantienen igual que antes
// ... (resolverPaso3, resolverRobo, hacerPacto, resolverCombate, resolverRecoleccion, resolverIntercambios, siguientePaso)

function siguientePaso(){ mostrarPaso(); pasoActual++; }

mostrarPaso();
</script>

</body>
</html>
