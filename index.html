<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Isla - Alejandro Scuro Rossi</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --light: #ecf0f1; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; }
        .scoreboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .score-card { background: var(--primary); color: white; padding: 12px; border-radius: 10px; text-align: center; font-size: 0.9em; border-bottom: 4px solid var(--accent); }
        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        button { background: var(--success); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #2ecc71; transform: translateY(-1px); }
        .trade-slot { background: #f9f9f9; border: 1px solid #ddd; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .alliance-alert { background: #d1ecf1; color: #0c5460; padding: 10px; border-radius: 8px; border: 1px solid #bee5eb; margin-bottom: 15px; font-weight: bold; }
        .venganza-badge { background: var(--danger); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7em; }
        select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 6px; }
        .status-win { color: var(--success); font-weight: bold; font-size: 1.5em; }
        .status-lose { color: var(--danger); font-weight: bold; font-size: 1.5em; }
    </style>
</head>
<body>

<div class="container">
    <div id="scoreboard" class="scoreboard" style="display:none;"></div>
    <div id="game-ui"></div>
</div>

<script>
// --- DATOS ---
const CATALOGO_BASE = [
    { id: "agua", n: "Agua", c: "ali", p: 1 }, { id: "fruta", n: "Frutas", c: "ali", p: 1 }, { id: "latas", n: "Enlatados", c: "ali", p: 1 },
    { id: "botiquin", n: "Botiquín", c: "uti", p: 1 }, { id: "cuerda", n: "Cuerda", c: "uti", p: 1 }, { id: "martillo", n: "Martillo", c: "uti", p: 1 },
    { id: "lona", n: "Lona", c: "uti", p: 1 }, { id: "encendedor", n: "Encendedor", c: "uti", p: 1 }, { id: "mapa", n: "Mapa", c: "ori", p: 1 }, { id: "radio", n: "Radio", c: "ori", p: 1 }
];
const PACTO_OBJ = [{ id: "pesca", n: "Caña", c: "ali", p: 2 }, { id: "mochila", n: "Mochila", c: "uti", p: 2 }, { id: "brujula", n: "Brújula", c: "ori", p: 2 }];
const ROLES_OBJ = [
    { id: "antifaz", n: "Antifaz (Ladrón)", c: "uti", p: 1, type: "rol" },
    { id: "guantes", n: "Guantes (Recolector)", c: "ali", p: 1, type: "rol" },
    { id: "machete", n: "Machete (Luchador)", c: "uti", p: 1, type: "rol" },
    { id: "maletin", n: "Maletín (Comerciante)", c: "uti", p: 1, type: "rol" },
    { id: "alianza_mil", n: "Alianza militar (Diplomático)", c: "ori", p: 1, type: "rol" }
];

let Game = {
    paso: 1,
    equipos: [
        { nombre: "Alfa", inventario: [], attacks: 1, venganza: false, trades: 0 },
        { nombre: "Beta", inventario: [], attacks: 1, venganza: false, trades: 0 },
        { nombre: "Gamma", inventario: [], attacks: 1, venganza: false, trades: 0 }
    ],
    pactoActivo: [], descarte: [], recoleccionTurno: 0, ordenRecoleccion: [0, 1, 2, 2, 1, 0]
};

function render() {
    const ui = document.getElementById('game-ui');
    const sb = document.getElementById('scoreboard');

    if (Game.paso >= 3 && Game.paso < 9) {
        sb.style.display = 'grid';
        sb.innerHTML = Game.equipos.map(e => {
            const p = e.inventario.reduce((acc, i) => { acc[i.c] = (acc[i.c] || 0) + i.p; return acc; }, { ali:0, uti:0, ori:0 });
            return `<div class="score-card"><b>${e.nombre}</b><br>🍎${p.ali} | 🛠${p.uti} | 🧭${p.ori}</div>`;
        }).join("");
    } else { sb.style.display = 'none'; }

    if (Game.paso === 1) ui.innerHTML = `<div class="card" style="text-align:center"><h1>🏝️ La Isla</h1><button onclick="Game.paso=2; render();">Empezar Registro</button></div>`;
    
    else if (Game.paso === 2) {
        ui.innerHTML = `<div class="card"><h2>Paso 2: Registro</h2><div class="grid">${Game.equipos.map((e, i) => `<div class="card"><h3>${e.nombre}</h3><select id="sz_${i}"><option value="5">5 Jugadores</option><option value="4">4 Jugadores</option><option value="3">3 Jugadores</option></select></div>`).join("")}</div><button onclick="Game.paso=3; render()">Siguiente</button></div>`;
    }

    else if (Game.paso === 3) {
        ui.innerHTML = `<div class="card"><h2>Paso 3: Objetos Base</h2><div class="grid">${Game.equipos.map((e, i) => `<div class="card"><h3>${e.nombre}</h3><select id="p_${i}" multiple style="height:120px;">${CATALOGO_BASE.map(o => `<option value="${o.id}">${o.n}</option>`).join("")}</select></div>`).join("")}</div><button onclick="saveInv3()">Confirmar</button></div>`;
    }

    else if (Game.paso === 3.5) {
        ui.innerHTML = `<div class="card"><h2>Paso 3.5: Objetos de Rol</h2><div class="grid">${Game.equipos.map((e, i) => `<div class="card"><h3>${e.nombre}</h3><select id="ro_${i}" multiple style="height:120px;">${ROLES_OBJ.map(o => `<option value="${o.id}">${o.n}</option>`).join("")}</select></div>`).join("")}</div><button onclick="saveRoleInv()">Asignar</button></div>`;
    }

    else if (Game.paso === 5) {
        ui.innerHTML = `<div class="card"><h2>Paso 5: Pacto Diplomático</h2><div style="display:flex; justify-content:center; gap:20px;">${Game.equipos.map((e,i)=>`<div><input type="checkbox" class="p-check" value="${i}" id="chk${i}" onchange="updatePactUI()"><label for="chk${i}"> ${e.nombre}</label></div>`).join("")}</div><div id="pacto-area"></div><button onclick="processPact()">Confirmar Pacto</button></div>`;
    }

    else if (Game.paso === 6) {
        const tieneAlianza = Game.pactoActivo.some(idx => Game.equipos[idx].inventario.some(it => it.id === 'alianza_mil'));
        ui.innerHTML = `<div class="card"><h2>Paso 6: Lucha (PPT)</h2>
        ${tieneAlianza ? `<div class="alliance-alert">🛡️ Alianza Militar: No hay ataque entre pactantes.</div>` : ''}
        <div class="grid">${Game.equipos.map((e, i) => {
            let totalAtks = e.attacks + (e.venganza ? 1 : 0);
            let h = `<div class="card"><h3>${e.nombre} ${e.venganza?'<span class="venganza-badge">VENGANZA</span>':''}</h3>
            <select id="l_act_${i}" onchange="updateLuchaUI(${i})"><option value="atk">Atacar (${totalAtks})</option><option value="def">Defender</option></select>
            <div id="l_un_${i}">`;
            for(let a=0; a<totalAtks; a++){ 
                h += `<div class="trade-slot">
                    <select class="atk-v" data-from="${i}" data-atk-idx="${a}" onchange="loadAtkItems(this)"><option value="">Víctima?</option>${Game.equipos.map((v,vi)=>i!==vi?`<option value="${vi}">${v.nombre}</option>`:'').join("")}</select>
                    <select id="it_${i}_${a}" style="display:none"></select>
                    <div id="duel_${i}_${a}" style="display:none; margin-top:10px;">
                        A: <select id="selA_${i}_${a}"><option value="pi">Piedra</option><option value="pa">Papel</option><option value="ti">Tijera</option></select>
                        V: <select id="selV_${i}_${a}"><option value="pi">Piedra</option><option value="pa">Papel</option><option value="ti">Tijera</option></select>
                        <button onclick="resolverPPT(${i}, ${a})">⚔️ Luchar</button>
                    </div>
                </div>`; 
            }
            return h + `</div></div>`;
        }).join("")}</div><button onclick="Game.paso=8; render()">Pasar al Mercado</button></div>`;
    }

    else if (Game.paso === 8) {
        ui.innerHTML = `<div class="card"><h2>Paso 8: Mercado de Intercambios</h2><div class="grid">${Game.equipos.map((e, i) => `
            <div class="card"><h3>${e.nombre}</h3>
            ${[1,2].map(s=>`<div class="trade-slot">
                <select id="p${s}_${i}" onchange="loadTradeItems(${i},${s})"><option value="">Intercambiar con...</option>${Game.equipos.map((v,vi)=>i!==vi?`<option value="${vi}">${v.nombre}</option>`:'').join("")}</select>
                <div id="ui_${s}_${i}" style="display:none">
                    Doy: <select id="g${s}_${i}"></select>
                    Pido: <select id="t${s}_${i}"></select>
                </div>
            </div>`).join("")}</div>`).join("")}</div><button onclick="processMarket()">Finalizar Juego</button></div>`;
    }

    else if (Game.paso === 9) {
        ui.innerHTML = `<div class="card" style="text-align:center"><h2>Paso 9: Recuento Final</h2><div class="grid">${Game.equipos.map(e=>{
            const p = e.inventario.reduce((acc, i) => { acc[i.c] = (acc[i.c] || 0) + i.p; return acc; }, { ali:0, uti:0, ori:0 });
            const win = p.ali>=4 && p.uti>=3 && p.ori>=2;
            return `<div class="card"><h3>${e.nombre}</h3>
                <p class="${win?'status-win':'status-lose'}">${win?'SOBREVIVE':'MUERE'}</p>
                <p>🍎${p.ali}/4 | 🛠${p.uti}/3 | 🧭${p.ori}/2</p>
            </div>`;
        }).join("")}</div><button onclick="location.reload()">Nuevo Juego</button></div>`;
    }
}

// --- LOGICA MERCADO ---
function loadTradeItems(e,s){
    let v=document.getElementById(`p${s}_${e}`).value, ui=document.getElementById(`ui_${s}_${e}`);
    if(v==="") { ui.style.display="none"; return; } ui.style.display="block";
    document.getElementById(`g${s}_${e}`).innerHTML = Game.equipos[e].inventario.map((it,idx)=>`<option value="${idx}">${it.n}</option>`).join("");
    document.getElementById(`t${s}_${e}`).innerHTML = Game.equipos[v].inventario.map((it,idx)=>`<option value="${idx}">${it.n}</option>`).join("");
}

function processMarket() {
    for(let i=0;i<3;i++) {
        for(let s=1;s<=2;s++) {
            let vIdx = document.getElementById(`p${s}_${i}`).value;
            if(vIdx!=="" && Game.equipos[i].trades < 2 && Game.equipos[vIdx].trades < 2) {
                let gIdx=document.getElementById(`g${s}_${i}`).value, tIdx=document.getElementById(`t${s}_${i}`).value;
                let itDoy=Game.equipos[i].inventario.splice(gIdx,1)[0], itPido=Game.equipos[vIdx].inventario.splice(tIdx,1)[0];
                Game.equipos[i].inventario.push(itPido); Game.equipos[vIdx].inventario.push(itDoy);
                Game.equipos[i].trades++; Game.equipos[vIdx].trades++;
            }
        }
    }
    Game.paso=9; render();
}

// --- LOGICA PACTO ---
function updatePactUI() {
    let sel = Array.from(document.querySelectorAll('.p-check:checked')).map(c=>parseInt(c.value));
    let area = document.getElementById('pacto-area');
    if(sel.length !== 2) { area.innerHTML = ""; return; }
    let excluido = [0,1,2].find(i => !sel.includes(i));
    let html = `<div class="grid">`;
    sel.forEach(idx => {
        html += `<div class="card"><h4>${Game.equipos[idx].nombre} (Pacto)</h4><select class="p-sel" data-eq="${idx}" multiple style="height:60px;">${PACTO_OBJ.map(o=>`<option value="${o.id}">${o.n}</option>`).join("")}</select></div>`;
    });
    html += `<div class="card"><h4>${Game.equipos[excluido].nombre} (Venganza)</h4><select class="v-sel" data-eq="${excluido}">${PACTO_OBJ.map(o=>`<option value="${o.id}">${o.n}</option>`).join("")}</select></div></div>`;
    area.innerHTML = html;
}

function processPact() {
    let pactantes = Array.from(document.querySelectorAll('.p-check:checked')).map(c=>parseInt(c.value));
    if(pactantes.length !== 2) return alert("Elige 2.");
    document.querySelectorAll('.p-sel').forEach(s => {
        Array.from(s.selectedOptions).forEach(o => Game.equipos[s.dataset.eq].inventario.push({...PACTO_OBJ.find(x=>x.id===o.value)}));
    });
    let excluidoIdx = [0,1,2].find(i => !pactantes.includes(i));
    let vObjId = document.querySelector('.v-sel').value;
    Game.equipos[excluidoIdx].inventario.push({...PACTO_OBJ.find(x=>x.id===vObjId)});
    Game.equipos[excluidoIdx].venganza = true;
    Game.pactoActivo = pactantes;
    Game.paso = 6; render();
}

// --- LOGICA LUCHA ---
function updateLuchaUI(i) { document.getElementById(`l_un_${i}`).style.display = document.getElementById(`l_act_${i}`).value === 'atk' ? 'block' : 'none'; }
function loadAtkItems(el) {
    let vIdx = el.value, lIdx = el.dataset.from, atkIdx = el.dataset.atkIdx;
    let itSel = document.getElementById(`it_${lIdx}_${atkIdx}`), duelDiv = document.getElementById(`duel_${lIdx}_${atkIdx}`);
    if(vIdx === "") { itSel.style.display = "none"; duelDiv.style.display = "none"; return; }
    itSel.style.display = "block"; duelDiv.style.display = "block";
    itSel.innerHTML = Game.equipos[vIdx].inventario.map((it, idx) => it.type !== 'rol' ? `<option value="${idx}">${it.n}</option>` : '').join("");
}
function resolverPPT(lIdx, aIdx) {
    const vIdx = parseInt(document.querySelector(`.atk-v[data-from="${lIdx}"][data-atk-idx="${aIdx}"]`).value);
    const tieneAlianza = Game.pactoActivo.some(idx => Game.equipos[idx].inventario.some(it => it.id === 'alianza_mil'));
    if(tieneAlianza && Game.pactoActivo.includes(lIdx) && Game.pactoActivo.includes(vIdx)) return alert("Alianza Militar: No puedes atacar.");
    if(document.getElementById(`l_act_${vIdx}`).value === 'def') return alert("Ataque bloqueado por defensa.");
    const aChoice = document.getElementById(`selA_${lIdx}_${aIdx}`).value, vChoice = document.getElementById(`selV_${lIdx}_${aIdx}`).value;
    if(aChoice === vChoice) return alert("Empate.");
    if((aChoice==='pi' && vChoice==='ti') || (aChoice==='pa' && vChoice==='pi') || (aChoice==='ti' && vChoice==='pa')) {
        let itIdx = document.getElementById(`it_${lIdx}_${aIdx}`).value;
        let item = Game.equipos[vIdx].inventario.splice(itIdx, 1)[0];
        Game.equipos[lIdx].inventario.push(item); alert(`¡Robado: ${item.n}!`); render();
    } else { alert("Derrota en el duelo."); }
}

// --- AUXILIARES ---
function saveInv3() {
    for(let i=0;i<3;i++) {
        const sel = Array.from(document.getElementById(`p_${i}`).selectedOptions);
        if(sel.length!==5) return alert("Elige 5");
        Game.equipos[i].inventario = sel.map(opt=> ({...CATALOGO_BASE.find(b=>b.id===opt.value)}));
    }
    Game.paso=3.5; render();
}
function saveRoleInv() {
    for(let i=0;i<3;i++){
        let s=Array.from(document.getElementById(`ro_${i}`).selectedOptions); if(s.length!==2) return alert("Elige 2");
        s.forEach(o=>{ 
            let it = ROLES_OBJ.find(x=>x.id===o.value);
            Game.equipos[i].inventario.push({...it}); 
            if(it.id==='machete') Game.equipos[i].attacks = 2;
        });
    }
    Game.paso=5; render();
}
window.onload = render;
</script>
</body>
</html>
