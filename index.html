<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>La Isla: Sobrevivir - Sistema Integral</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; }
        
        /* Marcador de Supervivencia */
        .scoreboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; position: sticky; top: 0; z-index: 1000; margin-bottom: 20px; }
        .score-card { background: var(--primary); color: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border-bottom: 5px solid transparent; }
        .venganza-active { border-color: var(--danger); animation: glow 2s infinite; }
        @keyframes glow { 0% { box-shadow: 0 0 5px var(--danger); } 50% { box-shadow: 0 0 20px var(--danger); } 100% { box-shadow: 0 0 5px var(--danger); } }
        .points { font-size: 1.3em; font-weight: bold; margin: 5px 0; }
        .status-ok { color: #2ecc71; }

        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .tagline { font-style: italic; color: #666; border-left: 4px solid var(--accent); padding-left: 15px; margin-bottom: 20px; }
        
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: #2980b9; transform: translateY(-1px); }
        .btn-action { background: var(--warning); color: #2c3e50; margin-top: 5px; }
        .btn-next { background: var(--success); margin-top: 20px; font-size: 1.1em; }
        
        select, input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .log { background: #111; color: #0f0; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 12px; height: 120px; overflow-y: auto; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="scoreboard" class="scoreboard"></div>
    <div id="game-ui"></div>
    <div class="log" id="game-log">>> Sistema iniciado. Esperando configuración...</div>
</div>

<script>
/* ============================
   DATOS DE OBJETOS
   ============================ */
const DB = {
    base: [
        { id: "agua", n: "Agua", c: "ali", p: 1 }, { id: "fruta", n: "Frutas", c: "ali", p: 1 },
        { id: "latas", n: "Enlatados", c: "ali", p: 1 }, { id: "botiquin", n: "Botiquín", c: "uti", p: 1 },
        { id: "cuerda", n: "Cuerda", c: "uti", p: 1 }, { id: "martillo", n: "Martillo", c: "uti", p: 1 },
        { id: "lona", n: "Lona", c: "uti", p: 1 }, { id: "encendedor", n: "Encendedor", c: "uti", p: 1 },
        { id: "mapa", n: "Mapa", c: "ori", p: 1 }, { id: "radio", n: "Radio", c: "ori", p: 1 }
    ],
    especiales: [
        { id: "pesca", n: "Caña de Pescar (2 pts)", c: "ali", p: 2 },
        { id: "mochila", n: "Mochila (2 pts)", c: "uti", p: 2 },
        { id: "brujula", n: "Brújula (2 pts)", c: "ori", p: 2 }
    ]
};

let Game = {
    paso: 1,
    equipos: ["Alfa", "Beta", "Omega"].map(n => ({
        nombre: n, inventario: [], descarte: [], venganza: false
    }))
};

/* ============================
   SISTEMA DE UI
   ============================ */
function log(msg) {
    const l = document.getElementById('game-log');
    l.innerHTML += `<br>> ${msg}`;
    l.scrollTop = l.scrollHeight;
}

function updateScoreboard() {
    const sb = document.getElementById('scoreboard');
    sb.innerHTML = Game.equipos.map(e => {
        const p = e.inventario.reduce((acc, i) => { acc[i.c] += i.p; return acc; }, { ali:0, uti:0, ori:0 });
        return `
            <div class="score-card ${e.venganza ? 'venganza-active' : ''}">
                <small>Equipo ${e.nombre} ${e.venganza ? '🔥 VENGANZA' : ''}</small>
                <div class="points">
                    <span class="${p.ali>=4?'status-ok':''}">🍎${p.ali}</span> | 
                    <span class="${p.uti>=3?'status-ok':''}">🛠${p.uti}</span> | 
                    <span class="${p.ori>=2?'status-ok':''}">🧭${p.ori}</span>
                </div>
                <div style="font-size:0.7em; opacity:0.7;">Meta: 4 | 3 | 2</div>
            </div>`;
    }).join("");
}

/* ============================
   NAVEGACIÓN DE PASOS
   ============================ */
function render() {
    const ui = document.getElementById('game-ui');
    updateScoreboard();

    switch(Game.paso) {
        case 1: // Formación
            ui.innerHTML = `
                <div class="card">
                    <h2>Paso 1 y 2: Equipos y Liderazgo</h2>
                    <p class="tagline">Define los roles y el tipo de liderazgo de cada equipo.</p>
                    <div class="grid">${Game.equipos.map(e => `
                        <div class="card"><h3>${e.nombre}</h3><input type="text" placeholder="Líder/Roles asignados..."></div>
                    `).join("")}</div>
                    <button class="btn-next" onclick="Game.paso=3; render();">Siguiente: Planeación Inicial</button>
                </div>`;
            break;

        case 3: // Planeación
            ui.innerHTML = `
                <div class="card">
                    <h2>Paso 3: Planeación Inicial</h2>
                    <p class="tagline">Cada equipo elige 5 objetos base. Los otros 5 quedan para el Recolector.</p>
                    <div class="grid">${Game.equipos.map((e, i) => `
                        <div class="card">
                            <h3>${e.nombre}</h3>
                            <select id="plan_${i}" multiple style="height:150px">
                                ${DB.base.map(o => `<option value="${o.id}">${o.n} (${o.c})</option>`).join("")}
                            </select>
                        </div>
                    `).join("")}</div>
                    <button class="btn-next" onclick="procesarPaso3()">Confirmar y seguir al Paso 4</button>
                </div>`;
            break;

        case 4: // Robo Nocturno
            ui.innerHTML = `
                <div class="card">
                    <h2>Paso 4: Robo Nocturno</h2>
                    <p class="tagline">Indica la acción del Ladrón. Si roba, elige a quién y qué objeto.</p>
                    <div class="grid">${Game.equipos.map((e, i) => `
                        <div class="card">
                            <h3>Ladrón ${e.nombre}</h3>
                            <select id="acc_ladron_${i}" onchange="updateUI4(${i})">
                                <option value="defender">🛡️ Proteger</option>
                                <option value="robar">👤 Robar</option>
                            </select>
                            <div id="box_robo_${i}" style="display:none">
                                <select id="vic_ladron_${i}" onchange="loadInvVictima(${i}, 'vic_ladron_${i}', 'obj_ladron_${i}')">
                                    <option value="">¿A quién?</option>
                                    ${Game.equipos.map((v, vi) => i!==vi ? `<option value="${vi}">${v.nombre}</option>` : '').join("")}
                                </select>
                                <select id="obj_ladron_${i}"><option>-- Objeto --</option></select>
                            </div>
                        </div>
                    `).join("")}</div>
                    <button class="btn-next" onclick="procesarPaso4()">Procesar Noche</button>
                </div>`;
            break;

        case 5: // Pacto
            ui.innerHTML = `
                <div class="card">
                    <h2>Paso 5: Pacto de Diplomáticos</h2>
                    <p class="tagline">Marca a los 2 equipos que pactan. El excluido obtiene 1 objeto y Venganza.</p>
                    <div class="grid">
                        <div class="card">
                            <h3>Equipos en el Pacto</h3>
                            ${Game.equipos.map((e, i) => `<label><input type="checkbox" class="pacto-check" value="${i}"> ${e.nombre}</label><br>`).join("")}
                        </div>
                        <div class="card">
                            <h3>Objetos Especiales (2 pts)</h3>
                            ${Game.equipos.map((e, i) => `
                                <div style="margin-bottom:10px">
                                    <strong>${e.nombre}:</strong>
                                    <select class="esp-1-${i}">${DB.especiales.map(o=>`<option value="${o.id}">${o.n}</option>`).join("")}</select>
                                    <select class="esp-2-${i}"><option value="">Ninguno</option>${DB.especiales.map(o=>`<option value="${o.id}">${o.n}</option>`).join("")}</select>
                                </div>
                            `).join("")}
                        </div>
                    </div>
                    <button class="btn-next" onclick="procesarPaso5()">Confirmar Pacto</button>
                </div>`;
            break;

        case 6: // Combate
            ui.innerHTML = `
                <div class="card">
                    <h2>Paso 6: Combate (Luchadores)</h2>
                    <p class="tagline">Registra los duelos. Si el atacante vence, el objeto se transfiere automáticamente.</p>
                    <div class="grid">${Game.equipos.map((e, i) => {
                        const n = e.venganza ? 2 : 1;
                        let ataques = "";
                        for(let a=0; a<n; a++) {
                            ataques += `
                            <div style="border-top:1px solid #eee; margin-top:10px; padding-top:10px">
                                <small>Ataque ${n>1?a+1:''}</small>
                                <select id="vic_c_${i}_${a}" onchange="loadInvVictima(${i}, 'vic_c_${i}_${a}', 'obj_c_${i}_${a}')">
                                    <option value="">¿Víctima?</option>
                                    ${Game.equipos.map((v, vi) => i!==vi ? `<option value="${vi}">${v.nombre}</option>` : '').join("")}
                                </select>
                                <select id="res_c_${i}_${a}"><option value="win">Victoria Atacante</option><option value="lose">Victoria Defensor</option></select>
                                <select id="obj_c_${i}_${a}"><option value="">-- Objeto --</option></select>
                                <button class="btn-action" onclick="procesarCombate(${i}, ${a})">Registrar</button>
                            </div>`;
                        }
                        return `<div class="card"><h3>${e.nombre} ${e.venganza?'🔥':''}</h3>${ataques}</div>`;
                    }).join("")}</div>
                    <button class="btn-next" onclick="Game.paso=7; render();">Ir a Recolección</button>
                </div>`;
            break;

        case 7: // Recolección
            ui.innerHTML = `
                <div class="card">
                    <h2>Paso 7: Recolección (Recolectores)</h2>
                    <p class="tagline">Eligen 2 objetos de los descartes iniciales.</p>
                    <div class="grid">${Game.equipos.map((e, i) => `
                        <div class="card">
                            <h3>${e.nombre}</h3>
                            <select id="rec1_${i}">${DB.base.map(o=>`<option value="${o.id}">${o.n}</option>`).join("")}</select>
                            <select id="rec2_${i}">${DB.base.map(o=>`<option value="${o.id}">${o.n}</option>`).join("")}</select>
                        </div>
                    `).join("")}</div>
                    <button class="btn-next" onclick="procesarPaso7()">Finalizar Recolección</button>
                </div>`;
            break;

        case 8: // Intercambio
            ui.innerHTML = `
                <div class="card">
                    <h2>Paso 8: Intercambio (Comerciantes)</h2>
                    <div class="grid">${Game.equipos.map((e, i) => `
                        <div class="card">
                            <h3>${e.nombre}</h3>
                            <select id="int_${i}"><option value="">Añadir por intercambio...</option>${DB.base.map(o=>`<option value="${o.id}">${o.n}</option>`).join("")}</select>
                            <button onclick="manualAdd(${i})">Añadir Objeto</button>
                        </div>
                    `).join("")}</div>
                    <button class="btn-next" onclick="Game.paso=9; render();">Ver Veredicto Final</button>
                </div>`;
            break;

        case 9: // Fin
            ui.innerHTML = `
                <div class="card" style="text-align:center">
                    <h2>Paso 9: Decisión Final</h2>
                    <div class="grid">${Game.equipos.map(e => {
                        const p = e.inventario.reduce((acc, i) => { acc[i.c] += i.p; return acc; }, { ali:0, uti:0, ori:0 });
                        const v = p.ali>=4 && p.uti>=3 && p.ori>=2;
                        return `<div class="card" style="border:3px solid ${v? 'green' : 'red'}">
                                    <h3>Equipo ${e.nombre}</h3>
                                    <h1 style="color:${v?'green':'red'}">${v?'SOBREVIVEN':'PERECEN'}</h1>
                                </div>`;
                    }).join("")}</div>
                    <button onclick="location.reload()">Reiniciar Dinámica</button>
                </div>`;
            break;
    }
}

/* ============================
   LÓGICA DE PROCESAMIENTO
   ============================ */

function procesarPaso3() {
    Game.equipos.forEach((e, i) => {
        const sel = Array.from(document.getElementById(`plan_${i}`).selectedOptions).map(o => o.value);
        if(sel.length !== 5) { alert(`Equipo ${e.nombre} debe elegir 5.`); throw "err"; }
        e.inventario = sel.map(id => DB.base.find(o => o.id === id));
    });
    log("Paso 3 completado: Recursos base asignados.");
    Game.paso = 4; render();
}

function updateUI4(i) {
    document.getElementById(`box_robo_${i}`).style.display = document.getElementById(`acc_ladron_${i}`).value === 'robar' ? 'block' : 'none';
}

function loadInvVictima(aIdx, vId, oId) {
    const vIdx = document.getElementById(vId).value;
    const oSel = document.getElementById(oId);
    if(vIdx === "") return;
    oSel.innerHTML = Game.equipos[vIdx].inventario.map((obj, i) => `<option value="${i}">${obj.n}</option>`).join("");
}

function procesarPaso4() {
    const defensas = Game.equipos.map((_, i) => document.getElementById(`acc_ladron_${i}`).value === 'defender');
    Game.equipos.forEach((ladron, i) => {
        if(document.getElementById(`acc_ladron_${i}`).value === 'robar') {
            const vIdx = document.getElementById(`vic_ladron_${i}`).value;
            const oIdx = document.getElementById(`obj_ladron_${i}`).value;
            if(defensas[vIdx]) log(`El robo de ${ladron.nombre} falló: Defensa activada.`);
            else {
                const item = Game.equipos[vIdx].inventario.splice(oIdx, 1)[0];
                ladron.inventario.push(item);
                log(`${ladron.nombre} robó exitosamente ${item.n} de ${Game.equipos[vIdx].nombre}`);
            }
        }
    });
    Game.paso = 5; render();
}

function procesarPaso5() {
    const checks = Array.from(document.querySelectorAll('.pacto-check:checked')).map(c => parseInt(c.value));
    if(checks.length === 2) {
        const excIdx = [0,1,2].find(i => !checks.includes(i));
        Game.equipos[excIdx].venganza = true;
        log(`Pacto entre dos. ${Game.equipos[excIdx].nombre} obtiene Venganza.`);
    }
    Game.equipos.forEach((e, i) => {
        const limit = (e.venganza) ? 1 : 2;
        const o1 = document.querySelector(`.esp-1-${i}`).value;
        const o2 = document.querySelector(`.esp-2-${i}`).value;
        e.inventario.push(DB.especiales.find(o => o.id === o1));
        if(limit === 2 && o2) e.inventario.push(DB.especiales.find(o => o.id === o2));
    });
    Game.paso = 6; render();
}

function procesarCombate(aIdx, aNum) {
    const vIdx = document.getElementById(`vic_c_${aIdx}_${aNum}`).value;
    const res = document.getElementById(`res_c_${aIdx}_${aNum}`).value;
    const oIdx = document.getElementById(`obj_c_${aIdx}_${aNum}`).value;
    if(res === 'win' && oIdx !== "") {
        const item = Game.equipos[vIdx].inventario.splice(oIdx, 1)[0];
        Game.equipos[aIdx].inventario.push(item);
        log(`Combate: ${Game.equipos[aIdx].nombre} gana objeto de ${Game.equipos[vIdx].nombre}.`);
    } else {
        log(`Combate: ${Game.equipos[vIdx].nombre} defendió con éxito.`);
    }
    updateScoreboard();
}

function procesarPaso7() {
    Game.equipos.forEach((e, i) => {
        e.inventario.push(DB.base.find(o => o.id === document.getElementById(`rec1_${i}`).value));
        e.inventario.push(DB.base.find(o => o.id === document.getElementById(`rec2_${i}`).value));
    });
    Game.paso = 8; render();
}

function manualAdd(i) {
    const id = document.getElementById(`int_${i}`).value;
    if(id) { Game.equipos[i].inventario.push(DB.base.find(o => o.id === id)); updateScoreboard(); }
}

render();
</script>
</body>
</html>
