<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>La Isla - Dinámica Grupal</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; }
        .scoreboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .score-card { background: var(--primary); color: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); position: relative; }
        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eef2f3; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        button { background: var(--success); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1em; transition: 0.3s; margin-top: 10px; box-shadow: 0 4px 0 #219150; }
        button:hover { background: #2ecc71; transform: translateY(-2px); }
        .role-tag { font-size: 0.8em; font-weight: bold; color: var(--accent); display: block; margin-top: 8px; text-transform: uppercase; }
        .name-highlight { color: var(--danger); font-weight: bold; border-bottom: 2px solid var(--danger); padding: 0 2px; }
        .instruction-highlight { color: #c0392b; font-weight: bold; background: #fff3f3; padding: 15px; border-radius: 8px; border: 1px dashed #e74c3c; margin-bottom: 20px; text-align: center; }
        .alliance-alert { background: #d1ecf1; color: #0c5460; padding: 15px; border-radius: 8px; border: 1px solid #bee5eb; margin-top: 15px; font-weight: bold; display: none; text-align: center; }
        .venganza-badge { background: var(--danger); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7em; position: absolute; top: -5px; right: -5px; border: 1px solid white; }
        .kbd { background: #eee; border-radius: 3px; border: 1px solid #b4b4b4; padding: 1px 4px; font-size: 0.9em; }
        select, input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <div id="scoreboard" class="scoreboard" style="display:none;"></div>
    <div id="game-ui"></div>
</div>

<script>
const DB = {
    base: [
        { id: "agua", n: "Agua", c: "ali", p: 1 }, { id: "fruta", n: "Frutas", c: "ali", p: 1 },
        { id: "latas", n: "Enlatados", c: "ali", p: 1 }, { id: "botiquin", n: "Botiquín", c: "uti", p: 1 },
        { id: "cuerda", n: "Cuerda", c: "uti", p: 1 }, { id: "martillo", n: "Martillo", c: "uti", p: 1 },
        { id: "lona", n: "Lona", c: "uti", p: 1 }, { id: "encendedor", n: "Encendedor", c: "uti", p: 1 },
        { id: "mapa", n: "Mapa", c: "ori", p: 1 }, { id: "radio", n: "Radio", c: "ori", p: 1 }
    ],
    pactoObj: [
        { id: "pali", n: "Super Alimento (Militar)", c: "ali", p: 2 },
        { id: "puti", n: "Herramientas Pesadas", c: "uti", p: 2 },
        { id: "pori", n: "Sistema de Navegación", c: "ori", p: 2 }
    ]
};

let Game = {
    paso: 1,
    equipos: [
        { nombre: "Alfa", inventario: [], roles: {}, venganza: false },
        { nombre: "Beta", inventario: [], roles: {}, venganza: false },
        { nombre: "Omega", inventario: [], roles: {}, venganza: false }
    ]
};

function render() {
    const ui = document.getElementById('game-ui');
    const sb = document.getElementById('scoreboard');

    if (Game.paso >= 3) {
        sb.style.display = 'grid';
        sb.innerHTML = Game.equipos.map(e => {
            const p = e.inventario.reduce((acc, i) => { acc[i.c] = (acc[i.c] || 0) + i.p; return acc; }, { ali:0, uti:0, ori:0 });
            return `<div class="score-card">
                ${e.venganza ? '<span class="venganza-badge">VENGANZA ACTIVADA</span>' : ''}
                <small>Equipo ${e.nombre}</small>
                <div style="font-weight:bold;">🍎${p.ali} | 🛠${p.uti} | 🧭${p.ori}</div>
            </div>`;
        }).join("");
    }

    if (Game.paso === 1) {
        ui.innerHTML = `<div class="card" style="text-align:center"><h1>🏝️ La Isla</h1><p>Autor: Alejandro Scuro Rossi</p><button onclick="Game.paso=2; render();">Iniciar Configuración</button></div>`;
    } 
    else if (Game.paso === 2) {
        ui.innerHTML = `<div class="card"><h2>Paso 2: Registro de Jugadores y Roles</h2><div class="grid">${Game.equipos.map((e, i) => `
            <div class="card"><h3>Equipo ${e.nombre}</h3>
            <label>Nº Jugadores:</label><select id="sz_${i}" onchange="updateFields(${i})"><option value="5">5</option><option value="4">4</option><option value="3">3</option></select>
            <div id="fields_${i}">${generateFields(5, i)}</div></div>`).join("")}</div>
            <button onclick="saveRoles()">Confirmar Roles</button></div>`;
    }
    else if (Game.paso === 3) {
        ui.innerHTML = `<div class="card"><h2>Paso 3: Planeación Inicial</h2>
            <div class="instruction-highlight">⚠️ Selecciona exactamente 5 objetos usando <span class="kbd">Ctrl + Clic</span>.</div>
            <div class="grid">${Game.equipos.map((e, i) => `<div class="card"><h3>${e.nombre}</h3><select id="p_${i}" multiple style="height:150px;">${DB.base.map(o => `<option value="${o.id}">${o.n}</option>`).join("")}</select><div id="c_${i}" style="font-weight:bold; color:var(--accent); margin-top:5px;">Seleccionados: 0/5</div></div>`).join("")}</div>
            <button onclick="saveInv()">Guardar Inventarios</button></div>`;
        setTimeout(() => Game.equipos.forEach((_,i) => { const s = document.getElementById(`p_${i}`); if(s) s.onchange = () => document.getElementById(`c_${i}`).innerText = `Seleccionados: ${Array.from(s.selectedOptions).length}/5`; }), 100);
    }
    else if (Game.paso === 4) {
        ui.innerHTML = `<div class="card"><h2>Paso 4: Robo Nocturno</h2>
            <div class="instruction-highlight">Acción de los Ladrones: <span class="name-highlight">${Game.equipos[0].roles.ladron}</span>, <span class="name-highlight">${Game.equipos[1].roles.ladron}</span> y <span class="name-highlight">${Game.equipos[2].roles.ladron}</span>.</div>
            <div class="grid">${Game.equipos.map((e, i) => `
            <div class="card"><h3>${e.nombre}</h3><span class="role-tag">Ladrón: ${e.roles.ladron}</span>
            <select id="a_${i}" onchange="toggleRoboUI(${i})"><option value="def">🛡️ Defender</option><option value="atk">👤 Robar</option></select>
            <div id="u_${i}" style="display:none;margin-top:10px;">
                <select id="v_${i}" onchange="loadVictimInv(${i})"><option value="">¿A quién?</option>${Game.equipos.map((v, vi) => i!==vi ? `<option value="${vi}">${v.nombre}</option>` : '').join("")}</select>
                <select id="it_${i}" style="margin-top:5px;"><option value="">-- Objeto --</option></select>
            </div></div>`).join("")}</div><button onclick="processNight()">Resolver Noche</button></div>`;
    }
    else if (Game.paso === 5) {
        ui.innerHTML = `<div class="card"><h2>Paso 5: Pacto de Diplomáticos</h2>
            <div class="instruction-highlight">Diplomáticos al habla: <span class="name-highlight">${Game.equipos[0].roles.diplomatico}</span>, <span class="name-highlight">${Game.equipos[1].roles.diplomatico}</span> y <span class="name-highlight">${Game.equipos[2].roles.diplomatico}</span>.</div>
            <div class="card"><h3>Selección de Alianza</h3>
                <p>Marque los dos equipos que llegan a un acuerdo:</p>
                <div style="text-align:center; margin: 20px 0;">
                    <label><input type="checkbox" class="p-check" value="0"> Alfa</label> &nbsp;&nbsp;
                    <label><input type="checkbox" class="p-check" value="1"> Beta</label> &nbsp;&nbsp;
                    <label><input type="checkbox" class="p-check" value="2"> Omega</label>
                </div>
                <div id="pacto-area" style="display:none;">
                    <div class="grid" id="recursos-pacto"></div>
                    <div id="mil-aviso" class="alliance-alert">🛡️ ALIANZA MILITAR DETECTADA: Los equipos pactados no podrán atacarse en la siguiente fase.</div>
                </div>
                <button onclick="confirmarPacto()" style="margin-top:20px;">Confirmar Pacto y Seguir (Hacia Paso 9)</button>
            </div></div>`;
        setTimeout(() => document.querySelectorAll('.p-check').forEach(c => c.onchange = updatePactoUI), 100);
    }
    else if (Game.paso === 9) {
        ui.innerHTML = `<div class="card" style="text-align:center;"><h2>Paso 9: Resolución Final</h2>
            <p>Aquí se calcularán las probabilidades de supervivencia final basadas en los recursos acumulados.</p>
            <button onclick="location.reload()">Reiniciar Todo</button></div>`;
    }
}

function updatePactoUI() {
    const sel = Array.from(document.querySelectorAll('.p-check:checked')).map(c => parseInt(c.value));
    const area = document.getElementById('pacto-area');
    if (sel.length === 2) {
        area.style.display = 'block';
        const excluido = [0,1,2].find(i => !sel.includes(i));
        let html = `<div><h4>Aliados (Eligen 2 objetos c/u):</h4>`;
        sel.forEach(idx => {
            html += `<p><strong>${Game.equipos[idx].nombre}</strong><br><select class="p-sel" data-eq="${idx}" multiple style="height:80px;">
                ${DB.pactoObj.map(o => `<option value="${o.id}">${o.n} (${o.c})</option>`).join("")}</select></p>`;
        });
        html += `</div><div><h4>Excluido (Elige 1 objeto):</h4><p><strong>${Game.equipos[excluido].nombre}</strong><br>
            <select class="p-sel" data-eq="${excluido}">${DB.pactoObj.map(o => `<option value="${o.id}">${o.n} (${o.c})</option>`).join("")}</select></p>
            <p style="color:var(--danger); font-weight:bold;">Luchador: ${Game.equipos[excluido].roles.luchador} gana estado Venganza.</p></div>`;
        document.getElementById('recursos-pacto').innerHTML = html;
        
        document.querySelectorAll('.p-sel').forEach(s => s.onchange = () => {
            const hasMil = Array.from(document.querySelectorAll('.p-sel option:selected')).some(o => o.text.includes('Militar'));
            document.getElementById('mil-aviso').style.display = hasMil ? 'block' : 'none';
        });
    } else { area.style.display = 'none'; }
}

function confirmarPacto() {
    const sel = Array.from(document.querySelectorAll('.p-check:checked')).map(c => parseInt(c.value));
    if(sel.length !== 2) { alert("Debe haber exactamente 2 equipos aliados."); return; }
    
    document.querySelectorAll('.p-sel').forEach(s => {
        const eq = s.dataset.eq;
        Array.from(s.selectedOptions).forEach(o => Game.equipos[eq].inventario.push(DB.pactoObj.find(x => x.id === o.value)));
    });
    
    const excluido = [0,1,2].find(i => !sel.includes(i));
    Game.equipos[excluido].venganza = true;
    
    alert("Pacto registrado. Avanzando en la historia...");
    Game.paso = 9; render();
}

function generateFields(s, i) {
    let roles = (s==5) ? ["Ladrón", "Diplomático", "Luchador", "Recolector", "Comerciante"] : 
                (s==4) ? ["Ladrón + Diplomático", "Luchador", "Recolector", "Comerciante"] : 
                         ["Ladrón + Diplomático", "Luchador + Recolector", "Comerciante"];
    return roles.map((r, idx) => `<span class="role-tag">${r}</span><input type="text" id="r${idx}_${i}">`).join("");
}

function updateFields(i) { document.getElementById(`fields_${i}`).innerHTML = generateFields(document.getElementById(`sz_${i}`).value, i); }

function saveRoles() {
    Game.equipos.forEach((e, i) => {
        const sz = document.getElementById(`sz_${i}`).value;
        const v = (id) => document.getElementById(`r${id}_${i}`).value || "Estudiante";
        if(sz==5) e.roles = { ladron:v(0), diplomatico:v(1), luchador:v(2), recolector:v(3), comerciante:v(4) };
        if(sz==4) e.roles = { ladron:v(0), diplomatico:v(0), luchador:v(1), recolector:v(2), comerciante:v(3) };
        if(sz==3) e.roles = { ladron:v(0), diplomatico:v(0), luchador:v(1), recolector:v(1), comerciante:v(2) };
    });
    Game.paso = 3; render();
}

function saveInv() {
    for(let i=0; i<3; i++) {
        const s = Array.from(document.getElementById(`p_${i}`).selectedOptions);
        if(s.length!==5) { alert("¡Debes elegir exactamente 5 objetos!"); return; }
        Game.equipos[i].inventario = s.map(o => DB.base.find(x => x.id === o.value));
    }
    Game.paso = 4; render();
}

function toggleRoboUI(i) { document.getElementById(`u_${i}`).style.display = document.getElementById(`a_${i}`).value === 'atk' ? 'block' : 'none'; }
function loadVictimInv(i) {
    const v = document.getElementById(`v_${i}`).value;
    if(v==="") return;
    document.getElementById(`it_${i}`).innerHTML = Game.equipos[v].inventario.map((obj, idx) => `<option value="${idx}">${obj.n}</option>`).join("");
}
function processNight() {
    const defs = Game.equipos.map((_, i) => document.getElementById(`a_${i}`).value === 'def');
    Game.equipos.forEach((l, i) => {
        const vIdx = document.getElementById(`v_${i}`).value;
        const itIdx = document.getElementById(`it_${i}`).value;
        if(document.getElementById(`a_${i}`).value === 'atk' && vIdx !== "" && !defs[vIdx]) {
            l.inventario.push(Game.equipos[vIdx].inventario.splice(itIdx, 1)[0]);
        }
    });
    Game.paso = 5; render();
}

document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
