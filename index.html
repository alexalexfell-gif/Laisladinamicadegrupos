<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La Isla - Versión Online</title>

<style>
body{
    font-family: Arial;
    padding:20px;
    background:#eef2f3;
}
h3{margin-top:30px}
.equipo{
    border:1px solid #ccc;
    padding:10px;
    margin:10px 0;
    background:white;
}
.destacado{
    color:#b30000;
    font-weight:bold;
}
button{
    margin-top:15px;
    padding:8px 15px;
}
.log{
    background:#111;
    color:#0f0;
    padding:10px;
    height:220px;
    overflow:auto;
    font-size:13px;
    margin-top:20px;
}
.resumen{
    font-size:13px;
    margin-top:5px;
    color:#333;
}
</style>
</head>
<body>

<h2>🏝 La Isla - Juego Estratégico</h2>

<div id="contenido"></div>
<div class="log" id="log"></div>

<script>

let paso = 0;

const rolesDisponibles = [
"Ladrón","Luchador","Diplomático","Comerciante","Recolector"
];

const recursosBase = [
{nombre:"Agua",categoria:"Alimentación",puntos:1},
{nombre:"Fruta",categoria:"Alimentación",puntos:1},
{nombre:"Madera",categoria:"Utilidad",puntos:1},
{nombre:"Cuerda",categoria:"Utilidad",puntos:1},
{nombre:"Mapa",categoria:"Orientación",puntos:1},
{nombre:"Brújula básica",categoria:"Orientación",puntos:1}
];

const recursosEspeciales = [
{nombre:"Caña de pescar",categoria:"Alimentación",puntos:2},
{nombre:"Mochila",categoria:"Utilidad",puntos:2},
{nombre:"Brújula",categoria:"Orientación",puntos:2}
];

let grupos = ["Alfa","Beta","Omega"].map(nombre=>({
    nombre,
    miembros:[
        {nombre:"",roles:[]},
        {nombre:"",roles:[]},
        {nombre:"",roles:[]},
        {nombre:"",roles:[]},
        {nombre:"",roles:[]}
    ],
    totalJugadores:0,
    recursos:[],
    protegido:false,
    venganza:false,
    ataquesExtra:0,
    noAtacarA:[]
}));

let logJuego=[];

function siguiente(){ paso++; mostrar(); }
function mostrarLog(){
    document.getElementById("log").innerHTML=logJuego.join("<br>");
}

function rolesObligatorios(total,indice){
    if(total===3 && (indice===0||indice===1)) return 2;
    if(total===4 && indice===0) return 2;
    return 1;
}

function buscarRol(grupo,rol){
    for(let m of grupo.miembros){
        if(m.roles.includes(rol)) return m;
    }
    return null;
}

function actualizarResumen(){
    grupos.forEach(g=>{
        let resumen={};
        g.recursos.forEach(r=>{
            resumen[r]=(resumen[r]||0)+1;
        });
        g.resumen=resumen;
    });
}

function mostrar(){

let html="";

//////////////////////////////////////////////////////////////
// PASO 0 – INTRODUCCIÓN + CONFIGURACIÓN
//////////////////////////////////////////////////////////////

if(paso===0){

html+=`
<h3>Introducción</h3>

<p>
Tras un naufragio, tres equipos han llegado a una isla desconocida.
Deberán organizarse, conseguir recursos, negociar, robar, luchar
y sobrevivir.
</p>

<p>
Para ganar deberán alcanzar:
</p>

<ul>
<li><strong>Alimentación:</strong> mínimo 4 puntos</li>
<li><strong>Utilidad:</strong> mínimo 3 puntos</li>
<li><strong>Orientación:</strong> mínimo 2 puntos</li>
</ul>

<p>
Habrá fases de:
<br>• Robo nocturno
<br>• Diplomacia
<br>• Combate
<br>• Venganza estratégica
</p>

<hr>

<h4>Reglas de equipos</h4>

<p><strong>Mínimo 3 jugadores por equipo.</strong></p>

<p>
3 jugadores → los dos primeros eligen 2 roles.<br>
4 jugadores → el primero elige 2 roles.<br>
5 jugadores → todos eligen 1 rol.
</p>

<hr>

<h4>Configuración de equipos</h4>
`;

grupos.forEach((g,i)=>{
html+=`<div class="equipo"><h4>Equipo ${g.nombre}</h4>`;
for(let j=0;j<5;j++){
html+=`Jugador ${j+1}: <input id="jug${i}_${j}"><br>`;
}
html+="</div>";
});

html+=`<button onclick="guardarJugadores()">Comenzar partida</button>`;
}

//////////////////////////////////////////////////////////////
// PASO 1 – ROLES
//////////////////////////////////////////////////////////////

if(paso===1){

html+="<h3>Asignación de Roles</h3>";

grupos.forEach((g,i)=>{
html+=`<div class="equipo"><h4>${g.nombre}</h4>`;

g.miembros.forEach((m,j)=>{
if(m.nombre!==""){

let oblig=rolesObligatorios(g.totalJugadores,j);

html+=`<div><strong>${m.nombre}</strong> debe elegir ${oblig} rol(es)</div>`;

for(let r=0;r<oblig;r++){
html+=`<select id="rol${i}_${j}_${r}">
${rolesDisponibles.map(rol=>`<option>${rol}</option>`).join("")}
</select><br>`;
}
}
});

html+="</div>";
});

html+=`<button onclick="guardarRoles()">Continuar</button>`;
}

//////////////////////////////////////////////////////////////
// PASO 2 – ROBO NOCTURNO
//////////////////////////////////////////////////////////////

if(paso===2){

html+="<h3>Robo Nocturno</h3>";

grupos.forEach((g,i)=>{
let ladron=buscarRol(g,"Ladrón");
if(ladron){
html+=`<div class="equipo">
<div class="destacado">${ladron.nombre} (Ladrón)</div>

<select id="accion${i}">
<option value="robar">Robar</option>
<option value="proteger">Defender</option>
</select>

<select id="objetivo${i}">
${grupos.map((x,j)=> j!==i?`<option value="${j}">${x.nombre}</option>`:"").join("")}
</select>

<div class="resumen">Recursos actuales: ${JSON.stringify(g.resumen||{})}</div>
</div>`;
}
});

html+=`<button onclick="resolverRobo()">Continuar</button>`;
}

//////////////////////////////////////////////////////////////
// PASO 3 – DIPLOMACIA
//////////////////////////////////////////////////////////////

if(paso===3){

html+="<h3>Diplomacia</h3>";

grupos.forEach((g,i)=>{
let dip=buscarRol(g,"Diplomático");
if(dip){
html+=`<input type="checkbox" id="pacto${i}"> ${g.nombre} - <span class="destacado">${dip.nombre} (Diplomático)</span><br>`;
}
});

html+=`<button onclick="configurarDiplomacia()">Confirmar pacto</button>`;
}

//////////////////////////////////////////////////////////////
// PASO 5 – RESULTADOS
//////////////////////////////////////////////////////////////

if(paso===5){
calcularResultados();
return;
}

document.getElementById("contenido").innerHTML=html;
mostrarLog();
}

//////////////////////////////////////////////////////////////
// FUNCIONES
//////////////////////////////////////////////////////////////

function guardarJugadores(){
grupos.forEach((g,i)=>{
let activos=0;
g.miembros.forEach((m,j)=>{
let val=document.getElementById(`jug${i}_${j}`).value.trim();
m.nombre=val;
if(val!=="") activos++;
});
if(activos<3){alert("Mínimo 3 jugadores por equipo");return;}
g.totalJugadores=activos;
});
siguiente();
}

function guardarRoles(){
let global=[];
grupos.forEach((g,i)=>{
g.miembros.forEach((m,j)=>{
if(m.nombre!==""){
let oblig=rolesObligatorios(g.totalJugadores,j);
m.roles=[];
for(let r=0;r<oblig;r++){
let val=document.getElementById(`rol${i}_${j}_${r}`).value;
if(global.includes(val)){alert("Rol repetido");return;}
global.push(val);
m.roles.push(val);
}
}
});
});
siguiente();
}

function resolverRobo(){

logJuego.push("=== ROBO NOCTURNO ===");
grupos.forEach(g=>g.protegido=false);

grupos.forEach((g,i)=>{
let accion=document.getElementById(`accion${i}`).value;
let obj=document.getElementById(`objetivo${i}`).value;

if(accion==="proteger"){
g.protegido=true;
logJuego.push(`${g.nombre} defiende`);
}else{
let defensor=grupos[obj];
if(defensor.protegido){
logJuego.push(`Robo fallido contra ${defensor.nombre}`);
}else{
if(defensor.recursos.length>0){
let robado=defensor.recursos.pop();
g.recursos.push(robado);
logJuego.push(`${g.nombre} robó ${robado}`);
}
}
}
});

actualizarResumen();
siguiente();
}

function configurarDiplomacia(){

let pactantes=[];

grupos.forEach((g,i)=>{
if(document.getElementById(`pacto${i}`).checked) pactantes.push(i);
g.venganza=false;
g.ataquesExtra=0;
});

let html="<h3>Elección de objetos de 2 puntos</h3>";

if(pactantes.length===2){

pactantes.forEach(i=>{
html+=selectorObjetos(i,2);
});

grupos.forEach((g,i)=>{
if(!pactantes.includes(i)){
g.venganza=true;
g.ataquesExtra=1;
html+=selectorObjetos(i,1);
}
});

}else{

grupos.forEach((g,i)=>{
html+=selectorObjetos(i,1);
});

}

html+=`<button onclick="resolverDiplomacia()">Continuar</button>`;
document.getElementById("contenido").innerHTML=html;
}

function selectorObjetos(i,cantidad){

let dip=buscarRol(grupos[i],"Diplomático");

let html=`<div class="equipo">
<div class="destacado">${grupos[i].nombre} (${dip?dip.nombre:""})</div>`;

for(let x=0;x<cantidad;x++){
html+=`<select id="esp${i}_${x}">
${recursosEspeciales.map(r=>`<option>${r.nombre}</option>`).join("")}
</select><br>`;
}

html+="</div>";
return html;
}

function resolverDiplomacia(){
grupos.forEach((g,i)=>{
let selects=document.querySelectorAll(`[id^="esp${i}_"]`);
selects.forEach(sel=>{
g.recursos.push(sel.value);
logJuego.push(`${g.nombre} obtiene ${sel.value}`);
});
});
actualizarResumen();
siguiente();
}

function calcularResultados(){

logJuego.push("=== RESULTADOS FINALES ===");

grupos.forEach(g=>{

let puntos={Alimentación:0,Utilidad:0,Orientación:0};

g.recursos.forEach(nombre=>{
let r=[...recursosBase,...recursosEspeciales].find(x=>x.nombre===nombre);
if(r) puntos[r.categoria]+=r.puntos;
});

if(puntos.Alimentación>=4 &&
puntos.Utilidad>=3 &&
puntos.Orientación>=2){
logJuego.push(`${g.nombre}: VICTORIA!`);
}else{
logJuego.push(`${g.nombre}: DERROTA!`);
}

});

mostrarLog();
}

mostrar();

</script>
</body>
</html>
