<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La Isla - Dinámica Grupal Completa</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:20px; text-align:center; }
h1,h2,h3 { margin-bottom:10px; }
.select-block { margin:5px auto; }
.resaltar { color: red; font-weight: bold; }
.pasado { color: gray; }
select, input, button { margin:5px; padding:5px; }
.grupo { margin-bottom:25px; display:inline-block; text-align:left; }
.obj-list { display:inline-block; text-align:left; margin-top:10px; }
</style>
</head>
<body>

<h1>La Isla - Dinámica Grupal</h1>

<div id="contenido"></div>
<button onclick="siguientePaso()" style="margin-top:20px;">Siguiente Paso</button>

<script>
// ---------------- Datos iniciales ----------------
let pasoActual = 0;
let grupos = [
  {nombre:"Alfa", miembros:["","","","",""], roles:[], objetos:[], protegido:false, noPacto:false},
  {nombre:"Beta", miembros:["","","","",""], roles:[], objetos:[], protegido:false, noPacto:false},
  {nombre:"Omega", miembros:["","","","",""], roles:[], objetos:[], protegido:false, noPacto:false}
];
const rolesDisponibles = ["Comerciante","Diplomático","Luchador","Ladrón","Recolector"];
const objetosRol = ["Antifaz","Maletín","Machete","Guantes","Alianza militar"];
const recursosBase = [
  {nombre:"Agua", categoria:"Alimentación", puntos:1},
  {nombre:"Frutas", categoria:"Alimentación", puntos:1},
  {nombre:"Comida enlatada", categoria:"Alimentación", puntos:1},
  {nombre:"Botiquín", categoria:"Utilidad", puntos:1},
  {nombre:"Cuerda", categoria:"Utilidad", puntos:1},
  {nombre:"Martillo", categoria:"Utilidad", puntos:1},
  {nombre:"Lona", categoria:"Utilidad", puntos:1},
  {nombre:"Encendedor", categoria:"Utilidad", puntos:1},
  {nombre:"Mapa", categoria:"Orientación", puntos:1},
  {nombre:"Radio", categoria:"Orientación", puntos:1}
];
const recursosEspeciales = [
  {nombre:"Caña de pescar", categoria:"Alimentación", puntos:2},
  {nombre:"Mochila", categoria:"Utilidad", puntos:2},
  {nombre:"Brújula", categoria:"Orientación", puntos:2}
];
let objetosDescartados = [];
let pactos = [];

// ---------------- Funciones para mostrar pasos ----------------
function mostrarPaso(){
  let html = "";
  switch(pasoActual){
    case 0: // Paso 1 - Introducción
      html += "<h2>Autor: Alejandro Scuro Rossi</h2>";
      html += "<h3>Paso 1: Introducción</h3>";
      html += "<p>Dinámica grupal para evaluar <strong>Liderazgo, trabajo en equipo y estrategia</strong>.</p>";
      html += "<p>3 equipos en una isla. Para sobrevivir deberán acumular objetos y gestionar recursos:</p>";
      html += "<ul style='text-align:left; display:inline-block;'><li>Alimentación: mínimo 4 puntos</li><li>Utilidad: mínimo 3 puntos</li><li>Orientación: mínimo 2 puntos</li></ul>";
      break;

    case 1: // Paso 2 - Nombres, roles y objetos de rol
      html += "<h3>Paso 2: Nombres, roles y objetos de rol</h3>";
      grupos.forEach((g,i)=>{
        html += `<div class="grupo"><strong>Equipo ${g.nombre}</strong><br>`;
        g.miembros.forEach((m,j)=>{
          html += `<div class="select-block">Jugador ${j+1}: <input type="text" id="nombre${i}${j}" placeholder="Nombre"> `;
          html += `Rol: <select id="rol${i}${j}" onchange="validarRoles(${i})">
            <option value="">--Selecciona rol--</option>`;
          rolesDisponibles.forEach(r=> html+=`<option value="${r}">${r}</option>`);
          html += `</select></div>`;
        });
        html += "<div><strong>Objetos de rol del equipo (elige 2):</strong><br>";
        for(let k=0;k<2;k++){
          html += `<select id="objRol${i}${k}" onchange="validarObjetos(${i})">
            <option value="">--Selecciona objeto--</option>`;
          objetosRol.forEach(o=> html+=`<option value="${o}">${o}</option>`);
          html += "</select><br>";
        }
        html += "</div></div><br>";
      });
      html += `<button onclick="guardarPaso2()">Guardar nombres, roles y objetos</button>`;
      break;

    case 2: // Paso 3 - Selección de recursos
      html += "<h3>Paso 3: Selección de 5 recursos por equipo</h3>";
      grupos.forEach((g,i)=>{
        html += `<div class="grupo"><strong>Equipo ${g.nombre}</strong><br>`;
        for(let r=0;r<5;r++){
          html += `Recurso ${r+1}: <select id="rec${i}${r}">`;
          recursosBase.forEach(obj=> html += `<option value="${obj.nombre}">${obj.nombre}</option>`);
          html += `</select><br>`;
        }
        html += "</div>";
      });
      html += `<button onclick="guardarPaso3()">Guardar recursos</button>`;
      break;

    case 3: html += "<h3>Paso 4: Robo nocturno (Ladrones)</h3><p>Este paso permite que los Ladrones roben o defiendan objetos. Se registrará automáticamente.</p>"; break;
    case 4: html += "<h3>Paso 5: Pacto (Diplomáticos)</h3><p>Se generan pactos entre equipos y se asignan recursos especiales. Equipos que no pactan obtienen Venganza.</p>"; break;
    case 5: html += "<h3>Paso 6: Combate (Luchadores)</h3><p>Se resuelven ataques y defensas usando piedra/papel/tijera, robos de objetos y ataque extra si corresponde.</p>"; break;
    case 6: html += "<h3>Paso 7: Recolección</h3><p>Los Recolectores eligen 2 objetos de los 15 descartados según el orden definido.</p>"; break;
    case 7: html += "<h3>Paso 8: Intercambio</h3><p>Los Comerciantes realizan hasta 2 intercambios por equipo, registrados automáticamente.</p>"; break;
    case 8: html += "<h3>Paso 9: Resultados finales</h3><p>Se suman los puntos por categoría y se muestra <strong>Victoria!</strong> o <strong>Derrota!</strong> según los mínimos.</p>"; break;
    default: html="<h3>Dinámica finalizada</h3>"; break;
  }

  document.getElementById("contenido").innerHTML = html;
}

// ---------------- Validaciones y guardado de Paso 2 y 3 ----------------
function validarRoles(indiceGrupo){
  let seleccionados = [];
  grupos[indiceGrupo].miembros.forEach((m,j)=>{
    const val = document.getElementById(`rol${indiceGrupo}${j}`).value;
    if(val) seleccionados.push(val);
  });
  const duplicados = seleccionados.filter((v,i,a)=> a.indexOf(v) !== i);
  if(duplicados.length>0){
    alert("No se puede repetir el mismo rol dentro del grupo.");
    for(let k=0;k<5;k++){
      const select = document.getElementById(`rol${indiceGrupo}${k}`);
      if(duplicados.includes(select.value)) select.value="";
    }
  }
}

function validarObjetos(indiceGrupo){
  let seleccionados = [];
  for(let k=0;k<2;k++){
    const val = document.getElementById(`objRol${indiceGrupo}${k}`).value;
    if(val) seleccionados.push(val);
  }
  const duplicados = seleccionados.filter((v,i,a)=> a.indexOf(v) !== i);
  if(duplicados.length>0){
    alert("No se puede repetir el mismo objeto de rol dentro del grupo.");
    for(let k=0;k<2;k++){
      const select = document.getElementById(`objRol${indiceGrupo}${k}`);
      if(duplicados.includes(select.value)) select.value="";
    }
  }
}

function guardarPaso2(){
  grupos.forEach((g,i)=>{
    g.roles = [];
    g.objetos = [];
    g.miembros.forEach((m,j)=>{
      const nombre = document.getElementById(`nombre${i}${j}`).value;
      if(nombre) g.miembros[j] = nombre;
      const rol = document.getElementById(`rol${i}${j}`).value;
      if(rol) g.roles.push(rol);
    });
    for(let k=0;k<2;k++){
      const obj = document.getElementById(`objRol${i}${k}`).value;
      if(obj) g.objetos.push(obj);
    }
  });
  alert("Nombres, roles y objetos de rol guardados correctamente");
}

function guardarPaso3(){
  grupos.forEach((g,i)=>{
    for(let r=0;r<5;r++){
      const obj = document.getElementById(`rec${i}${r}`).value;
      if(obj) g.objetos.push(obj);
    }
  });
  alert("Recursos guardados");
}

// ---------------- Navegación ----------------
function siguientePaso(){ pasoActual++; mostrarPaso(); }
mostrarPaso();
</script>
</body>
</html>
