<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>La Isla - Dinámica Grupal</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; }
        
        .scoreboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; position: sticky; top: 0; z-index: 1000; margin-bottom: 20px; }
        .score-card { background: var(--primary); color: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border-bottom: 5px solid transparent; }
        .venganza-active { border-color: var(--danger); animation: glow 2s infinite; }
        @keyframes glow { 0% { box-shadow: 0 0 5px var(--danger); } 50% { box-shadow: 0 0 20px var(--danger); } 100% { box-shadow: 0 0 5px var(--danger); } }
        .points { font-size: 1.3em; font-weight: bold; margin: 5px 0; }
        .status-ok { color: #2ecc71; }

        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .tagline { font-style: italic; color: #666; border-left: 4px solid var(--accent); padding-left: 15px; margin-bottom: 20px; }
        
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: #2980b9; transform: translateY(-1px); }
        .btn-action { background: var(--warning); color: #2c3e50; margin-top: 5px; }
        .btn-next { background: var(--success); margin-top: 20px; font-size: 1.1em; }
        
        select, input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .log { background: #111; color: #0f0; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 12px; height: 120px; overflow-y: auto; margin-top: 20px; }
        .intro-box { text-align: center; padding: 40px; }
        .author { margin-top: 30px; font-weight: bold; color: var(--primary); border-top: 1px solid #eee; padding-top: 15px; }
        .min-box { display: flex; justify-content: space-around; background: #f9f9f9; padding: 15px; border-radius: 8px; margin: 20px 0; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <div id="scoreboard" class="scoreboard" style="display:none;"></div>
    <div id="game-ui"></div>
    <div class="log" id="game-log">>> Sistema iniciado.</div>
</div>

<script>
/* ============================
   DATOS DE OBJETOS
   ============================ */
const DB = {
    base: [
        { id: "agua", n: "Agua", c: "ali", p: 1 }, { id: "fruta", n: "Frutas", c: "ali", p: 1 },
        { id: "latas", n: "Enlatados", c: "ali", p: 1 }, { id: "botiquin", n: "Botiquín", c: "uti", p: 1 },
        { id: "cuerda", n: "Cuerda", c: "uti", p: 1 }, { id: "martillo", n: "Martillo", c: "uti", p: 1 },
        { id: "lona", n: "Lona", c: "uti", p: 1 }, { id: "encendedor", n: "Encendedor", c: "uti", p: 1 },
        { id: "mapa", n: "Mapa", c: "ori", p: 1 }, { id: "radio", n: "Radio", c: "ori", p: 1 }
    ],
    especiales: [
        { id: "pesca", n: "Caña de Pescar (2 pts)", c: "ali", p: 2 },
        { id: "mochila", n: "Mochila (2 pts)", c: "uti", p: 2 },
        { id: "brujula", n: "Brújula (2 pts)", c: "ori", p: 2 }
    ]
};

let Game = {
    paso: 1,
    equipos: ["Alfa", "Beta", "Omega"].map(n => ({
        nombre: n, inventario: [], venganza: false
    }))
};

function log(msg) {
    const l = document.getElementById('game-log');
    l.innerHTML += `<br>> ${msg}`;
    l.scrollTop = l.scrollHeight;
}

function updateScoreboard() {
    const sb = document.getElementById('scoreboard');
    if(Game.paso < 3) { sb.style.display = 'none'; return; }
    sb.style.display = 'grid';
    sb.innerHTML = Game.equipos.map(e => {
        const p = e.inventario.reduce((acc, i) => { acc[i.c] += i.p; return acc; }, { ali:0, uti:0, ori:0 });
        return `
            <div class="score-card ${e.venganza ? 'venganza-active' : ''}">
                <small>Equipo ${e.nombre} ${e.venganza ? '🔥 VENGANZA' : ''}</small>
                <div class="points">
                    <span class="${p.ali>=4?'status-ok':''}">🍎${p.ali}</span> | 
                    <span class="${p.uti>=3?'status-ok':''}">🛠${p.uti}</span> | 
                    <span class="${p.ori>=2?'status-ok':''}">🧭${p.ori}</span>
                </div>
            </div>`;
    }).join("");
}

function render() {
    const ui = document.getElementById('game-ui');
    updateScoreboard();

    switch(Game.paso) {
        case 1: 
            ui.innerHTML = `
                <div class="card intro-box">
                    <h1>🏝️ La Isla</h1>
                    <h3>Dinámica grupal para la evaluación de liderazgo, trabajo en equipo y estrategia</h3>
                    <p class="tagline">3 equipos en una isla, solo podrán sobrevivir a través de la gestión de recursos.</p>
                    <div class="min-box">
                        <div><strong>🍎 Alimentación</strong><br>Mínimo 4 pts</div>
                        <div><strong>🛠️ Utilidad</strong><br>Mínimo 3 pts</div>
                        <div><strong>🧭 Orientación</strong><br>Mínimo 2 pts</div>
                    </div>
                    <div class="author">Autor: Alejandro Scuro Rossi</div>
                    <button class="btn-next" onclick="Game.paso=2; render();">Siguiente: Equipos y Roles</button>
                </div>`;
            break;

        case 2: 
            ui.innerHTML = `
                <div class="card">
                    <h2>Paso 2: Formación de equipo y roles</h2>
                    <p class="tagline">Asigna los nombres de los integrantes a cada rol estratégico.</p>
                    <div class="grid">${Game.equipos.map(e => `
                        <div class="card">
                            <h3>Equipo ${e.nombre}</h3>
                            <input type="text" placeholder="Ladrón">
                            <input type="text" placeholder="Diplomático">
                            <input type="text" placeholder="Luchador">
                            <input type="text" placeholder="Recolector">
                            <input type="text" placeholder="Comerciante">
                        </div>
                    `).join("")}</div>
                    <button class="btn-next" onclick="Game.paso=3; render();">Siguiente: Planeación Inicial</button>
                </div>`;
            break;

        case 3: 
            ui.innerHTML = `
                <div class="card">
                    <h2>Paso 3: Planeación Inicial</h2>
                    <p class="tagline">Selecciona 5 recursos base para el inventario inicial del equipo.</p>
                    <div class="grid">${Game.equipos.map((e, i) => `
                        <div class="card">
                            <h3>${e.nombre}</h3>
                            <select id="plan_${i}" multiple style="height:150px">
                                ${DB.base.map(o => `<option value="${o.id}">${o.n} (${o.c})</option>`).join("")}
                            </select>
                        </div>
                    `).join("")}</div>
                    <button class="btn-next" onclick="procesarPaso3()">Confirmar Planeación</button>
                </div>`;
            break;

        case 4: 
            ui.innerHTML = `
                <div class="card">
                    <h2>Paso 4: Robo Nocturno</h2>
                    <div class="grid">${Game.equipos.map((e, i) => `
                        <div class="card">
                            <h3>Ladrón ${e.nombre}</h3>
                            <select id="acc_ladron_${i}" onchange="updateUI4(${i})">
                                <option value="defender">🛡️ Proteger Campamento</option>
                                <option value="robar">👤 Robar Objeto</option>
                            </select>
                            <div id="box_robo_${i}" style="display:none">
                                <select id="vic_ladron_${i}" onchange="loadInvVictima(${i}, 'vic_ladron_${i}', 'obj_ladron_${i}')">
                                    <option value="">¿A quién?</option>
                                    ${Game.equipos.map((v, vi) => i!==vi ? `<option value="${vi}">${v.nombre}</option>` : '').join("")}
                                </select>
                                <select id="obj_ladron_${i}"><option value="">-- Seleccionar objeto --</option></select>
                            </div>
                        </div>
                    `).join("")}</div>
                    <button class="btn-next" onclick="procesarPaso4()">Procesar Noche</button>
                </div>`;
            break;

        case 5: 
            ui.innerHTML = `
                <div class="card">
                    <h2>Paso 5: Pacto de Diplomáticos</h2>
                    <div class="grid">
                        <div class="card">
                            <h3>Equipos que pactan</h3>
                            ${Game.equipos.map((e, i) => `<label><input type="checkbox" class="pacto-check" value="${i}"> ${e.nombre}</label><br>`).join("")}
                        </div>
                        <div class="card">
                            <h3>Recursos Especiales (2 pts)</h3>
                            ${Game.equipos.map((e, i) => `
                                <div style="margin-bottom:10px">
                                    <strong>${e.nombre}:</strong>
                                    <select class="esp-1-${i}">${DB.especiales.map(o=>`<option value="${o.id}">${o.n}</option>`).join("")}</select>
                                    <select class="esp-2-${i}"><option value="">Ninguno (Excluido)</option>${DB.especiales.map(o=>`<option value="${o.id}">${o.n}</option>`).join("")}</select>
                                </div>
                            `).join("")}
                        </div>
                    </div>
                    <button class="btn-next" onclick="procesarPaso5()">Resolver Pacto</button>
                </div>`;
            break;

        case 6: 
            ui.innerHTML = `
                <div class="card">
                    <h2>Paso 6: Combate</h2>
                    <p class="tagline">El equipo excluido del pacto tiene Venganza (2 ataques).</p>
                    <div class="grid">${Game.equipos.map((e, i) => {
                        const n = e.venganza ? 2 : 1;
                        let ataques = "";
                        for(let a=0; a<n; a++) {
                            ataques += `
                            <div style="border-top:1px solid #eee; margin-top:10px; padding-top:10px">
                                <select id="vic_c_${i}_${a}" onchange="loadInvVictima(${i}, 'vic_c_${i}_${a}', 'obj_c_${i}_${a}')">
                                    <option value="">¿Víctima?</option>
                                    ${Game.equipos.map((v, vi) => i!==vi ? `<option value="${vi}">${v.nombre}</option>` : '').join("")}
                                </select>
                                <select id="res_c_${i}_${a}"><option value="win">Atacante Vence</option><option value="lose">Defensor Vence</option></select>
                                <select id="obj_c_${i}_${a}"><option value="">-- Objeto --</option></select>
                                <button class="btn-action" onclick="procesarCombate
